# ===============================================
# 海军系统配置 (Navy System Configuration)
# ===============================================
# 海军模块提供舰队创建、管理、航行和海战功能
# 舰船类型包括：桨帆战船、护卫舰、战列舰、运输船、巡洋舰、炮艇

navy:
  # 每个国家最多允许创建的舰队数量
  max-navies-per-nation: 5
  # 每支舰队最大舰船数量
  max-ships-per-navy: 50
  # 是否在港口自动补给舰队
  auto-supply-at-port: true
  # 海战范围加成（乘数）
  battle-range-bonus: 1.0

# ===============================================
# 海军消息配置 (Messages)
# ===============================================
navy-messages:
  # 创建舰队
  create:
    usage: "/navy create <类型> <数量> [名称] - 创建新舰队"
  # 列表
  list:
    header: "=== 国家舰队列表 ==="
    entry: "  {0} - {1}型 ({2}艘) - {3}"
  # 详情
  info:
    usage: "/navy info <舰队ID> - 查看舰队详情"
    header: "=== 舰队详情 ==="
    id: "  ID: {0}"
    name: "  名称: {0}"
    type: "  类型: {0}"
    ships: "  舰船: {0}艘"
    health: "  生命: {0}"
    morale: "  士气: {0}"
    supply: "  补给: {0}"
    state: "  状态: {0}"
    embarked: "  搭载: {0}/{1}"
  # 移动
  move:
    usage: "/navy move <舰队ID> <x> <z> - 移动舰队"
  # 海战
  engage:
    usage: "/navy engage <攻击舰队ID> <防守舰队ID> - 发起海战"
    header: "=== 海战结果 ==="
  # 补给
  supply:
    usage: "/navy supply <舰队ID> - 补给舰队"
  # 解散
  disband:
    usage: "/navy disband <舰队ID> - 解散舰队"
  # 重命名
  rename:
    usage: "/navy rename <舰队ID> <新名称> - 重命名舰队"
  # 搭载
  embark:
    usage: "/navy embark <舰队ID> <单位数> - 搭载陆军单位"
  # 卸载
  disembark:
    usage: "/navy disembark <舰队ID> <单位数> - 卸载陆军单位"
  # 预测
  predict:
    usage: "/navy predict <舰队ID> <目标ID> - 预测海战结果"
    header: "=== 海战预测 ==="
  # 状态
  state:
    usage: "/navy state <舰队ID> <状态> - 设置舰队状态"
  # 状态值
  states:
    anchored: "停泊"
    sailing: "航行"
    patrolling: "巡逻"
    in_combat: "海战"
    landing: "登陆"
    blockading: "封锁"
    retreating: "撤退"
  # 帮助
  help:
    header: "=== 海军命令帮助 ==="
    create: "/navy create - 创建新舰队"
    list: "/navy list - 列出舰队"
    info: "/navy info - 查看舰队详情"
    move: "/navy move - 移动舰队"
    engage: "/navy engage - 发起海战"
    supply: "/navy supply - 补给舰队"
    disband: "/navy disband - 解散舰队"
    rename: "/navy rename - 重命名舰队"
    embark: "/navy embark - 搭载单位"
    disembark: "/navy disembark - 卸载单位"
  # 错误消息
  not-in-nation: "你必须加入一个国家才能使用海军命令"
  invalid-type: "无效的舰船类型: {0}"
  invalid-number: "无效的数字: {0}"
  invalid-state: "无效的舰队状态: {0}"
  not-found: "找不到舰队: {0}"
  no-navies: "你的国家还没有舰队"
  created: "舰队 {0} ({1}型, {2}艘) 已创建"
  moved: "舰队 {0} 已移动到 ({1}, {2})"
  supplied: "舰队 {0} 已补给完毕"
  disbanded: "舰队 {0} 已解散"
  renamed: "舰队 {0} 已更名为 {1}"
  embarked: "已搭载 {0} 单位到舰队 {1}"
  disembarked: "已从舰队 {1} 卸载 {0} 单位"
  embark-failed: "无法搭载，可能超出容量"
  state-set: "舰队 {0} 状态已设置为 {1}"

# ===============================================
# 舰船类型配置 (Ship Types)
# ===============================================
ship-types:
  # 桨帆战船 - 轻型快速船只
  galley:
    name: "桨帆战船"
    attack: 8
    defense: 5
    health: 80
    mobility: 3.0
    transport-capacity: 50
    cost-per-unit: 80
  # 护卫舰 - 中型战船
  frigate:
    name: "护卫舰"
    attack: 12
    defense: 10
    health: 120
    mobility: 2.0
    transport-capacity: 100
    cost-per-unit: 150
  # 战列舰 - 重型主力舰
  battleship:
    name: "战列舰"
    attack: 20
    defense: 18
    health: 200
    mobility: 1.0
    transport-capacity: 150
    cost-per-unit: 300
  # 运输船 - 运输专用
  transport:
    name: "运输船"
    attack: 2
    defense: 3
    health: 60
    mobility: 1.5
    transport-capacity: 500
    cost-per-unit: 50
  # 巡洋舰 - 快速攻击舰
  cruiser:
    name: "巡洋舰"
    attack: 15
    defense: 8
    health: 100
    mobility: 2.5
    transport-capacity: 80
    cost-per-unit: 200
  # 炮艇 - 轻型火力支援
  gunboat:
    name: "炮艇"
    attack: 6
    defense: 4
    health: 50
    mobility: 3.5
    transport-capacity: 20
    cost-per-unit: 40
