# ============================================================
# STARCORE 资源系统 GUI 配置
# ============================================================

# --- 资源主菜单 ---
resource-main:
  title: "&a&l🌾 资源系统"
  rows: 6

  items:
    # 资源概览
    overview:
      slot: 4
      material: CHEST
      display-name: "&a&l🌾 资源概览"
      glow: true
      lore:
        - ""
        - "&7资源种类: &e{resource_count}"
        - "&7总储量: &b{total_storage}"
        - "&7产出速率: &a+{production_rate}/h"
        - ""
        - "&e▶ 点击查看详情"

    # 采集管理
    gathering:
      slot: 11
      material: DIAMOND_PICKAXE
      display-name: "&f&l⛏ 采集管理"
      glow: false
      lore:
        - ""
        - "&7进行中: &a{active_gathering}"
        - "&7可用采集点: &e{available_spots}"
        - ""
        - "&e▶ 管理采集"

    # 生产管理
    production:
      slot: 13
      material: FURNACE
      display-name: "&f&l🏭 生产管理"
      glow: false
      lore:
        - ""
        - "&7进行中: &a{active_production}"
        - "&7队列: &e{queue_count}"
        - ""
        - "&e▶ 管理生产"

    # 交易
    trade:
      slot: 15
      material: EMERALD
      display-name: "&f&l💱 资源交易"
      glow: false
      lore:
        - ""
        - "&7市场汇率: &e{market_rate}"
        - "&7我的余额: &b{personal_balance}"
        - ""
        - "&e▶ 进入市场"

    # 存储
    storage:
      slot: 20
      material: BARREL
      display-name: "&f&l📦 存储管理"
      glow: false
      lore:
        - ""
        - "&7已用: &e{used_storage}"
        - "&7容量: &a{max_storage}"
        - ""
        - "&e▶ 查看存储"

    # 资源统计
    statistics:
      slot: 24
      material: BOOK
      display-name: "&f&l📊 资源统计"
      glow: false
      lore:
        - ""
        - "&7今日产出: &a+{daily_production}"
        - "&7今日消耗: &c-{daily_consumption}"
        - "&7净增长: &b{net_change}"
        - ""
        - "&e▶ 查看统计"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 资源详情 ---
resource-detail:
  title: "&a&l🌾 {resource_name}"
  rows: 4

  items:
    # 资源图标
    icon:
      slot: 4
      material: DIAMOND
      display-name: "&e&l{resource_name}"
      glow: true
      lore:
        - ""
        - "&7类型: &e{type}"
        - "&7品质: &b{quality}"

    # 数量
    amount:
      slot: 11
      material: GOLD_INGOT
      display-name: "&6&l数量"
      glow: false
      lore:
        - ""
        - "&7当前: &e{current_amount}"
        - "&7上限: &7{max_amount}"
        - "&7{progress_bar}"

    # 产出
    production:
      slot: 15
      material: GREEN_STAINED_GLASS
      display-name: "&a&l产出"
      glow: false
      lore:
        - ""
        - "&7产出速率: &a+{rate}/h"
        - "&7下次产出: &e{next_production}"

    # 消耗
    consumption:
      slot: 22
      material: RED_STAINED_GLASS
      display-name: "&c&l消耗"
      glow: false
      lore:
        - ""
        - "&7消耗速率: &c-{rate}/h"
        - "&7主要消耗: &e{consumer}"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 市场交易 ---
market-trade:
  title: "&e&l💱 资源市场"
  rows: 6

  items:
    # 买入
    buy:
      slot: 20
      material: GREEN_STAINED_GLASS
      display-name: "&a&l⬆ 买入"
      glow: false
      lore:
        - ""
        - "&7当前价格: &e{buy_price}"
        - "&7库存: &a{stock}"
        - ""
        - "&e▶ 买入资源"

    # 卖出
    sell:
      slot: 24
      material: RED_STAINED_GLASS
      display-name: "&c&l⬇ 卖出"
      glow: false
      lore:
        - ""
        - "&7当前价格: &e{sell_price}"
        - "&7你的库存: &b{your_stock}"
        - ""
        - "&e▶ 卖出资源"

    # 价格走势
    chart:
      slot: 49
      material: PAPER
      display-name: "&e&l📈 价格走势"
      glow: false
      lore:
        - ""
        - "&724h: &e{price_24h}"
        - "&77d: &e{price_7d}"
        - "&730d: &e{price_30d}"
        - ""

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
