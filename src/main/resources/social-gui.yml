# ============================================================
# STARCORE 社交系统 GUI 配置
# ============================================================

# --- 社交主菜单 ---
social-main:
  title: "&b&l👥 社交系统"
  rows: 6

  items:
    # 好友管理
    friends:
      slot: 11
      material: PLAYER_HEAD
      display-name: "&f&l👥 好友管理"
      glow: false
      lore:
        - ""
        - "&7好友数量: &a{friend_count}"
        - "&7在线好友: &a{online_count}"
        - "&7申请中: &e{pending_count}"
        - ""
        - "&e▶ 点击管理好友"

    # 派系管理
    guild:
      slot: 13
      material: CREEPER_BANNER_PATTERN
      display-name: "&f&l🎭 派系管理"
      glow: false
      lore:
        - ""
        - "&7派系数量: &a{guild_count}"
        - "&7派系成员: &a{member_count}"
        - ""
        - "&e▶ 点击管理派系"

    # 组队功能
    party:
      slot: 15
      material: FIREWORK_ROCKET
      display-name: "&f&l🎉 组队功能"
      glow: false
      lore:
        - ""
        - "&7当前队伍: &e{party_status}"
        - "&7队伍成员: &a{member_count}"
        - ""
        - "&e▶ 点击组队"

    # 邮件系统
    mail:
      slot: 20
      material: ENVELOPE
      display-name: "&f&l📧 邮件系统"
      glow: false
      lore:
        - ""
        - "&7未读邮件: &c{unread_count}"
        - "&7总邮件数: &7{total_count}"
        - ""
        - "&e▶ 点击查看邮件"

    # 声望系统
    reputation:
      slot: 24
      material: HEART
      display-name: "&f&l⭐ 声望系统"
      glow: true
      lore:
        - ""
        - "&7当前声望: &b{reputation}"
        - "&7声望等级: &e{level}"
        - ""
        - "&e▶ 点击查看声望"

    # 影响力
    influence:
      slot: 31
      material: NETHER_STAR
      display-name: "&f&l✨ 影响力"
      glow: true
      lore:
        - ""
        - "&7当前影响力: &d{influence}"
        - "&7社交圈: &b{reach}"
        - ""
        - "&e▶ 点击查看详情"

    # 社交排行榜
    social-ranking:
      slot: 33
      material: LEADERBOARD
      display-name: "&f&l🏆 社交排行榜"
      glow: false
      lore:
        - ""
        - "&7当前排名: &e#{rank}"
        - "&7本周变化: &a+{change}"
        - ""
        - "&e▶ 点击查看排行"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 好友列表 ---
friends-list:
  title: "&f&l👥 好友列表"
  rows: 6

  items:
    # 好友项目
    friend-item:
      slot: 20
      material: PLAYER_HEAD
      display-name: "&a&l{friend_name}"
      glow: false
      lore:
        - ""
        - "&7状态: &a在线" # or "&7状态: &c离线"
        - "&7共同好友: &e{common_friends}"
        - "&7成为好友: &7{friend_since}"
        - ""
        - "&e▶ 查看详情"

    # 添加好友
    add-friend:
      slot: 40
      material: PLAYER_HEAD
      skull-owner: "{player_name}"
      display-name: "&a&l➕ 添加好友"
      glow: true
      lore:
        - ""
        - "&7输入玩家名称添加好友"
        - ""
        - "&e▶ 点击添加"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 影响力排行榜 ---
influence-leaderboard:
  title: "&d&l✨ 影响力排行榜"
  rows: 6

  items:
    # 周期选择
    period-daily:
      slot: 10
      material: CLOCK
      display-name: "&e&l📅 今日"
      glow: false
      lore:
        - ""
        - "&7查看今日影响力排名"
        - ""
        - "&e▶ 点击查看"

    period-weekly:
      slot: 12
      material: CALENDAR
      display-name: "&e&l📅 本周"
      glow: false
      lore:
        - ""
        - "&7查看本周影响力排名"
        - ""
        - "&e▶ 点击查看"

    period-monthly:
      slot: 14
      material: BOOK
      display-name: "&e&l📅 本月"
      glow: false
      lore:
        - ""
        - "&7查看本月影响力排名"
        - ""
        - "&e▶ 点击查看"

    period-alltime:
      slot: 16
      material: NETHER_STAR
      display-name: "&d&l✨ 总榜"
      glow: true
      lore:
        - ""
        - "&7查看历史影响力排名"
        - ""
        - "&e▶ 点击查看"

    # 我的排名
    my-rank:
      slot: 49
      material: PLAYER_HEAD
      skull-owner: "{player_name}"
      display-name: "&b&l我的排名"
      glow: true
      lore:
        - ""
        - "&7当前排名: &e#{my_rank}"
        - "&7影响力: &d{my_influence}"
        - "&7本周变化: &a+{my_change}"
        - ""
        - "&e点击查看我的详情"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 派系列表 ---
guild-list:
  title: "&f&l🎭 派系列表"
  rows: 6

  items:
    # 派系项目
    guild-item:
      slot: 20
      material: CREEPER_BANNER_PATTERN
      display-name: "&a&l{guild_name}"
      glow: false
      lore:
        - ""
        - "&7派系等级: &eLv.{level}"
        - "&7成员: &a{member_count}"
        - "&7派系声望: &b{reputation}"
        - ""
        - "&e▶ 查看详情"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 组队菜单 ---
party-menu:
  title: "&f&l🎉 组队"
  rows: 3

  items:
    # 创建队伍
    create-party:
      slot: 11
      material: FIREWORK_ROCKET
      display-name: "&a&l🎉 创建队伍"
      glow: true
      lore:
        - ""
        - "&7创建新的组队"
        - "&7最多 {max_size} 人"
        - ""
        - "&e▶ 点击创建"

    # 加入队伍
    join-party:
      slot: 15
      material: ENDER_EYE
      display-name: "&e&l🚪 加入队伍"
      glow: false
      lore:
        - ""
        - "&7查看可加入的队伍"
        - ""
        - "&e▶ 点击查看"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
