# StarCore 战斗系统配置文件
# 实时战斗系统配置

# ========== 战斗标记设置 ==========
combat-tag:
  # 是否启用战斗标记
  enabled: true
  # 战斗标记超时时间（毫秒）- 玩家在受到伤害后保持战斗状态的时间
  timeout: 15000
  # 战斗时禁止退出游戏
  logout-block:
    enabled: true
    # 退出超时时间（毫秒）- 在战斗结束后多久内仍然禁止退出
    timeout: 30000

# ========== PvP 设置 ==========
pvp:
  # 是否启用PvP
  enabled: true
  # 安全区是否允许PvP
  allow-in-safe-zones: false
  # 友军伤害（同一国家成员之间）
  friendly-fire: false

# ========== 战斗会话设置 ==========
session:
  # 战斗会话超时时间（秒）- 无伤害活动后自动结束
  timeout: 300
  # 每个会话最大参与者数
  max-participants: 10

# ========== 战场设置 ==========
battlefield:
  # 是否自动创建战场
  auto-create: true
  # 默认战场半径
  default-radius: 100.0

# ========== 显示设置 ==========
display:
  # 是否显示伤害指示器
  damage-indicator: true
  # 是否显示战斗标记通知
  combat-tag-notification: true

# ========== 性能设置 ==========
performance:
  # 最大活跃会话数
  max-active-sessions: 1000
  # 清理间隔（秒）
  cleanup-interval: 10

# ========== 消息设置 ==========
messages:
  # 战斗标记消息
  combat-tag: "&c你正处于战斗状态！(%time%)"
  # 战斗标记消失消息
  combat-tag-expired: "&a你已经脱离战斗状态。"
  # 战斗时退出被阻止消息
  logout-blocked: "&c你正处于战斗状态，无法退出游戏！"
  # 战斗死亡消息
  combat-death: "&c%victim% 在与 %killer% 的战斗中死亡！"

# ========== 战斗区域定义 ==========
# 在这些区域中可以配置特殊的PvP规则
zones:
  # 主城安全区示例
  # spawn:
  #   world: "world"
  #   x: 0
  #   y: 64
  #   z: 0
  #   radius: 100
  #   pvp-enabled: false
  #   type: "SAFE_ZONE"
  #
  # PvP竞技场示例
  # arena:
  #   world: "world"
  #   x: 500
  #   y: 64
  #   z: 500
  #   radius: 50
  #   pvp-enabled: true
  #   type: "ARENA"
  #
  # 战争区域示例
  # warzone:
  #   world: "world"
  #   x: 1000
  #   y: 64
  #   z: 1000
  #   radius: 200
  #   pvp-enabled: true
  #   type: "WAR_ZONE"

# ========== 区域类型说明 ==========
# SAFE_ZONE  - 安全区（禁止PVP）
# PVP_ZONE   - PvP区（默认配置）
# WAR_ZONE   - 战争区（强制PVP，忽略外交关系）
# ARENA      - 竞技场（专用于决斗等）
# EVENT      - 活动区（临时活动使用）
