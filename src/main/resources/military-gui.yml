# ============================================================
# STARCORE 军力系统 GUI 配置
# ============================================================

# --- 军队管理主菜单 ---
army-main:
  title: "&c&l⚔ 军队管理 &7| &f主菜单"
  rows: 6

  items:
    # 我的军队
    my-armies:
      slot: 11
      material: IRON_SWORD
      display-name: "&f&l⚔ 我的军队"
      glow: false
      lore:
        - ""
        - "&7军队数量: &c{army_count}"
        - "&7总兵力: &a{total_troops}"
        - "&7预备兵: &e{reserve_troops}"
        - ""
        - "&e▶ 点击查看军队"

    # 创建军队
    create-army:
      slot: 13
      material: DIAMOND_SWORD
      display-name: "&a&l➕ 创建军队"
      glow: true
      lore:
        - ""
        - "&7消耗: &6500 &7星尘"
        - "&7需要官职: &e士官"
        - ""
        - "&e▶ 点击创建军队"

    # 战斗状态
    battle-status:
      slot: 15
      material: BOW
      display-name: "&c&l⚔ 战斗状态"
      glow: false
      lore:
        - ""
        - "&7进行中: &c{battle_count}"
        - "&7待部署: &e{pending_count}"
        - ""
        - "&e▶ 查看战况"

    # 兵种训练
    training:
      slot: 20
      material: CREEPER_SPAWN_EGG
      display-name: "&e&l🏋️ 兵种训练"
      glow: false
      lore:
        - ""
        - "&7可训练: &a{available_types}"
        - "&7训练速度: &b{speed}x"
        - "&7空闲队列: &a{idle_queue}"
        - ""
        - "&e▶ 点击训练"

    # 装备管理
    equipment:
      slot: 24
      material: DIAMOND_CHESTPLATE
      display-name: "&f&l🛡 装备管理"
      glow: false
      lore:
        - ""
        - "&7装备评分: &e{equipment_score}"
        - "&7可用装备: &a{available}"
        - "&7已装备: &c{equipped}"
        - ""
        - "&e▶ 管理装备"

    # 军事联盟
    alliance:
      slot: 31
      material: SHIELD
      display-name: "&b&l🛡 军事联盟"
      glow: false
      lore:
        - ""
        - "&7同盟国家: &a{ally_count}"
        - "&7互保协议: &e{pact_count}"
        - ""
        - "&e▶ 管理联盟"

    # 战争历史
    history:
      slot: 33
      material: BOOK
      display-name: "&f&l📜 战争历史"
      glow: false
      lore:
        - ""
        - "&7总战斗: &c{total_battles}"
        - "&7胜利: &a{win_count}"
        - "&7失败: &c{lose_count}"
        - ""
        - "&e▶ 查看历史"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 军队列表菜单 ---
army-list:
  title: "&c&l⚔ 我的军队 &7| &f列表"
  rows: 6

  items:
    # 军队详情模板
    army-info:
      slot: 20
      material: IRON_SWORD
      display-name: "&e{army_name}"
      glow: false
      lore:
        - ""
        - "&7兵力: &c{troops}"
        - "&7士气: &a{morale}"
        - "&7装备: &b{equipment_level}"
        - ""
        - "&e▶ 点击管理"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

