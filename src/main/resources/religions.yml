# 宗教系统配置文件

# 启用宗教系统
enabled: true

# 宗教配置
religions:
  nature:
    name: "自然教"
    color: "&a"
    description: "崇拜自然与生命"
    blessing:
      - "生命恢复 +20%"
      - "作物生长 +30%"
    taboo: "不可过度砍伐树木"
    faith-gain:
      plant-tree: 5           # 种树获得信仰值
      harvest-crop: 2         # 收获作物获得信仰值
      kill-animal: -5         # 杀死动物减少信仰值

  sun:
    name: "太阳教"
    color: "&e"
    description: "信仰光明与正义"
    blessing:
      - "伤害 +15%"
      - "对不死生物伤害 +30%"
    taboo: "不可在黑暗中长时间停留"
    faith-gain:
      kill-undead: 10         # 击杀不死生物
      daytime-prayer: 5       # 白天祈祷

  moon:
    name: "月亮教"
    color: "&b"
    description: "追求智慧与神秘"
    blessing:
      - "经验获取 +25%"
      - "附魔效果 +20%"
    taboo: "不可在白天进行重要仪式"
    faith-gain:
      enchant-item: 8         # 附魔物品
      night-prayer: 5         # 夜晚祈祷

  war:
    name: "战争教"
    color: "&c"
    description: "崇尚力量与荣耀"
    blessing:
      - "攻击力 +20%"
      - "防御力 +15%"
    taboo: "不可逃避战斗"
    faith-gain:
      kill-player: 15         # 击杀玩家
      win-battle: 25          # 赢得战斗

  peace:
    name: "和平教"
    color: "&f"
    description: "向往和谐与共存"
    blessing:
      - "交易折扣 10%"
      - "声望获取 +20%"
    taboo: "不可主动发起攻击"
    faith-gain:
      trade: 5                # 交易
      help-player: 10         # 帮助玩家

  death:
    name: "死亡教"
    color: "&8"
    description: "理解终结与轮回"
    blessing:
      - "亡灵抗性 +50%"
      - "暗影伤害 +25%"
    taboo: "不可埋葬尸体"
    faith-gain:
      collect-soul: 12        # 收集灵魂
      visit-graveyard: 5      # 访问墓地

  ocean:
    name: "海洋教"
    color: "&9"
    description: "敬畏海洋与深渊"
    blessing:
      - "水下呼吸"
      - "游泳速度 +30%"
    taboo: "不可污染水源"
    faith-gain:
      swim: 1                 # 游泳（每分钟）
      fish: 3                 # 钓鱼

  mountain:
    name: "山岳教"
    color: "&7"
    description: "崇拜高山与大地"
    blessing:
      - "挖掘速度 +25%"
      - "跌落伤害 -50%"
    taboo: "不可破坏山体"
    faith-gain:
      mine-stone: 1           # 挖掘石头
      climb-mountain: 10      # 攀登高山

# 信仰等级
faith-levels:
  0: "&8新手"
  100: "&7初学者"
  200: "&f追随者"
  400: "&a信徒"
  600: "&e狂热者"
  800: "&6虔诚信徒"

# 圣地配置
holy-places:
  default-radius: 50          # 默认圣地范围（格）
  max-holy-power: 1000        # 最大圣力值
  power-regeneration: 5       # 圣力每分钟恢复量
  blessing-cost: 10           # 祝福消耗圣力
  blessing-cooldown: 60       # 祝福冷却时间（秒）
  blessing-duration: 3600     # 祝福持续时间（秒）

# 祝福效果应用间隔（tick）
blessing-interval: 200

# 信仰值自动增长
auto-faith-gain:
  enabled: true
  interval: 6000              # 检查间隔（tick）
  holy-place-bonus: 1         # 在圣地内每次获得的信仰值

# 改变信仰惩罚
faith-change-penalty:
  enabled: true
  reset-faith: true           # 是否重置信仰值
  reset-contributions: false  # 是否重置贡献值
