# 称号显示配置文件
# StarCore Title Display Configuration

display:
  # Tab列表显示配置
  tab:
    enabled: true
    prefix_format: "[{title}] "
    suffix_format: ""
    priority: 100
    # 是否在玩家离线时保留显示
    persist_offline: false

  # 玩家名字前缀配置
  name_prefix:
    enabled: true
    format: "[{badge}]"
    # 是否显示在玩家头顶
    show_above_head: true

  # 全息投影配置
  hologram:
    enabled: true
    # 全息投影行配置（从上到下）
    lines:
      - "&e{title}"
      - "&7{nation}"
      - "&8在线 {online_time}"
    # 相对玩家的Y轴偏移
    offset: -0.3
    # 是否跟随玩家移动
    follow_player: true
    # 更新频率（tick）
    update_interval: 100
    # 可见范围（方块）
    visible_range: 32

  # 聊天前缀配置
  chat:
    enabled: true
    format: "[{title}] "
    priority: 100
    # 是否应用颜色到整个消息
    apply_color_to_message: false

  # 记分板配置
  scoreboard:
    enabled: true
    team_format: "{title}"
    priority: 100
    # 是否使用动态排序
    dynamic_sorting: true
    # 排序依据（title_priority, player_name, custom）
    sort_by: title_priority

# 占位符配置
placeholders:
  # 默认值配置
  defaults:
    title: ""
    badge: ""
    nation: "未加入国家"
    rank: "无排名"
    balance: "0"
    online_time: "0小时"

  # 格式化配置
  formatting:
    # 货币格式化
    balance_format: "short"  # full, short, abbreviated
    # 时间格式化
    time_format: "detailed"  # detailed, simple, hours_only

# 称号显示优先级规则
priority_rules:
  # 是否使用优先级系统
  enabled: true
  # 冲突解决方式（highest_priority, most_recent, player_choice）
  conflict_resolution: highest_priority
  # 是否允许玩家自定义优先级
  allow_player_override: false

# 特效配置
effects:
  # 称号解锁特效
  unlock:
    enabled: true
    play_sound: true
    sound_type: "ENTITY_PLAYER_LEVELUP"
    show_firework: true
    broadcast_to_server: false

  # 称号装备特效
  equip:
    enabled: true
    play_sound: true
    sound_type: "BLOCK_NOTE_BLOCK_PLING"
    show_particles: false

# 权限配置
permissions:
  # 是否需要权限才能装备特定称号
  require_permission: false
  # 权限格式: starcore.title.<title_id>
  permission_format: "starcore.title.{title_id}"

# 性能优化
performance:
  # 缓存配置
  cache:
    enabled: true
    expire_after_minutes: 30
    maximum_size: 1000

  # 批量更新配置
  batch_update:
    enabled: true
    # 批量更新间隔（tick）
    interval: 20
    # 每批次最大玩家数
    max_players_per_batch: 50

  # 异步处理
  async:
    enabled: true
    # 异步线程池大小
    thread_pool_size: 4

# 集成配置
integrations:
  # PlaceholderAPI
  placeholderapi:
    enabled: true
    # 是否注册所有占位符
    register_all: true

  # HolographicDisplays
  holographic_displays:
    enabled: true
    # 全息投影更新模式（always, on_change, manual）
    update_mode: on_change

  # DecentHolograms
  decent_holograms:
    enabled: true
    update_mode: on_change

  # Vault（用于经济显示）
  vault:
    enabled: true
    show_balance: true

  # LuckPerms（用于权限前缀集成）
  luckperms:
    enabled: false
    merge_with_prefix: false
    merge_priority: title_first  # title_first, luckperms_first

# 数据库配置
database:
  # 自动保存间隔（秒）
  auto_save_interval: 300
  # 是否在玩家退出时立即保存
  save_on_quit: true
  # 是否在服务器关闭时保存所有数据
  save_on_shutdown: true

# 调试配置
debug:
  enabled: false
  # 日志级别（INFO, FINE, FINER, FINEST）
  log_level: INFO
  # 是否记录占位符查询
  log_placeholder_requests: false
  # 是否记录显示更新
  log_display_updates: false
