# 天气效果系统配置文件

# 启用天气效果系统
enabled: true

# 天气效果配置
weather-effects:
  clear:
    name: "晴天"
    color: "&e"
    effects:
      mood: 1.1               # 心情 +10%
      work-efficiency: 1.05   # 工作效率 +5%
      visibility: 1.0         # 能见度 100%
    description: "阳光明媚的好天气"

  rain:
    name: "雨天"
    color: "&9"
    effects:
      crop-growth: 1.2        # 作物生长 +20%
      visibility: 0.7         # 能见度 -30%
      fire-damage: 0.5        # 火焰伤害 -50%
    description: "滋润大地的雨水"

  thunderstorm:
    name: "雷暴"
    color: "&5"
    effects:
      outdoor-danger: 1.5     # 户外危险度 +50%
      mining-speed: 0.8       # 挖掘速度 -20%
      visibility: 0.5         # 能见度 -50%
      lightning-risk: 2.0     # 雷击风险 x2
    description: "危险的暴风雨天气"
    warning: true

  snow:
    name: "雪天"
    color: "&f"
    effects:
      movement-speed: 0.85    # 移动速度 -15%
      visibility: 0.8         # 能见度 -20%
      freeze-risk: 1.3        # 冻伤风险 +30%
    description: "寒冷的降雪天气"

# 天气变化通知
notifications:
  enabled: true
  broadcast: true
  show-effects: true
  warning-on-thunderstorm: true

# 效果应用间隔（tick）
effect-interval: 200

# 户外伤害设置（针对极端天气）
outdoor-damage:
  enabled: true
  snow-damage: 1.0          # 雪天户外每30秒受到的伤害
  snow-damage-interval: 600 # 伤害间隔（tick）
  thunderstorm-danger: true # 雷暴天气户外更危险
