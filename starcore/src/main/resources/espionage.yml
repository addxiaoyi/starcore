# ========================================
# STARCORE 间谍模块配置
# ========================================

espionage:
  # 每个国家最多间谍数量
  max-spies-per-nation: 20

  # 每个国家最多同时进行的行动数
  max-active-operations-per-nation: 5

  # 基础被检测概率 (%)
  base-detection-chance: 30

  # 行动冷却时间 (分钟)
  operation-cooldown-minutes: 60

  # 破坏效率 (0.0-1.0)
  sabotage-efficiency: 0.5

  # 资源窃取比例 (0.0-1.0)
  resource-steal-rate: 0.1

  # 是否只在战争期间允许行动
  allow-war-only: false

  # 间谍训练配置
  training:
    # 基础训练成本（可被间谍类型覆盖）
    base-cost: 1000.0
    # 训练时间（秒）
    training-time: 60

  # 行动类型配置
  operations:
    recon:
      # 侦察行动 - 收集目标国家基本信息
      cost: 500.0
      difficulty: 1
      duration-minutes: 10
      min-experience: 0

    steal_resources:
      # 窃取资源 - 偷取目标国库资源
      cost: 2000.0
      difficulty: 3
      duration-minutes: 30
      min-experience: 50

    sabotage:
      # 破坏设施 - 降低目标国家设施效率
      cost: 3000.0
      difficulty: 4
      duration-minutes: 45
      min-experience: 100

    assassinate:
      # 暗杀官员 - 消灭目标国家的高级成员
      cost: 5000.0
      difficulty: 5
      duration-minutes: 60
      min-experience: 150

    incite_defection:
      # 煽动叛变 - 说服目标国家成员叛逃
      cost: 4000.0
      difficulty: 4
      duration-minutes: 50
      min-experience: 100

    steal_technology:
      # 窃取科技 - 获取目标国家科技信息
      cost: 2500.0
      difficulty: 3
      duration-minutes: 35
      min-experience: 50

    diplomatic_sabotage:
      # 破坏外交 - 损害目标国家外交关系
      cost: 1500.0
      difficulty: 2
      duration-minutes: 25
      min-experience: 30

    infiltrate:
      # 间谍渗透 - 安插双面间谍
      cost: 10000.0
      difficulty: 5
      duration-minutes: 90
      min-experience: 200

