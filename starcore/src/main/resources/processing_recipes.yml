# 加工配方配置文件
# 定义资源的加工转换关系

recipes:
  # ========== 冶炼配方 ==========
  smelt_iron:
    name: "冶炼钢铁"
    inputs:
      iron_ore: 2
      coal: 1
    outputs:
      steel: 1
    processing_time: 300  # 5分钟
    energy_cost: 10.0
    required_factory_level: 1

  smelt_copper:
    name: "冶炼铜锭"
    inputs:
      copper_ore: 2
      coal: 1
    outputs:
      copper: 1
    processing_time: 240
    energy_cost: 8.0
    required_factory_level: 1

  smelt_aluminum:
    name: "冶炼铝锭"
    inputs:
      aluminum_ore: 3
      coal: 2
    outputs:
      aluminum: 1
    processing_time: 360
    energy_cost: 15.0
    required_factory_level: 2

  smelt_titanium:
    name: "冶炼钛合金"
    inputs:
      titanium_ore: 2
      coal: 2
      aluminum: 1
    outputs:
      titanium: 1
    processing_time: 600
    energy_cost: 25.0
    required_factory_level: 3

  # ========== 精炼配方 ==========
  refine_oil:
    name: "原油精炼"
    inputs:
      oil: 3
    outputs:
      plastic: 2
      natural_gas: 1
    processing_time: 450
    energy_cost: 20.0
    required_factory_level: 2

  # ========== 化工配方 ==========
  produce_explosives:
    name: "生产炸药"
    inputs:
      coal: 2
      natural_gas: 1
    outputs:
      explosives: 1
    processing_time: 600
    energy_cost: 30.0
    required_factory_level: 3

  produce_rubber:
    name: "合成橡胶"
    inputs:
      oil: 2
      coal: 1
    outputs:
      rubber: 2
    processing_time: 400
    energy_cost: 18.0
    required_factory_level: 2

  # ========== 制造配方 ==========
  craft_ammunition:
    name: "制造弹药"
    inputs:
      steel: 2
      copper: 1
      explosives: 1
    outputs:
      ammunition: 5
    processing_time: 480
    energy_cost: 22.0
    required_factory_level: 2

  craft_weapons:
    name: "制造武器"
    inputs:
      steel: 3
      titanium: 1
      plastic: 1
    outputs:
      weapons: 1
    processing_time: 900
    energy_cost: 40.0
    required_factory_level: 4

  craft_medical:
    name: "生产医疗用品"
    inputs:
      plastic: 2
      cotton: 1
    outputs:
      medical_supplies: 3
    processing_time: 300
    energy_cost: 12.0
    required_factory_level: 2

  # ========== 加工配方 ==========
  process_cotton:
    name: "加工棉布"
    inputs:
      cotton: 3
    outputs:
      silk: 1
    processing_time: 360
    energy_cost: 8.0
    required_factory_level: 1

  process_coffee:
    name: "烘焙咖啡"
    inputs:
      coffee: 2
    outputs:
      coffee: 3
    processing_time: 180
    energy_cost: 5.0
    required_factory_level: 1

  # ========== 高级合金配方 ==========
  advanced_alloy:
    name: "高级合金"
    inputs:
      steel: 2
      titanium: 1
      aluminum: 1
    outputs:
      titanium: 2
    processing_time: 720
    energy_cost: 35.0
    required_factory_level: 5

  # ========== 宝石加工 ==========
  polish_gems:
    name: "打磨宝石"
    inputs:
      gems: 1
      diamond: 1
    outputs:
      gems: 3
    processing_time: 600
    energy_cost: 15.0
    required_factory_level: 3

  # ========== 奢侈品制造 ==========
  luxury_goods:
    name: "奢侈品制造"
    inputs:
      silk: 1
      gems: 1
      gold_ore: 2
    outputs:
      ivory: 2
    processing_time: 900
    energy_cost: 20.0
    required_factory_level: 4

  # ========== 能源转换 ==========
  coal_to_energy:
    name: "煤炭发电"
    inputs:
      coal: 5
    outputs:
      natural_gas: 3
    processing_time: 300
    energy_cost: 0.0
    required_factory_level: 1

  uranium_processing:
    name: "核燃料处理"
    inputs:
      uranium: 1
      steel: 2
    outputs:
      natural_gas: 20
    processing_time: 1800
    energy_cost: 50.0
    required_factory_level: 5
