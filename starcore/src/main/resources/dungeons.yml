# 副本系统配置
# StarCore Dungeon System Configuration

# 副本模块开关
enabled: true

# 副本世界配置
world:
  # 副本世界前缀
  prefix: "dungeon_"
  # 默认世界生成设置
  generator:
    spawn-radius: 10
    environment: NORMAL
    difficulty: NORMAL
  # 自动清理超时时间(分钟)
  cleanup-timeout-minutes: 60

# 副本难度配置
difficulties:
  easy:
    display-name: "简单"
    icon: NETHER_STAR
    player-level-range: 1-10
    mob-scaling: 0.5
    boss-health-multiplier: 0.5
    completion-reward-multiplier: 0.5
    max-party-size: 2
    entry-cooldown-minutes: 30

  normal:
    display-name: "普通"
    icon: IRON_SWORD
    player-level-range: 10-30
    mob-scaling: 1.0
    boss-health-multiplier: 1.0
    completion-reward-multiplier: 1.0
    max-party-size: 4
    entry-cooldown-minutes: 60

  hard:
    display-name: "困难"
    icon: DIAMOND_SWORD
    player-level-range: 30-50
    mob-scaling: 1.5
    boss-health-multiplier: 1.5
    completion-reward-multiplier: 1.5
    max-party-size: 5
    entry-cooldown-minutes: 120

  nightmare:
    display-name: "噩梦"
    icon: NETHERITE_SWORD
    player-level-range: 50+
    mob-scaling: 2.0
    boss-health-multiplier: 2.0
    completion-reward-multiplier: 2.5
    max-party-size: 5
    entry-cooldown-minutes: 240

# 默认副本定义
dungeons:
  # 示例副本1: 哥布林巢穴
  goblin_lair:
    name: "哥布林巢穴"
    description:
      - "&7深入地下的哥布林巢穴"
      - "&7消灭所有敌人并击败首领"
    difficulty: easy
    icon: SPIDER_EYE
    min-players: 1
    max-players: 4
    recommended-level: 5
    entry-fee: 0
    rewards:
      experience: 500
      gold: 100
      items:
        - material: IRON_INGOT
          amount: 10
        - material: GOLD_INGOT
          amount: 3
    rooms:
      - id: entrance
        type: SPAWNER
        mob-type: ZOMBIE
        mob-count: 10
        clear-condition: kill_all
      - id: corridor
        type: TRAP
        traps:
          - ARROW
          - CACTUS
        clear-condition: survive
        survive-duration-seconds: 30
      - id: throne_room
        type: BOSS
        boss:
          entity-type: WITHER_SKELETON
          name: "&c哥布林王"
          health: 500
          abilities:
            - CHARGE
            - SUMMON_MINIONS
          phases:
            - threshold: 0.75
              abilities:
                - SPAWN_AREA_EFFECTS
            - threshold: 0.50
              abilities:
                - ENRAGE
            - threshold: 0.25
              abilities:
                - RAGE_MODE
        clear-condition: defeat_boss
    entrance:
      world: "world"
      x: 100
      y: 64
      z: 200
      yaw: 0
      pitch: 0
    template-world: "dungeon_templates/goblin_lair"

  # 示例副本2: 亡灵地牢
  undead_catacombs:
    name: "亡灵地牢"
    description:
      - "&7古老的地下墓穴"
      - "&7亡灵生物横行"
    difficulty: normal
    icon: BONE
    min-players: 2
    max-players: 4
    recommended-level: 20
    entry-fee: 50
    rewards:
      experience: 2000
      gold: 500
      items:
        - material: DIAMOND
          amount: 2
        - material: BONE
          amount: 16
    rooms:
      - id: crypt_entrance
        type: SPAWNER
        mob-type: SKELETON
        mob-count: 15
        clear-condition: kill_all
      - id: bone_pit
        type: PUZZLE
        puzzle-type: LEVER_SEQUENCE
        clear-condition: solve_puzzle
        puzzle-time-limit-seconds: 120
      - id: lich_chamber
        type: BOSS
        boss:
          entity-type: WITHER
          name: "&5亡灵巫妖"
          health: 2000
          abilities:
            - SUMMON_UNDEAD
            - DARKNESS
            - LIFE_STEAL
          phases:
            - threshold: 0.66
              abilities:
                - SUMMON_PHANTOMS
            - threshold: 0.33
              abilities:
                - UNDEAD_ARMY
                - HEAL_BREAK
        clear-condition: defeat_boss
    entrance:
      world: "world"
      x: 500
      y: 64
      z: -200
      yaw: 180
      pitch: 0
    template-world: "dungeon_templates/undead_catacombs"

  # 示例副本3: 恶龙巢穴
  dragon_lair:
    name: "恶龙巢穴"
    description:
      - "&7传说中的巨龙巢穴"
      - "&7只有真正的勇士才能挑战"
    difficulty: hard
    icon: DRAGON_HEAD
    min-players: 3
    max-players: 5
    recommended-level: 40
    entry-fee: 200
    rewards:
      experience: 10000
      gold: 5000
      items:
        - material: NETHERITE_INGOT
          amount: 1
        - material: ENCHANTED_GOLDEN_APPLE
          amount: 3
        - material: ELYTRA
          amount: 1
    rooms:
      - id: outer_wall
        type: SPAWNER
        mob-type: BLAZE
        mob-count: 20
        clear-condition: kill_all
      - id: fire_maze
        type: TRAP
        traps:
          - FIRE
          - LAVA
        clear-condition: survive
        survive-duration-seconds: 45
      - id: dragon_lair
        type: BOSS
        boss:
          entity-type: ENDER_DRAGON
          name: "&4炎龙领主"
          health: 5000
          abilities:
            - FIREBALL_BARRAGE
            - WING_BLAST
            - FLAME_BREATH
          phases:
            - threshold: 0.80
              abilities:
                - SUMMON_ENDERMEN
            - threshold: 0.60
              abilities:
                - DESTRUCTION_BEAM
            - threshold: 0.40
              abilities:
                - ENDER_DRAGON_SPECIAL_ATTACK
            - threshold: 0.20
              abilities:
                - FINAL_FORM
        clear-condition: defeat_boss
    entrance:
      world: "world"
      x: 1000
      y: 64
      z: 500
      yaw: 90
      pitch: 0
    template-world: "dungeon_templates/dragon_lair"

  # 示例副本4: 噩梦深渊
  nightmare_abyss:
    name: "噩梦深渊"
    description:
      - "&4极限挑战副本"
      - "&7危险程度极高!"
    difficulty: nightmare
    icon: NETHER_STAR
    min-players: 4
    max-players: 5
    recommended-level: 60
    entry-fee: 500
    rewards:
      experience: 50000
      gold: 25000
      items:
        - material: NETHERITE_INGOT
          amount: 3
        - material: BEACON
          amount: 1
        - material: SHULKER_BOX
          amount: 1
    rooms:
      - id: abyss_entrance
        type: SPAWNER
        mob-type: PIGLIN_BRUTE
        mob-count: 30
        clear-condition: kill_all
      - id: chaos_chamber
        type: SURVIVAL
        wave-count: 10
        mob-types:
          - PIGLIN
          - HOGLIN
          - ZOGLIN
          - PIGLIN_BRUTE
        clear-condition: survive_all_waves
      - id: nightmare_lord
        type: BOSS
        boss:
          entity-type: WARDEN
          name: "&c&l噩梦领主"
          health: 10000
          abilities:
            - SONIC_BOOM
            - DARK_BEAM
            - SUMMON_NIGHTMARES
          phases:
            - threshold: 0.90
              abilities:
                - DARK_SPAWN
            - threshold: 0.75
              abilities:
                - AOE_ATTACK
            - threshold: 0.50
              abilities:
                - NIGHTMARE_REALM
            - threshold: 0.25
              abilities:
                - ULTIMATE_RAGE
        clear-condition: defeat_boss
    entrance:
      world: "world"
      x: -500
      y: 32
      z: -500
      yaw: 270
      pitch: 0
    template-world: "dungeon_templates/nightmare_abyss"

# 奖励池配置
reward-pools:
  common:
    weight: 50
    items:
      - material: IRON_INGOT
        amount-range: 5-20
      - material: GOLD_INGOT
        amount-range: 1-5
      - material: COAL
        amount-range: 10-30

  uncommon:
    weight: 30
    items:
      - material: DIAMOND
        amount-range: 1-5
      - material: EMERALD
        amount-range: 5-15
      - material: EXPERIENCE_BOTTLE
        amount-range: 16-32

  rare:
    weight: 15
    items:
      - material: NETHERITE_INGOT
        amount-range: 1-2
      - material: ENCHANTED_GOLDEN_APPLE
        amount-range: 1-3
      - material: DRAGON_BREATH
        amount-range: 5-10

  legendary:
    weight: 5
    items:
      - material: NETHER_STAR
        amount-range: 1-2
      - material: ELYTRA
        amount-range: 1
      - material: SHULKER_SHELL
        amount-range: 8-16

# Boss 能力配置
boss-abilities:
  CHARGE:
    name: "冲锋"
    description: "向目标快速冲刺"
    cooldown-seconds: 8
    damage: 15

  SUMMON_MINIONS:
    name: "召唤随从"
    description: "召唤小怪助战"
    cooldown-seconds: 30
    summon-count: 4
    summon-type: ZOMBIE

  FIREBALL_BARRAGE:
    name: "火球弹幕"
    description: "发射大量火球"
    cooldown-seconds: 10
    projectile-count: 6

  WING_BLAST:
    name: "扇击"
    description: "用翅膀击退附近玩家"
    cooldown-seconds: 15
    knockback-strength: 3
    damage: 10

  SONIC_BOOM:
    name: "音波攻击"
    description: "发出强大的音波冲击"
    cooldown-seconds: 20
    damage: 25
    range: 30

  LIFE_STEAL:
    name: "生命汲取"
    description: "偷取玩家生命"
    cooldown-seconds: 12
    heal-percent: 20

  ENRAGE:
    name: "狂暴"
    description: "进入狂暴状态"
    duration-seconds: 10
    damage-multiplier: 1.5
    speed-multiplier: 1.3

# 每日副本重置时间(cron 表达式)
daily-reset:
  enabled: true
  cron: "0 4 * * *"  # 每天凌晨4点

# 自动保存间隔(秒)
auto-save-interval: 300

# 最大并发副本实例数
max-concurrent-instances: 10

# 副本内玩家保护
protection:
  # 副本内禁止 PvP
  disable-pvp: true
  # 副本内禁止放置/破坏方块
  block-interaction: true
  # 副本内禁止使用桶类物品
  allow-buckets: false
  # 副本内禁止使用鞘翅
  allow-elytra: false

# 审计日志配置
audit:
  enabled: true
  log-commands: true
  log-movement: false
  log-combat: true
  log-chest-access: true
  retention-days: 30
