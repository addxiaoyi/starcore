# ============================================================
# STARCORE 官职系统 GUI 配置
# ============================================================

# --- 官职主菜单 ---
officer-main:
  title: "&d&l⭐ 官职管理 &7| &f主菜单"
  rows: 5

  items:
    # 官职概览
    overview:
      slot: 4
      material: NAME_TAG
      display-name: "&d&l⭐ 官职概览"
      glow: true
      lore:
        - ""
        - "&7当前官职: &e{current_rank}"
        - "&7可用职位: &a{available_count}"
        - "&7总职位: &e{total_count}"
        - ""

    # 我的职位
    my-position:
      slot: 11
      material: PLAYER_HEAD
      skull-owner: "{player_name}"
      display-name: "&f&l👤 我的职位"
      glow: false
      lore:
        - ""
        - "&7官职: &e{current_rank}"
        - "&7权限等级: &b{permission_level}"
        - "&7到期时间: &7{expire_time}"
        - ""
        - "&e▶ 查看权限"

    # 任命官员
    appoint:
      slot: 13
      material: CREEPER_SPAWN_EGG
      display-name: "&a&l📝 任命官员"
      glow: false
      lore:
        - ""
        - "&7可任命: &e{appointable_count}"
        - "&7待审批: &c{pending_count}"
        - ""
        - "&e▶ 任命官员"

    # 官职列表
    ranks-list:
      slot: 15
      material: NAME_TAG
      display-name: "&f&l📋 官职列表"
      glow: false
      lore:
        - ""
        - "&7职位总数: &e{total_ranks}"
        - "&7在职人数: &a{in_office_count}"
        - ""
        - "&e▶ 查看列表"

    # 官职设置
    settings:
      slot: 20
      material: COMPARATOR
      display-name: "&f&l⚙ 官职设置"
      glow: false
      lore:
        - ""
        - "&7自定义官职"
        - "&7设置权限"
        - ""
        - "&e▶ 打开设置"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 官职列表 ---
officer-list:
  title: "&d&l⭐ 官职列表"
  rows: 6

  items:
    # 官职项目
    rank-item:
      slot: 20
      material: NAME_TAG
      display-name: "&e&l{rank_name}"
      glow: false
      lore:
        - ""
        - "&7权限: &b{permission_level}"
        - "&7在职人数: &a{in_office_count}"
        - "&7薪资: &6{salary}"
        - ""
        - "&e▶ 点击查看"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 官职详情 ---
officer-detail:
  title: "&d&l⭐ {rank_name}"
  rows: 4

  items:
    # 官职图标
    icon:
      slot: 4
      material: NAME_TAG
      display-name: "&e&l{rank_name}"
      glow: true
      lore:
        - ""
        - "&7权限等级: &b{level}"

    # 权限列表
    permissions:
      slot: 11
      material: BOOK
      display-name: "&f&l📖 权限列表"
      glow: false
      lore:
        - ""
        - "{permission_list}"

    # 现任官员
    incumbents:
      slot: 15
      material: PLAYER_HEAD
      display-name: "&f&l👥 现任官员"
      glow: false
      lore:
        - ""
        - "&7在职: &a{incumbent_count}"
        - "&7{name_list}"

    # 任命按钮
    appoint-btn:
      slot: 22
      material: CREEPER_SPAWN_EGG
      display-name: "&a&l📝 任命官员"
      glow: true
      lore:
        - ""
        - "&7选择玩家进行任命"
        - ""
        - "&e▶ 任命"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
