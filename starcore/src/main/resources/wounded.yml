# ===============================================
# 伤兵模块配置
# ===============================================
wounded:
  # 基础伤兵容量
  base-wounded-limit: 100
  # 每级增加容量
  wounded-limit-per-level: 20
  # 治疗速度加成 (1.0 = 正常速度)
  healing-speed-bonus: 1.0
  # 到达时基础死亡几率 (0.0-1.0)
  death-chance-on-arrival: 0.05
  # 治疗检查间隔（秒）
  healing-check-interval: 10
  # 是否需要医院设施才能治疗
  enable-hospital-required: true
  # 是否启用死亡风险
  enable-death-risk: true
