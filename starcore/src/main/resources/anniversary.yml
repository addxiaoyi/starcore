# StarCore 纪念日模块配置
# 国家纪念日系统配置文件

# 纪念日设置
anniversary:
  # 最大纪念日数量（每个国家）
  max-anniversaries-per-nation: 20

  # 提前通知天数
  advance-notice-days:
    - 7   # 7天前通知
    - 3   # 3天前通知
    - 1   # 1天前通知

  # 是否启用里程碑周年特殊通知
  enable-milestone-notifications: true

  # 里程碑周年定义
  milestone-years:
    - 1    # 1周年
    - 5    # 5周年
    - 10   # 10周年
    - 25   # 25周年
    - 50   # 50周年
    - 100  # 100周年
    - 150  # 150周年
    - 200  # 200周年

  # 是否允许每年重复纪念日
  default-recurring: true

  # 检查间隔（分钟）
  check-interval-minutes: 60

# 庆祝效果设置
celebration:
  # 是否在聊天中广播
  broadcast-enabled: true

  # 里程碑周年广播范围
  milestone-broadcast-range: 10000

  # 普通周年广播范围
  normal-broadcast-range: 5000

  # 是否播放音效
  sound-enabled: true
  # 里程碑周年音效
  milestone-sound: "entity.wither.spawn"
  # 普通周年音效
  normal-sound: "entity.player.levelup"

# 权限设置
permissions:
  # 创建纪念日权限
  create: "starcore.anniversary.create"
  # 查看纪念日权限
  view: "starcore.anniversary.view"
  # 删除纪念日权限
  delete: "starcore.anniversary.delete"
  # 管理（其他人）纪念日权限
  manage-others: "starcore.anniversary.manage.others"
  # 查看所有纪念日权限
  view-all: "starcore.anniversary.view.all"

# 消息格式
messages:
  # 标题颜色
  title-color: "GOLD"
  # 内容颜色
  content-color: "WHITE"
  # 日期格式
  date-format: "yyyy-MM-dd"
