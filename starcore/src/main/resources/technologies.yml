# StarCore Technology System Configuration
# This file defines all available technologies in the game
#
# ⚠️ Important: config-version is used for migration validation
config-version: "1.0"

technologies:
  # ============================================
  # STONE AGE - Era 0
  # ============================================

  stone_tools:
    name: "石器工具"
    description: "掌握基础石器制作技术，提高资源采集效率"
    era: stone_age
    branch: economic
    cost: 100
    research_time: 300
    resource_costs:
      stone: 50
    effects:
      - type: "mining_speed"
        value: 0.1
        description: "+10% 采矿速度"

  agriculture:
    name: "农业技术"
    description: "学会种植作物，开启定居生活"
    era: stone_age
    branch: economic
    cost: 150
    research_time: 450
    resource_costs:
      wheat: 100
    effects:
      - type: "crop_growth"
        value: 0.15
        description: "+15% 作物生长速度"

  fire_mastery:
    name: "火焰掌控"
    description: "掌握用火技术，可以烹饪食物和照明"
    era: stone_age
    branch: culture
    cost: 120
    research_time: 360
    resource_costs:
      coal: 30
    effects:
      - type: "food_efficiency"
        value: 0.2
        description: "+20% 食物恢复效果"

  tribal_organization:
    name: "部落组织"
    description: "建立部落社会结构，增加人口上限"
    era: stone_age
    branch: culture
    cost: 200
    research_time: 600
    effects:
      - type: "population_cap"
        value: 10
        description: "+10 人口上限"

  primitive_warfare:
    name: "原始战术"
    description: "学习基础战斗技巧，提升近战伤害"
    era: stone_age
    branch: military
    cost: 180
    research_time: 540
    resource_costs:
      stone: 80
      stick: 40
    effects:
      - type: "melee_damage"
        value: 0.1
        description: "+10% 近战伤害"

  # ============================================
  # IRON AGE - Era 1
  # ============================================

  copper_smelting:
    name: "铜矿冶炼"
    description: "学会冶炼铜矿，开启金属时代"
    era: iron_age
    branch: economic
    prerequisites:
      - fire_mastery
      - stone_tools
    cost: 400
    research_time: 900
    resource_costs:
      copper_ore: 200
      coal: 100
    effects:
      - type: "unlock_crafting"
        value: "copper_tools"
        description: "解锁铜制工具制作"

  bronze_weapons:
    name: "青铜武器"
    description: "制造青铜武器，大幅提升军事实力"
    era: iron_age
    branch: military
    prerequisites:
      - copper_smelting
      - primitive_warfare
    cost: 500
    research_time: 1200
    resource_costs:
      copper_ingot: 150
      tin: 50
    effects:
      - type: "attack_damage"
        value: 0.15
        description: "+15% 攻击伤害"
      - type: "unlock_equipment"
        value: "bronze_armor"
        description: "解锁青铜装备"

  iron_working:
    name: "铁器锻造"
    description: "掌握铁器制作，革命性的技术进步"
    era: iron_age
    branch: economic
    prerequisites:
      - copper_smelting
    cost: 600
    research_time: 1500
    resource_costs:
      iron_ore: 300
      coal: 150
    effects:
      - type: "mining_speed"
        value: 0.2
        description: "+20% 采矿速度"
      - type: "unlock_crafting"
        value: "iron_tools"
        description: "解锁铁制工具"

  the_wheel:
    name: "轮子"
    description: "发明轮子，大幅提升运输效率"
    era: iron_age
    branch: economic
    prerequisites:
      - tribal_organization
    cost: 450
    research_time: 1080
    resource_costs:
      wood: 200
      stone: 100
    effects:
      - type: "movement_speed"
        value: 0.15
        description: "+15% 移动速度（带货物时）"
      - type: "inventory_capacity"
        value: 9
        description: "+9 物品栏容量"

  writing_system:
    name: "文字系统"
    description: "发明文字，可以记录和传播知识"
    era: iron_age
    branch: culture
    prerequisites:
      - tribal_organization
    cost: 500
    research_time: 1200
    effects:
      - type: "research_speed"
        value: 0.1
        description: "+10% 科研速度"
      - type: "unlock_feature"
        value: "written_laws"
        description: "解锁成文法律系统"

  military_formation:
    name: "军事编队"
    description: "组织化的军事战术，提升团队作战能力"
    era: iron_age
    branch: military
    prerequisites:
      - primitive_warfare
    cost: 550
    research_time: 1320
    effects:
      - type: "team_damage_bonus"
        value: 0.12
        description: "+12% 团队作战伤害加成"
      - type: "unlock_formation"
        value: "shield_wall"
        description: "解锁盾墙阵型"

  fortification:
    name: "防御工事"
    description: "建造坚固的防御建筑"
    era: iron_age
    branch: military
    prerequisites:
      - stone_tools
    cost: 480
    research_time: 1140
    resource_costs:
      stone: 500
      wood: 200
    effects:
      - type: "defense_bonus"
        value: 0.2
        description: "+20% 防御建筑耐久"
      - type: "unlock_building"
        value: "stone_walls"
        description: "解锁石墙建筑"

  trade_routes:
    name: "贸易路线"
    description: "建立贸易网络，促进经济发展"
    era: iron_age
    branch: economic
    prerequisites:
      - the_wheel
      - writing_system
    cost: 650
    research_time: 1560
    effects:
      - type: "trade_income"
        value: 0.25
        description: "+25% 贸易收入"
      - type: "unlock_feature"
        value: "trading_posts"
        description: "解锁贸易站建造"

  # ============================================
  # INDUSTRIAL AGE - Era 2
  # ============================================

  steam_power:
    name: "蒸汽动力"
    description: "工业革命的核心技术，开启机械化时代"
    era: industrial_age
    branch: economic
    prerequisites:
      - iron_working
    cost: 1200
    research_time: 2400
    resource_costs:
      iron_ingot: 500
      coal: 1000
    effects:
      - type: "production_speed"
        value: 0.3
        description: "+30% 工业生产速度"
      - type: "unlock_machine"
        value: "steam_engines"
        description: "解锁蒸汽机械"

  steel_production:
    name: "钢铁生产"
    description: "炼制高强度钢铁，现代工业的基础"
    era: industrial_age
    branch: economic
    prerequisites:
      - iron_working
      - steam_power
    cost: 1400
    research_time: 2700
    resource_costs:
      iron_ingot: 800
      coal: 600
    effects:
      - type: "resource_yield"
        value: 0.25
        description: "+25% 金属资源产量"
      - type: "unlock_material"
        value: "steel"
        description: "解锁钢铁材料"

  gunpowder:
    name: "火药"
    description: "革命性的军事技术，改变战争形态"
    era: industrial_age
    branch: military
    prerequisites:
      - bronze_weapons
    mutually_exclusive:
      - advanced_archery
    cost: 1100
    research_time: 2200
    resource_costs:
      sulfur: 200
      charcoal: 300
      saltpeter: 150
    effects:
      - type: "ranged_damage"
        value: 0.4
        description: "+40% 远程伤害"
      - type: "unlock_weapon"
        value: "firearms"
        description: "解锁火器"

  advanced_archery:
    name: "高级弓术"
    description: "精通弓箭技术，与火药路线互斥"
    era: industrial_age
    branch: military
    prerequisites:
      - bronze_weapons
    mutually_exclusive:
      - gunpowder
    cost: 950
    research_time: 1900
    resource_costs:
      wood: 400
      string: 200
    effects:
      - type: "bow_damage"
        value: 0.35
        description: "+35% 弓箭伤害"
      - type: "arrow_speed"
        value: 0.2
        description: "+20% 箭矢速度"

  factory_system:
    name: "工厂制度"
    description: "建立工厂生产体系，大规模生产商品"
    era: industrial_age
    branch: economic
    prerequisites:
      - steam_power
      - trade_routes
    cost: 1600
    research_time: 3000
    resource_costs:
      steel: 400
      coal: 800
    effects:
      - type: "production_multiplier"
        value: 1.5
        description: "生产效率 x1.5"
      - type: "unlock_building"
        value: "factories"
        description: "解锁工厂建筑"

  railways:
    name: "铁路系统"
    description: "建造铁路网络，快速运输资源和人员"
    era: industrial_age
    branch: economic
    prerequisites:
      - steam_power
      - steel_production
    cost: 1800
    research_time: 3300
    resource_costs:
      steel: 1000
      wood: 500
    effects:
      - type: "transport_speed"
        value: 0.5
        description: "+50% 运输速度"
      - type: "unlock_transport"
        value: "minecarts_fast"
        description: "解锁高速矿车系统"

  scientific_method:
    name: "科学方法"
    description: "系统化的研究方法，加速科技发展"
    era: industrial_age
    branch: culture
    prerequisites:
      - writing_system
    cost: 1300
    research_time: 2600
    effects:
      - type: "research_speed"
        value: 0.25
        description: "+25% 科研速度"
      - type: "research_cost_reduction"
        value: 0.15
        description: "-15% 科研成本"

  education_system:
    name: "教育体系"
    description: "建立现代教育系统，培养人才"
    era: industrial_age
    branch: culture
    prerequisites:
      - writing_system
    cost: 1150
    research_time: 2300
    effects:
      - type: "xp_gain"
        value: 0.3
        description: "+30% 经验获取"
      - type: "skill_learning"
        value: 0.2
        description: "+20% 技能学习速度"

  # ============================================
  # INFORMATION AGE - Era 3
  # ============================================

  electricity:
    name: "电力技术"
    description: "利用电能，现代文明的基石"
    era: information_age
    branch: economic
    prerequisites:
      - steam_power
      - scientific_method
    cost: 2500
    research_time: 4500
    resource_costs:
      copper_ingot: 1000
      redstone: 500
    effects:
      - type: "power_generation"
        value: 1.0
        description: "解锁电力系统"
      - type: "unlock_machine"
        value: "electric_machines"
        description: "解锁电力机械"

  computers:
    name: "计算机技术"
    description: "信息处理和自动化控制"
    era: information_age
    branch: culture
    prerequisites:
      - electricity
      - scientific_method
    cost: 3000
    research_time: 5400
    resource_costs:
      redstone: 1000
      gold_ingot: 200
      diamond: 50
    effects:
      - type: "automation"
        value: 0.4
        description: "+40% 自动化效率"
      - type: "unlock_system"
        value: "computer_control"
        description: "解锁计算机控制系统"

  telecommunications:
    name: "远程通信"
    description: "跨越距离的即时通信技术"
    era: information_age
    branch: culture
    prerequisites:
      - electricity
    cost: 2800
    research_time: 5000
    resource_costs:
      copper_ingot: 800
      redstone: 600
    effects:
      - type: "communication_range"
        value: 999999
        description: "无限通信距离"
      - type: "unlock_feature"
        value: "long_distance_chat"
        description: "解锁远程聊天系统"

  nuclear_power:
    name: "核能技术"
    description: "原子能的和平利用，清洁高效的能源"
    era: information_age
    branch: economic
    prerequisites:
      - electricity
    cost: 5000
    research_time: 9000
    resource_costs:
      uranium: 500
      steel: 2000
    effects:
      - type: "power_generation"
        value: 10.0
        description: "大幅提升能源产出"
      - type: "unlock_reactor"
        value: "nuclear_reactor"
        description: "解锁核反应堆"

  robotics:
    name: "机器人技术"
    description: "自动化生产和智能机械"
    era: information_age
    branch: economic
    prerequisites:
      - computers
      - factory_system
    cost: 3500
    research_time: 6300
    resource_costs:
      steel: 1500
      redstone: 1000
      diamond: 100
    effects:
      - type: "production_automation"
        value: 0.6
        description: "+60% 自动生产效率"
      - type: "unlock_entity"
        value: "worker_robots"
        description: "解锁工作机器人"

# Technology Combos - Special bonuses when certain tech sets are completed
combos:
  industrial_warfare:
    name: "工业化战争"
    technologies:
      - gunpowder
      - steel_production
      - railways
    effects:
      - type: "military_production"
        value: 0.5
        description: "+50% 军事单位生产速度"

  information_society:
    name: "信息社会"
    technologies:
      - computers
      - telecommunications
      - education_system
    effects:
      - type: "research_breakthrough"
        value: 0.3
        description: "+30% 所有科研速度"

  economic_superpower:
    name: "经济强国"
    technologies:
      - factory_system
      - trade_routes
      - railways
      - robotics
    effects:
      - type: "economic_output"
        value: 0.8
        description: "+80% 经济产出"
