        - "&e▶ 点击查看"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 成就分类列表 ---
achievement-category:
  title: "&6&l🏅 {category_name}"
  rows: 6

  items:
    # 成就项目
    achievement-item:
      slot: 22
      material: GOLD_MEDAL
      display-name: "&e{achievement_name}"
      glow: true
      lore:
        - ""
        - "&7描述: &f{description}"
        - "&7进度: &a{progress}"
        - "&7奖励: &e+{points} &7积分"
        - ""
        - "&e▶ 点击领取"

    # 未解锁
    locked:
      slot: 22
      material: GRAY_DYE
      display-name: "&7{achievement_name}"
      glow: false
      lore:
        - ""
        - "&c尚未解锁"
        - "&7条件: &f{requirement}"
        - "&7进度: &c{progress}"
        - ""

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 成就详情 ---
achievement-detail:
  title: "&6&l🏅 成就详情"
  rows: 3

  items:
    # 成就图标
    icon:
      slot: 4
      material: GOLD_MEDAL
      display-name: "&e&l{achievement_name}"
      glow: true
      lore:
        - ""
        - "&7分类: &e{category}"
        - "&7难度: &c{difficulty}"

    # 描述
    description:
      slot: 13
      material: BOOK
      display-name: "&f&l描述"
      glow: false
      lore:
        - ""
        - "&7{description}"

    # 奖励
    rewards:
      slot: 22
      material: CHEST
      display-name: "&a&l奖励"
      glow: false
      lore:
        - ""
        - "&7积分: &e+{points}"
        - "&7物品: &b{reward_items}"

    # 进度
    progress:
      slot: 31
      material: EXPERIENCE_BOTTLE
      display-name: "&e&l进度"
      glow: false
      lore:
        - ""
        - "&7{progress_bar}"
        - "&7{current} / {target}"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
