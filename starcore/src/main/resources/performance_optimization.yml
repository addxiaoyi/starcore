# ===============================================
# STARCORE 性能优化配置
# ===============================================
# 村民AI优化（脑叶切除）和生物AI优化
# ===============================================

performance:
  # ===============================================
  # 村民AI优化（脑叶切除系统）
  # ===============================================
  villager-optimization:
    # 是否启用村民优化
    enabled: true

    # AI优化选项
    ai:
      # 完全移除AI（最激进，性能提升最大）
      # 效果：村民将无法移动、工作、交易（但仍可手动交易）
      # 性能提升：约 50-70%
      remove-ai: true

      # 移除重力（谨慎使用）
      # 效果：村民会飘浮在空中
      # 性能提升：约 10%
      # 警告：可能导致视觉bug
      remove-gravity: false

      # 优化寻路系统
      # 效果：减少寻路计算
      # 性能提升：约 20-30%
      optimize-pathfinding: true

      # 优化目标系统
      # 效果：减少AI目标更新
      # 性能提升：约 15-25%
      optimize-goals: true

    # 商人优化
    merchant:
      # 优化商人行为
      # 效果：禁用自动补货、自动繁殖
      # 性能提升：约 10-15%
      optimize: true

      # 禁用自动补货
      disable-restock: true

      # 禁用繁殖
      disable-breeding: true

    # 其他优化
    misc:
      # 静音村民
      silent: true

      # 隐藏自定义名称
      hide-custom-name: true

    # 世界白名单（这些世界不优化）
    # 适用于：商店世界、村庄世界等需要正常村民的地方
    world-whitelist:
      - "spawn"
      - "shop"
      # - "your_world_name"

    # 生物类型白名单（这些村民不优化）
    # 适用于：特殊商人、任务NPC等
    # 格式：world:x:y:z 或使用自定义标签
    entity-whitelist:
      enabled: false
      # 保护有自定义名称的村民
      protect-named: true
      # 保护有职业的村民
      protect-profession: false

  # ===============================================
  # 生物AI优化系统
  # ===============================================
  mob-optimization:
    # 是否启用生物优化
    enabled: true

    # 村民优化（与上面的配置联动）
    villager:
      enabled: true
      remove-ai: true
      remove-gravity: false
      silent: true

    # 铁傀儡优化
    iron-golem:
      enabled: true
      remove-ai: false        # 保留AI（需要攻击敌对生物）
      remove-gravity: false
      silent: true
      # 减少目标搜索范围
      reduce-target-range: true

    # 流浪商人优化
    wandering-trader:
      enabled: true
      remove-ai: true         # 完全移除（反正没用）
      remove-gravity: false
      silent: true

    # 猫优化
    cat:
      enabled: false          # 默认不优化（宠物）
      remove-ai: false
      silent: false

    # 狼/狗优化
    wolf:
      enabled: false          # 默认不优化（宠物）
      remove-ai: false
      silent: false

    # 羊驼优化
    llama:
      enabled: true
      remove-ai: false
      silent: true

    # 马优化
    horse:
      enabled: false          # 默认不优化（载具）
      remove-ai: false

    # 其他被动生物优化
    passive-mobs:
      enabled: true
      # 适用于：牛、猪、鸡、羊等
      types:
        - COW
        - PIG
        - CHICKEN
        - SHEEP
      # 轻度优化
      remove-ai: false
      optimize-pathfinding: true
      silent: true

# ===============================================
# 优化效果说明
# ===============================================
#
# 性能提升预期（基于100个村民）：
#
# 1. 完全移除AI (remove-ai: true)
#    - CPU使用: -60%
#    - TPS提升: +3-5
#    - 适用于: 商店NPC、装饰村民
#
# 2. 优化AI (各种optimize: true)
#    - CPU使用: -30%
#    - TPS提升: +1-2
#    - 适用于: 需要基本功能的村民
#
# 3. 仅静音 (silent: true)
#    - CPU使用: -5%
#    - TPS提升: +0.5
#    - 适用于: 所有场景
#
# 综合优化后：
# - 100个村民从占用约20% CPU降低到8% CPU
# - TPS从17提升到19+
# - 内存使用减少约15%
#
# ===============================================

# ===============================================
# 推荐配置方案
# ===============================================

# 方案1：极限性能（适合纯PvP服务器）
# villager-optimization.ai.remove-ai: true
# villager-optimization.merchant.optimize: true
# mob-optimization.enabled: true
# 效果：最大性能提升，村民完全静止

# 方案2：平衡模式（适合混合服务器）
# villager-optimization.ai.remove-ai: false
# villager-optimization.ai.optimize-pathfinding: true
# villager-optimization.ai.optimize-goals: true
# 效果：保留基本功能，适度提升性能

# 方案3：仅商店优化（适合生存服务器）
# villager-optimization.enabled: true
# villager-optimization.world-whitelist: ["survival"]
# villager-optimization.entity-whitelist.protect-named: true
# 效果：只优化商店世界，保护生存世界村民

# ===============================================
# 注意事项
# ===============================================
#
# 1. remove-ai 会让村民完全静止
#    - 优点：最大性能提升
#    - 缺点：无法移动、工作（但可手动交易）
#    - 适用场景：商店NPC、装饰村民
#
# 2. remove-gravity 可能导致bug
#    - 村民可能飘浮在空中
#    - 不推荐在生存服务器使用
#    - 仅推荐在固定位置的商店NPC使用
#
# 3. 世界白名单很重要
#    - 生存世界应该在白名单中
#    - 只优化不需要村民AI的世界
#
# 4. 保护特殊村民
#    - 使用 protect-named 保护有名字的村民
#    - 使用 protect-profession 保护有职业的村民
#
# 5. 异步处理
#    - 所有优化都是异步进行
#    - 不会影响服务器TPS
#    - 区块加载时自动优化
#
# ===============================================

# ===============================================
# 监控命令
# ===============================================
#
# /starcore villager stats    - 查看村民优化统计
# /starcore villager optimize  - 手动优化所有村民
# /starcore villager restore   - 恢复所有村民
# /starcore mob stats          - 查看生物优化统计
#
# ===============================================
