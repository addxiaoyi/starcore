# 四季系统配置文件

# 启用四季系统
enabled: true

# 自动季节变化
auto-change: true

# 每个季节持续的天数（游戏内天数）
days-per-season: 7

# 季节效果配置
seasons:
  spring:
    name: "春季"
    color: "&a"
    effects:
      crop-growth: 1.5        # 作物生长速度 +50%
      health-regen: 1.2       # 生命恢复 +20%
      animal-spawn: 1.3       # 动物生成率 +30%
    description: "万物复苏的季节，适合耕种和畜牧"

  summer:
    name: "夏季"
    color: "&6"
    effects:
      mining-speed: 1.3       # 挖掘速度 +30%
      movement-speed: 1.1     # 移动速度 +10%
      hunger-rate: 1.2        # 饥饿速度 +20%
      fire-resistance: 1.0    # 火焰抗性
    description: "炎热的季节，适合挖矿和探险"

  autumn:
    name: "秋季"
    color: "&c"
    effects:
      harvest-yield: 1.4      # 收获产量 +40%
      experience-gain: 1.2    # 经验获取 +20%
      luck: 1.15              # 幸运值 +15%
    description: "丰收的季节，适合收获和狩猎"

  winter:
    name: "冬季"
    color: "&b"
    effects:
      movement-speed: 0.9     # 移动速度 -10%
      hunger-rate: 1.2        # 饥饿速度 +20%
      damage-resistance: 1.1  # 伤害抗性 +10%
      crop-growth: 0.5        # 作物生长 -50%
    description: "寒冷的季节，生存更加困难"

# 季节变化通知
notifications:
  enabled: true
  broadcast: true
  show-effects: true

# 季节效果应用间隔（tick）
effect-interval: 200

# 季节检查间隔（tick）
check-interval: 200
