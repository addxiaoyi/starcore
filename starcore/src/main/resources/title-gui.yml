# ============================================================
# STARCORE 称号系统 GUI 配置
# ============================================================

# --- 称号主菜单 ---
title-main:
  title: "&d&l✨ 称号系统"
  rows: 5

  items:
    # 当前称号
    equipped:
      slot: 4
      material: NAME_TAG
      display-name: "&d&l✨ 当前称号"
      glow: true
      lore:
        - ""
        - "&7装备称号: &e{equipped_title}"
        - "&7称号效果: &a{effect}"
        - ""
        - "&e▶ 点击管理称号"

    # 可用称号
    available:
      slot: 22
      material: NETHER_STAR
      display-name: "&e&l📦 可用称号"
      glow: false
      lore:
        - ""
        - "&7已获得: &a{owned_count}"
        - "&7未解锁: &7{locked_count}"
        - ""
        - "&e▶ 点击查看全部"

    # 称号预览
    preview:
      slot: 40
      material: END_PORTAL_FRAME
      display-name: "&b&l👁 称号预览"
      glow: false
      lore:
        - ""
        - "&7预览称号效果"
        - ""
        - "&e▶ 点击预览"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 称号列表 ---
title-list:
  title: "&d&l✨ 称号列表"
  rows: 6

  items:
    # 已装备
    equipped-item:
      slot: 4
      material: NAME_TAG
      display-name: "&a&l✓ {title_name}"
      glow: true
      lore:
        - ""
        - "&7效果: &a{effect}"
        - "&7稀有度: &e{rarity}"
        - ""
        - "&e▶ 卸下称号"

    # 已解锁
    unlocked-item:
      slot: 20
      material: NETHER_STAR
      display-name: "&e&l{title_name}"
      glow: false
      lore:
        - ""
        - "&7效果: &b{effect}"
        - "&7稀有度: &e{rarity}"
        - ""
        - "&e▶ 装备称号"

    # 未解锁
    locked-item:
      slot: 20
      material: GRAY_DYE
      display-name: "&7{title_name}"
      glow: false
      lore:
        - ""
        - "&c尚未解锁"
        - "&7条件: &f{requirement}"
        - ""

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 称号详情 ---
title-detail:
  title: "&d&l✨ 称号详情"
  rows: 3

  items:
    # 称号图标
    icon:
      slot: 4
      material: NAME_TAG
      display-name: "&e&l{title_name}"
      glow: true
      lore:
        - ""
        - "&7稀有度: &e{rarity}"

    # 效果
    effect:
      slot: 13
      material: BOOK
      display-name: "&f&l效果"
      glow: false
      lore:
        - ""
        - "&7{effect_description}"

    # 来源
    source:
      slot: 22
      material: MAP
      display-name: "&b&l获取方式"
      glow: false
      lore:
        - ""
        - "&7{source_description}"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
