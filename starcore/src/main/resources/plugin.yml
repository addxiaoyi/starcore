name: StarCore
version: 1.0.0
main: dev.starcore.starcore.StarCorePlugin
api-version: '1.21'
author: StarCore Team
description: 下一代Minecraft核心插件 - 社交、PvP、经济、管理一体化解决方案

commands:
  # 核心主命令（国家/领土/外交/战争/官员/国库/决议/地图等子命令的统一入口）
  starcore:
    description: STARCORE 核心指令入口
    usage: /starcore <nation|claim|war|officer|treasury|diplomacy|government|map|status|reload|...>
    aliases: [sc, 星核]

  # 场景化音效系统
  scsound:
    description: 场景化音效系统（播放/管理环境音效）
    usage: /scsound <play|stop|list|volume|reload> [参数]
    aliases: [starsound, 场景音效]

  # 主菜单
  menu:
    description: 打开主菜单
    usage: /menu
    aliases: [星核菜单, mainmenu]

  # 现代HUD菜单
  hud:
    description: 打开现代毛玻璃风格HUD菜单
    usage: /hud [menu|style|particle|particles|list|preview]
    aliases: [hudmenu, 现代菜单]

  # 社交系统
  friend:
    description: 好友系统（星链）
    usage: /friend <add|remove|list|accept|deny> [玩家]
    aliases: [星链, f]

  guild:
    description: 公会系统（星座）
    usage: /guild <create|invite|kick|leave|info|list> [参数]
    aliases: [星座, g]

  party:
    description: 派对系统
    usage: /party <create|invite|kick|leave|list> [玩家]
    aliases: [小队, p]

  socialgui:
    description: 打开社交菜单
    usage: /socialgui
    aliases: [social, 社交]

  # 邮件系统
  mail:
    description: 邮件系统
    usage: /mail [玩家] [主题] [内容]
    aliases: [邮箱, email, 邮件]
    permission: starcore.mail

  mailbox:
    description: 打开邮箱
    usage: /mailbox
    aliases: [mailgui]

  # 邮件附件系统
  mailattachment:
    description: 邮件附件系统（历史/价值/统计）
    usage: /mailattachment <history|value|check|stats|help>
    aliases: [mailattach, mattach]
    permission: starcore.mail

  # 社会模拟系统
  social:
    description: 社会模拟系统（声望/关系/影响力/文化/新闻）
    usage: /social <rep|rel|inf|cul|news|status>
    aliases: [society, 社会]

  socialsim:
    description: 完整社会模拟系统（声望/阶层/联盟/八卦/活动）
    usage: /socialsim <reputation|relation|influence|class|alliance|gossip|activity|news>
    aliases: [ss, sim, 模拟]

  influencelb:
    description: 影响力排行榜
    usage: /influencelb [daily|weekly|monthly|alltime|me|top|help]
    aliases: [inflb, ilb, 影响力榜]

  msg:
    description: 私聊（星际通讯）
    usage: /msg <玩家> <消息>
    aliases: [tell, w, whisper, 私聊]

  r:
    description: 快速回复
    usage: /r <消息>
    aliases: [reply, 回复]

  # PvP系统
  duel:
    description: 决斗系统（轨道决斗）
    usage: /duel <玩家|accept|deny|cancel|stats|list|forfeit> [参数]
    aliases: [决斗, 1v1]

  pvpstats:
    description: 查看PvP统计
    usage: /pvpstats [玩家]
    aliases: [pvp, stats, 统计]

  # 经济系统
  pay:
    description: 转账星尘
    usage: /pay <玩家> <金额>
    aliases: [转账, transfer]

  balance:
    description: 查看余额
    usage: /balance [玩家]
    aliases: [bal, money, 余额, 星尘]

  baltop:
    description: 查看财富排行榜
    usage: /baltop [页码]
    aliases: [rich, 首富]

  # 排行榜系统
  rank:
    description: 查看玩家排名
    usage: /rank [玩家] [类型] [周期]
    aliases: [ranking, 排名]
  leaderboard:
    description: 查看排行榜
    usage: /leaderboard [类型] [数量]
    aliases: [lb, top, 榜单]
  top:
    description: 查看排行榜
    usage: /top [类型] [数量]
    aliases: [lb, leaderboard]

  # 称号系统
  title:
    description: 称号管理系统
    usage: /title <list|equip|unequip|info|badge> [参数]
    aliases: [称号, titles]

  # 区域系统
  region:
    description: 区域标题系统
    usage: /region <help|info|test|reload>
    aliases: [区域]

  # 城市系统
  city:
    description: 城市管理系统
    usage: /city <create|info|invite|join|kick|...>
    aliases: [城市]
  citymenu:
    description: 打开城市菜单
    usage: /citymenu
    aliases: [城市菜单]

  # Essentials 昵称/传送点
  nick:
    description: 设置昵称
    usage: /nick <昵称>
    aliases: [nickname, 昵称]
  realname:
    description: 查询昵称对应的真实ID
    usage: /realname <昵称>
    aliases: [真名]
  ignore:
    description: 屏蔽某玩家的私聊
    usage: /ignore <玩家>
    aliases: [屏蔽]
  unignore:
    description: 取消屏蔽
    usage: /unignore <玩家>
    aliases: [取消屏蔽]
  warp:
    description: 传送到传送点
    usage: /warp <名称>
    aliases: [传送点]
  setwarp:
    description: 创建传送点
    usage: /setwarp <名称>
    permission: starcore.warp.admin
  delwarp:
    description: 删除传送点
    usage: /delwarp <名称>
    permission: starcore.warp.admin
  warps:
    description: 列出所有传送点
    usage: /warps

  # 家园和传送命令
  home:
    description: 传送到家园
    usage: /home [名称]
    aliases: [家]
  sethome:
    description: 设置家园
    usage: /sethome [名称]
  delhome:
    description: 删除家园
    usage: /delhome <名称>
  homes:
    description: 列出所有家园
    usage: /homes
  tpa:
    description: 请求传送到玩家
    usage: /tpa <玩家>
  tpaccept:
    description: 接受传送请求
    usage: /tpaccept
    aliases: [tpyes]
  tpdeny:
    description: 拒绝传送请求
    usage: /tpdeny
    aliases: [tpno]
  back:
    description: 返回上一个位置
    usage: /back
  spawn:
    description: 传送到主城
    usage: /spawn
    permission: starcore.spawn

  # GUI 命令
  homegui:
    description: 打开家园管理 GUI
    usage: /homegui [页码]
    aliases: [家园gui]
  warpgui:
    description: 打开传送点选择 GUI
    usage: /warpgui [页码]
    aliases: [星港gui]
  baltopgui:
    description: 打开财富排行榜 GUI
    usage: /baltopgui [页码]
  teleporter:
    description: 打开传送中心 GUI
    usage: /teleporter
    aliases: [tp, 传送]

  # 军队系统
  army:
    description: 军队系统
    usage: /army <create|list|info|disband|...>
    aliases: [军队]

  # 夜间突袭系统
  raid:
    description: 夜间突袭系统（发起/参与突袭）
    usage: /raid <create|join|leave|list|info|cancel|status|alert>
    aliases: [突袭]

  # 伤兵系统
  wounded:
    description: 伤兵系统（管理战后伤兵、治疗和康复）
    usage: /wounded <list|info|heal|cancel|status>
    aliases: [伤兵]
  heal:
    description: 伤兵治疗快捷命令
    usage: /heal <list|info|heal|cancel|status>
    aliases: [伤兵治疗]

  # 攻城器械系统
  siege:
    description: 攻城器械系统（建造/部署/管理攻城器械）
    usage: /siege <create|list|info|deploy|cancel|status|help> [参数]
    aliases: [攻城器械]

  # 海军系统
  navy:
    description: 海军系统
    usage: /navy <create|list|info|engage|disband|...>
    aliases: [舰队]

  # 军事学说系统
  doctrine:
    description: 军事学说系统（选择/管理国家军事学说）
    usage: /doctrine <set|list|info|clear|preview|stats> [参数]
    aliases: [doc, 学说]

  # 王位继承系统
  dynasty:
    description: 王位继承系统
    usage: /dynasty <info|abdicate|inherit|heir|claim|list>
    aliases: [王朝, 王位]

  # 战争系统
  war:
    description: 战争系统
    usage: /war <declare|end|status|list|info> [参数]
    aliases: [战争]

  # 外交系统
  diplomacy:
    description: 外交关系系统
    usage: /diplomacy <ally|enemy|neutral|list|check|stats|cooldown> [参数]
    aliases: [外交]

  # 联盟外交系统
  alliance:
    description: 联盟外交系统（邀请/接受/解除联盟）
    usage: /alliance <invite|accept|reject|cancel|list|pending|break|info|stats|cooldown> [参数]
    aliases: [同盟, alliance]

  # 军事联盟系统
  militaryalliance:
    description: 军事联盟系统（互助防御条约/联合军事协议）
    usage: /ma <invite|accept|reject|cancel|list|pending|break|info|upgrade|stats|defense> [参数]
    aliases: [军事联盟]
  ma:
    description: 军事联盟系统快捷命令
    usage: /ma <invite|accept|reject|cancel|list|pending|break|info|upgrade|stats|defense> [参数]
    aliases: [军事联盟快捷]

  # 联邦联盟系统
  fed:
    description: 联邦联盟系统
    usage: /fed <create|disband|rename|invite|join|leave|info|list> [参数]
    aliases: [federation, 联邦]
  alliance2:
    description: 联邦联盟系统备用命令
    usage: /alliance2 <create|disband|rename|invite|join|leave|info|list> [参数]
    aliases: [federation2]

  # 科技系统
  tech:
    description: 科技系统
    usage: /tech <list|info|research|progress|cancel|effects|unlock|reload>
    aliases: [科技]

  # 议会系统
  parliament:
    description: 议会系统（选举/提案/投票）
    usage: /parliament <election|propose|vote|list|info|schedule>
    aliases: [议会]

  # 政党系统
  politicalparty:
    description: 政党系统
    usage: /politicalparty <create|join|list|info|leave|dissolve>
    aliases: [政党, party]

  # 法庭系统
  court:
    description: 法庭系统（起诉/审判/判决）
    usage: /court <file|appoint|list|case|jury|verdict|appeal>
    aliases: [法庭]

  # 仓库系统
  warehouse:
    description: 个人仓库
    usage: /warehouse
    aliases: [仓库, wh]

  # 管理系统
  mute:
    description: 禁言玩家
    usage: /mute <玩家> <时长> <原因>
    permission: starcore.mute

  unmute:
    description: 解除禁言
    usage: /unmute <玩家>
    permission: starcore.unmute

  ban:
    description: 封禁玩家（放逐）
    usage: /ban <玩家> <时长> <原因>
    permission: starcore.ban
    aliases: [放逐, 封禁]

  unban:
    description: 解除封禁
    usage: /unban <玩家>
    permission: starcore.unban

  jail:
    description: 监禁玩家
    usage: /jail <玩家> <时长> <原因>
    permission: starcore.jail
    aliases: [监禁]

  unjail:
    description: 释放玩家
    usage: /unjail <玩家>
    permission: starcore.unjail
    aliases: [释放]

  kick:
    description: 踢出玩家
    usage: /kick <玩家> <原因>
    permission: starcore.kick

  vanish:
    description: 隐身（隐形斗篷）
    usage: /vanish
    permission: starcore.vanish
    aliases: [v, 隐身]

  # WebMap 服务器管理
  webmap:
    description: WebMap 网页地图服务器管理
    usage: /webmap <start|stop|restart|status|cors|reload|help>
    permission: starcore.webmap.admin

  # 资源系统
  resource:
    description: 资源管理系统
    usage: /resource <info|stockpile|market|reserve|trade|factory>
    aliases: [res, 资源]
  resourcegui:
    description: 打开资源管理GUI
    usage: /resourcegui
    aliases: [resgui]

  # 玩家交易系统
  trade:
    description: 玩家交易系统（发起/接受/拒绝交易）
    usage: /trade <offer|accept|reject|cancel|list|received|sent|gui|help>
    aliases: [tr, 交易]

  # 天气控制系统
  weather:
    description: 天气控制系统（设置/查看天气）
    usage: /weather <set|current|forecast|worlds|control|release|auto|info|permission> [参数]
    aliases: [天气, weatherctl]

  weathermenu:
    description: 打开天气管理GUI
    usage: /weathermenu
    aliases: [天气菜单, wmenu]

  # 天气战术系统
  weathertactics:
    description: 天气战术系统（预览/使用/管理天气战术）
    usage: /weathertactics <list|info|use|cooldown|stats|help> [参数]
    aliases: [天气战术]
  wt:
    description: 天气战术快捷命令
    usage: /wt <list|info|use|cooldown|stats|help> [参数]
    aliases: [天气战术快捷]

  # SSL 证书管理
  ssl:
    description: SSL 证书管理（Let's Encrypt）
    usage: /ssl <issue|renew|list|info|revoke|autorenew> [参数]
    permission: starcore.ssl.admin

  # 委托系统
  commission:
    description: 委托系统（发布/接取任务）
    usage: /commission <board|list|create|accept|complete|cancel|abandon|info|stats|help>
    aliases: [委托, comm]

  # 任务系统
  quest:
    description: 任务系统（接取/完成任务）
    usage: /quest <list|available|accept|abandon|info|complete|stats|daily|progress|category>
    aliases: [任务, q]

  # 每日任务系统
  dailyquest:
    description: 每日任务系统
    usage: /dailyquest [list|refresh|progress|info|reward]
    aliases: [daily, 每日任务, dq]

  # 任务GUI系统
  questgui:
    description: 打开任务GUI界面
    usage: /questgui [daily|list|progress|commission|main]
    aliases: [任务gui, qgui, 任务界面]

  # 成就系统
  achievements:
    description: 成就系统（查看/管理成就）
    usage: /achievements [list|stats|category|give|help]
    aliases: [ach, 成就, achievement]

  # 宠物系统
  pet:
    description: 宠物/坐骑系统（召唤/升级/商店）
    usage: /pet <list|shop|summon|despawn|feed|rename|info|upgrade|stats> [参数]
    aliases: [宠物, pets]
  petlist:
    description: 打开宠物列表
    usage: /petlist
    aliases: [mypets, 我的宠物]
  petshop:
    description: 打开宠物商店
    usage: /petshop
    aliases: [宠物店]

  # 经济区系统
  zone:
    description: 经济区系统（创建/管理经济区）
    usage: /zone <create|delete|list|info|upgrade|effect|enable|disable|gui>
    aliases: [经济区, economiczone]

  # 数据库迁移命令
  dbmigrate:
    description: 数据库迁移管理命令
    usage: /dbmigrate <info|migrate|undo|redo|validate|repair|backup|history|pending>
    aliases: [dbmig, migration, migrate]

  # 国际化/语言系统
  language:
    description: 语言切换系统
    usage: /language [list|set|reload] [locale] [player]
    aliases: [lang, 语言, i18n]

  # 统计报告系统
  stats:
    description: 统计报告系统（仪表盘/报告/导出/趋势分析）
    usage: /stats <dashboard|report|export|trend|history|top|server|refresh> [参数]
    aliases: [统计报告, statistics, statreport]

  # 锦标赛系统
  tournament:
    description: 锦标赛系统（创建/加入/开始比赛）
    usage: /tournament <create|join|leave|list|info|start|cancel|gui>
    aliases: [tour, 锦标赛, 比赛]
  tour:
    description: 锦标赛系统（别名）
    usage: /tour <create|join|leave|list|info|start|cancel|gui>
    aliases: [tournament, 锦标赛, 比赛]

  # 战斗系统
  combat:
    description: 实时战斗系统（战斗状态/战场管理/战斗统计）
    usage: /combat <status|list|battlefield|stats|history|reload> [参数]
    aliases: [combat, battle, 战斗, combatsu]

  # 商店系统
  shop:
    description: 商店系统（创建/管理/交易商店）
    usage: /shop <create|list|info|open|add|remove|buy|search|public|private|stats|history|bind|help>
    aliases: [store, 商店]
  npcshop:
    description: NPC商店系统
    usage: /npcshop <bind|unbind|open>
    aliases: [npcstore, npc商店]

  # 领地升级系统
  upgrade:
    description: 领地升级系统
    usage: /upgrade <info|paths|status|upgrade|exp|add-exp|reset|reload> [参数]
    aliases: [升级, upgrade]

  # 副本系统
  dungeon:
    description: 副本系统（多人副本/BOSS战斗/奖励）
    usage: /dungeon <list|info|enter|leave|history|stats|gui|admin> [参数]
    aliases: [副本, df]

  # 旗帜系统
  banner:
    description: 国家旗帜系统（查看/设计/管理旗帜）
    usage: /banner <view|list|pattern|base|color|design|reset|cost|previewcolors>
    aliases: [旗帜, flag]

  # 蓝图系统
  blueprint:
    description: 建筑蓝图系统（创建/保存/复制/粘贴蓝图）
    usage: /blueprint <save|load|paste|list|delete|rotate|mirror|undo|redo|help> [参数]
    aliases: [bp, 蓝图, blueprint]

  # 卫星国系统
  satellite:
    description: 卫星国系统（建立/解除附庸/保护关系）
    usage: /satellite <create|dissolve|release|independence|tribute|collect|info|list|status|help>
    aliases: [卫星, vassal, 附庸]

  # 纪念日系统
  anniversary:
    description: 国家纪念日系统（创建/管理/查看纪念日）
    usage: /anniversary <create|list|info|delete|today|upcoming|celebrate> [参数]
    aliases: [anniv, 纪念日]

  # 国家分裂系统
  split:
    description: 国家分裂系统（分裂国家/审批请求）
    usage: /split <create|approve|reject|cancel|list|info|cost|check|help> [参数]
    aliases: [分裂, nation-split]

  # 压力测试系统
  stresstest:
    description: 服务器压力测试工具
    usage: /stresstest <entity|chunk|player|economy|combat|database|all> [数量]
    aliases: [stress, 压测, stress test]

  # 主权声明系统
  sovereignty:
    description: 主权声明系统（声明/撤销/管理主权）
    usage: /sovereignty <declare|revoke|list|info|status|confirm|addclaim|removeclaim|strength>
    aliases: [sovereign, 主权]

  # 紧急状态系统
  emergency:
    description: 紧急状态系统（宣布/取消/查看紧急状态）
    usage: /emergency <declare|cancel|status|list|extend|types> [参数]
    aliases: [emerg, 紧急状态]

  # 信仰系统
  faith:
    description: 领土信仰系统（祈祷/祈福/信仰等级）
    usage: /faith <info|blessing|stat|leaderboard|help>
    aliases: [祈祷, belief]

  # 契约制度/租约系统
  lease:
    description: 契约制度/租约系统（创建/管理/签署租约）
    usage: /lease <create|list|info|sign|reject|terminate|renew|pay|accept> [参数]
    aliases: [契约, contract, 租约]

  # 领土租借系统
  rent:
    description: 领土租借系统（出租/承租/管理租借领土）
    usage: /rent <create|list|info|accept|reject|terminate|renew|proposals|stats> [参数]
    aliases: [territory-rent, 租借]

  # 领土仲裁系统
  arbitration:
