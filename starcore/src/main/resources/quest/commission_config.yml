# 委托系统配置文件
# Commission System Configuration

# 委托系统设置
settings:
  # 委托发布基础费用
  creation_cost: 100.0

  # 委托税率（平台抽成）
  tax_rate: 0.1

  # 每个玩家最多发布的委托数量
  max_commissions_per_player: 3

  # 每个玩家最多接取的委托数量
  max_accepted_commissions: 5

  # 委托过期时间（天）
  expire_days: 7

  # 最低赏金
  min_reward: 50.0

  # 最高赏金
  max_reward: 10000.0

  # 是否允许取消已发布的委托
  allow_cancel: true

  # 取消委托的退款比例
  cancel_refund_rate: 0.5

  # 是否允许放弃已接取的委托
  allow_abandon: true

  # 放弃委托的惩罚（声望减少）
  abandon_penalty: 10

# 委托类型权重配置
type_weights:
  COLLECT: 20
  KILL: 15
  BUILD: 10
  ESCORT: 5
  DELIVERY: 15
  EXPLORE: 10
  CUSTOM: 25

# 委托难度奖励倍率
difficulty_multipliers:
  EASY: 1.0
  NORMAL: 1.5
  HARD: 2.0
  EXPERT: 3.0
  LEGENDARY: 5.0

# 委托板设置
board:
  # 每页显示的委托数量
  page_size: 10

  # 默认排序方式
  default_sort: REWARD_DESC

  # 是否显示已过期的委托
  show_expired: false

  # 是否显示已接取的委托
  show_accepted: false

  # 刷新间隔（秒）
  refresh_interval: 30

# 推荐委托设置
recommendations:
  # 推荐数量
  count: 5

  # 推荐等级范围（玩家等级 ± 范围）
  level_range: 10

  # 是否优先显示高赏金委托
  prioritize_high_reward: true

# 委托完成奖励加成
completion_bonuses:
  # 快速完成奖励（在1小时内完成）
  fast_completion:
    multiplier: 1.2
    experience_bonus: 50

  # 完美完成奖励（所有目标都超额完成）
  perfect_completion:
    multiplier: 1.5
    experience_bonus: 100

  # 连续完成奖励
  streak_rewards:
    5:  # 连续完成5个委托
      money: 100.0
      experience: 200
    10: # 连续完成10个委托
      money: 300.0
      experience: 500
    25: # 连续完成25个委托
      money: 800.0
      experience: 1200
    50: # 连续完成50个委托
      money: 2000.0
      experience: 3000

# 委托声望系统
reputation:
  # 是否启用声望系统
  enabled: true

  # 完成委托获得的声望
  complete_gain: 5

  # 放弃委托失去的声望
  abandon_loss: 10

  # 委托过期失去的声望
  expire_loss: 3

  # 声望等级
  levels:
    0: "新手"
    50: "学徒"
    100: "熟练"
    250: "专家"
    500: "大师"
    1000: "传奇"

  # 声望等级奖励
  level_rewards:
    50:  # 学徒
      max_commissions: 4
      tax_discount: 0.05
    100: # 熟练
      max_commissions: 5
      tax_discount: 0.1
    250: # 专家
      max_commissions: 6
      tax_discount: 0.15
    500: # 大师
      max_commissions: 8
      tax_discount: 0.2
    1000: # 传奇
      max_commissions: 10
      tax_discount: 0.25

# 委托分类
categories:
  - id: "gathering"
    name: "采集"
    icon: "DIAMOND_PICKAXE"
    color: "&b"

  - id: "combat"
    name: "战斗"
    icon: "DIAMOND_SWORD"
    color: "&c"

  - id: "building"
    name: "建造"
    icon: "BRICKS"
    color: "&e"

  - id: "trading"
    name: "交易"
    icon: "EMERALD"
    color: "&a"

  - id: "exploration"
    name: "探索"
    icon: "COMPASS"
    color: "&d"

  - id: "crafting"
    name: "制作"
    icon: "CRAFTING_TABLE"
    color: "&6"

  - id: "farming"
    name: "农业"
    icon: "GOLDEN_HOE"
    color: "&2"

  - id: "special"
    name: "特殊"
    icon: "NETHER_STAR"
    color: "&5"

# 自动委托模板（系统生成）
auto_templates:
  gather_wood:
    title: "收集木材"
    description: "收集指定数量的原木"
    type: COLLECT
    difficulty: EASY
    category: "gathering"
    min_level: 1
    objectives:
      - type: COLLECT_ITEM
        description: "收集原木"
        amount: 64
        target: "OAK_LOG"
    reward_range:
      min: 50.0
      max: 100.0

  kill_zombies:
    title: "清理僵尸"
    description: "击杀指定数量的僵尸"
    type: KILL
    difficulty: NORMAL
    category: "combat"
    min_level: 10
    objectives:
      - type: KILL_ENTITY
        description: "击杀僵尸"
        amount: 20
        target: "ZOMBIE"
    reward_range:
      min: 100.0
      max: 200.0

  build_house:
    title: "建造房屋"
    description: "建造一座房屋"
    type: BUILD
    difficulty: NORMAL
    category: "building"
    min_level: 15
    objectives:
      - type: PLACE_BLOCK
        description: "放置方块"
        amount: 200
        target: "STONE_BRICKS"
    reward_range:
      min: 150.0
      max: 300.0

  deliver_goods:
    title: "运送货物"
    description: "将货物运送到指定地点"
    type: DELIVERY
    difficulty: EASY
    category: "trading"
    min_level: 5
    objectives:
      - type: DELIVER_ITEM
        description: "运送物品"
        amount: 32
        target: "WHEAT"
    reward_range:
      min: 80.0
      max: 150.0

  explore_area:
    title: "探索区域"
    description: "探索未知区域"
    type: EXPLORE
    difficulty: HARD
    category: "exploration"
    min_level: 20
    objectives:
      - type: REACH_LOCATION
        description: "到达目标地点"
        amount: 1
    reward_range:
      min: 200.0
      max: 400.0

# 消息配置
messages:
  commission_created: "&a委托发布成功！委托ID: {id}"
  commission_accepted: "&a成功接取委托：{title}"
  commission_completed: "&6委托完成！获得奖励：{reward} 金币"
  commission_expired: "&c委托已过期：{title}"
  commission_cancelled: "&e委托已取消"
  commission_abandoned: "&c您已放弃委托：{title}"
  insufficient_funds: "&c金币不足！需要：{cost} 金币"
  commission_limit: "&c您已达到委托发布数量上限"
  accept_limit: "&c您已达到委托接取数量上限"
  not_found: "&c委托不存在"
  already_accepted: "&c该委托已被其他玩家接取"
  level_requirement: "&c等级不足！需要等级：{level}"
  reputation_gain: "&a声望 +{amount}"
  reputation_loss: "&c声望 -{amount}"
