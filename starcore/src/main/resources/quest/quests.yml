# 任务系统配置文件
# StarCore Quest System Configuration

# 任务系统设置
settings:
  # 每个玩家最多同时接取的任务数量
  max_active_quests: 20

  # 每个玩家每日任务数量上限
  max_daily_quests: 10

  # 每日任务刷新时间（小时，24小时制）
  daily_refresh_hour: 4

  # 是否启用个性化每日任务
  personalized_daily_quests: true

  # 每日任务数量
  daily_quest_count: 5

  # 任务超时自动失败
  auto_fail_expired: true

# 委托系统设置
commission:
  # 委托发布基础费用
  creation_cost: 100.0

  # 委托税率（0.1 = 10%）
  tax_rate: 0.1

  # 每个玩家最多发布的委托数
  max_commissions_per_player: 3

  # 每个玩家最多接取的委托数
  max_accepted_commissions: 5

  # 委托过期时间（天）
  expire_days: 7

