# ===============================================
# Marker Command Messages
# ===============================================
command: 
  marker: 
    usage: "§e/sc marker <create|delete|list|edit|navigate> [args]"
    description: "Manage map markers"
    create: 
      usage: "§e/sc marker create <name> [category] [color]"
      description: "Create marker at current location"
      examples: 
        waypoint: "§e/sc marker create MyHome home #22C55E"
        shop: "§e/sc marker create WeaponShop shop #EAB308"
    delete: 
      usage: "§e/sc marker delete <name|ID>"
      description: "Delete marker"
      confirm: "§cConfirm deleting marker §e{name}§c?"
      success: "§aMarker deleted!"
    list: 
      usage: "§e/sc marker list [category]"
      description: "View your marker list"
    edit: 
      usage: "§e/sc marker edit <name|ID> [property] [value]"
      description: "Edit marker properties"
      properties: 
        name: "Name"
        description: "Description"
        color: "Color"
        pinned: "Pinned"
        visible-nation: "Visible to nation"
        visible-all: "Visible to all"
    navigate: 
      usage: "§e/sc marker navigate <name>"
      description: "Teleport to marker location"
    categories: 
      header: "§6========== §eAvailable Marker Categories §6=========="
      waypoint: "§eWaypoint §7- Travel marker"
      home: "§eHome §7- Important location"
      shop: "§eShop §7- Trading location"
      farm: "§eFarm §7- Resource location"
      battle: "§eBattle §7- Combat marker"
      event: "§eEvent §7- Activity marker"

