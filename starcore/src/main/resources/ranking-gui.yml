# ============================================================
# STARCORE 排行榜系统 GUI 配置
# ============================================================

# --- 排行榜选择 ---
ranking-main:
  title: "&e&l🏆 排行榜 &7| &f选择榜单"
  rows: 3

  items:
    kills:
      slot: 11
      material: DIAMOND_SWORD
      display-name: "&c&l击杀榜"
      glow: false
      lore:
        - ""
        - "&7查看玩家击杀排名"
        - ""
        - "&e▶ 点击查看"

    deaths:
      slot: 13
      material: SKELETON_SKULL
      display-name: "&7&l死亡榜"
      glow: false
      lore:
        - ""
        - "&7查看玩家死亡排名"
        - ""
        - "&e▶ 点击查看"

    playtime:
      slot: 15
      material: CLOCK
      display-name: "&b&l在线时间榜"
      glow: false
      lore:
        - ""
        - "&7查看玩家在线时间"
        - ""
        - "&e▶ 点击查看"

    kd-ratio:
      slot: 22
      material: GOLDEN_CHESTPLATE
      display-name: "&a&lK/D榜"
      glow: false
      lore:
        - ""
        - "&7查看玩家K/D比排名"
        - ""
        - "&e▶ 点击查看"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- Top10 排行 ---
top10:
  title: "&e&l🏆 {stat_type}排行榜 &7| &fTop10"
  rows: 4

  items:
    # 排名项目 (模板)
    rank-1:
      slot: 11
      material: GOLD_MEDAL
      display-name: "&6&l🥇 第1名"
      glow: true
      lore:
        - ""
        - "&7玩家: &e{player_name}"
        - "&7数值: &a{value}"
        - ""

    rank-2:
      slot: 13
      material: SILVER_MEDAL
      display-name: "&f&l🥈 第2名"
      glow: false
      lore:
        - ""
        - "&7玩家: &e{player_name}"
        - "&7数值: &a{value}"
        - ""

    rank-3:
      slot: 15
      material: BRICK
      display-name: "&c&l🥉 第3名"
      glow: false
      lore:
        - ""
        - "&7玩家: &e{player_name}"
        - "&7数值: &a{value}"
        - ""

    rank-other:
      slot: 20
      material: IRON_INGOT
      display-name: "&f&l#{rank} {player_name}"
      glow: false
      lore:
        - ""
        - "&7数值: &e{value}"
        - ""

    back:
      slot: 31
      material: ARROW
      display-name: "&c&l← 返回"
      glow: false
      lore:
        - ""
        - "&e▶ 点击返回"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 我的排名 ---
my-ranking:
  title: "&e&l🏆 我的排名"
  rows: 3

  items:
    my-rank:
      slot: 13
      material: PLAYER_HEAD
      skull-owner: "{player_name}"
      display-name: "&b&l{player_name}"
      glow: true
      lore:
        - ""
        - "&7榜单: &e{stat_type}"
        - "&7排名: &e#{rank}"
        - "&7数值: &a{value}"
        - "&7前一名差: &c{distance}"
        - ""

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
