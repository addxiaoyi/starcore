# ===============================================
# StarCore 军事学说系统配置
# Feature ID: 20
# ===============================================

# 学说切换冷却时间（毫秒）
# 默认 24 小时 = 86400000 毫秒
switch-cooldown-ms: 86400000

# 学说切换费用
# 0 表示免费切换
switch-cost: 500.0

# 学说变更通知
notification:
  # 是否启用通知
  enabled: true
  # 是否向全服广播
  broadcast: false
  # 是否向国家成员通知
  notify-nation: true

# 学说效果配置
effects:
  # 是否在战斗计算中应用学说加成
  apply-to-battle: true
  # 是否在军队创建时应用学说加成
  apply-to-creation: true
  # 是否在补给时应用学说加成
  apply-to-supply: true

# 可用的学说类型（无需修改，由代码定义）
doctrines:
  - blitzkrieg       # 闪电战
  - fortress         # 堡垒防御
  - artillery        # 炮兵先导
  - total_war        # 总体战
  - elite_forces     # 精英部队
  - guerrilla        # 游击战
  - sea_power        # 海军霸权
  - air_power        # 空军优先
  - economic_military # 经济军事