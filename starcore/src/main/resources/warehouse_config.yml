# 仓库系统配置文件
# StarCore Warehouse System Configuration

warehouse:
  # 个人仓库配置
  personal:
    # 基础容量（1级时的格子数，必须是9的倍数）
    base_capacity: 27
    # 最大等级
    max_level: 10
    # 升级费用倍率（每级费用 = 基础费用 * 倍率^(等级-1)）
    upgrade_cost_multiplier: 1.5
    # 基础升级费用
    base_upgrade_cost: 1000

  # 国家仓库配置
  nation:
    base_capacity: 54
    max_level: 15
    upgrade_cost_multiplier: 2.0
    base_upgrade_cost: 5000

  # 共享仓库配置
  shared:
    base_capacity: 36
    max_level: 10
    upgrade_cost_multiplier: 1.5
    base_upgrade_cost: 2000

  # 高级仓库配置
  premium:
    base_capacity: 54
    max_level: 20
    upgrade_cost_multiplier: 1.2
    base_upgrade_cost: 3000

  # 远程访问配置
  remote_access:
    # 是否启用远程访问
    enabled: true
    # 最大距离（-1为无限制，单位：格）
    max_distance: 1000
    # 每次远程访问费用
    cost_per_use: 100
    # 所有者和管理员是否免费
    free_for_admin: true
    # 高级仓库是否免费远程访问
    premium_free: true

  # 日志配置
  logs:
    # 是否启用日志记录
    enabled: true
    # 日志保留天数
    retention_days: 30
    # 是否记录IP地址
    record_ip: false
    # 自动清理时间（24小时制）
    cleanup_hour: 3

  # 功能开关
  features:
    # 是否允许共享仓库
    allow_sharing: true
    # 是否允许仓库锁定
    allow_locking: true
    # 是否允许自动整理
    auto_sort: true
    # 是否允许快速存取（Shift+点击）
    quick_transfer: true

  # 升级等级配置
  levels:
    # 等级1（默认）
    1:
      capacity: 27
      upgrade_cost: 1000
      materials:
        CHEST: 4
      upgrade_time: 0  # 秒

    # 等级2
    2:
      capacity: 36
      upgrade_cost: 1500
      materials:
        CHEST: 8
        IRON_BLOCK: 2
      upgrade_time: 60

    # 等级3
    3:
      capacity: 45
      upgrade_cost: 2250
      materials:
        CHEST: 12
        IRON_BLOCK: 4
        GOLD_BLOCK: 1
      upgrade_time: 120

    # 等级4
    4:
      capacity: 54
      upgrade_cost: 3375
      materials:
        CHEST: 16
        IRON_BLOCK: 6
        GOLD_BLOCK: 2
      upgrade_time: 180

    # 等级5
    5:
      capacity: 63
      upgrade_cost: 5063
      materials:
        CHEST: 20
        IRON_BLOCK: 8
        GOLD_BLOCK: 4
        DIAMOND_BLOCK: 1
      upgrade_time: 300

    # 等级6
    6:
      capacity: 72
      upgrade_cost: 7594
      materials:
        CHEST: 24
        IRON_BLOCK: 10
        GOLD_BLOCK: 6
        DIAMOND_BLOCK: 2
      upgrade_time: 360

    # 等级7
    7:
      capacity: 81
      upgrade_cost: 11391
      materials:
        CHEST: 28
        IRON_BLOCK: 12
        GOLD_BLOCK: 8
        DIAMOND_BLOCK: 3
      upgrade_time: 420

    # 等级8
    8:
      capacity: 90
      upgrade_cost: 17086
      materials:
        CHEST: 32
        IRON_BLOCK: 14
        GOLD_BLOCK: 10
        DIAMOND_BLOCK: 4
        EMERALD_BLOCK: 1
      upgrade_time: 480

    # 等级9
    9:
      capacity: 99
      upgrade_cost: 25629
      materials:
        CHEST: 36
        IRON_BLOCK: 16
        GOLD_BLOCK: 12
        DIAMOND_BLOCK: 5
        EMERALD_BLOCK: 2
      upgrade_time: 540

    # 等级10（最高级）
    10:
      capacity: 108
      upgrade_cost: 38444
      materials:
        CHEST: 40
        IRON_BLOCK: 20
        GOLD_BLOCK: 15
        DIAMOND_BLOCK: 8
        EMERALD_BLOCK: 4
        NETHERITE_BLOCK: 1
      upgrade_time: 600

# 权限配置示例
# 权限等级：NONE < VIEW < WITHDRAW < DEPOSIT < FULL < ADMIN < OWNER
permissions:
  default:
    # 新创建的仓库默认权限设置
    owner_permission: OWNER
    # 是否允许非所有者创建共享仓库
    allow_create_shared: true
    # 每个玩家最多可创建的个人仓库数量
    max_personal_warehouses: 3

# 数据库表名配置
database:
  tables:
    warehouses: "starcore_warehouses"
    items: "starcore_warehouse_items"
    logs: "starcore_warehouse_logs"
    permissions: "starcore_warehouse_permissions"

# GUI配置
gui:
  # 标题颜色代码
  title_color: "&6"
  # 是否启用声音效果
  sound_effects: true
  # 是否显示粒子效果
  particle_effects: true

# 性能优化
performance:
  # 日志查询缓存时间（秒）
  log_cache_time: 60
  # 最大并发升级数量
  max_concurrent_upgrades: 10
  # 异步操作超时时间（秒）
  async_timeout: 30
