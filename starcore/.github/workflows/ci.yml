name: CI Build & Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx2048m -Xms512m

jobs:
  # ========== Unit Tests ==========
  unit-tests:
    name: Unit Tests (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests
        run: mvn test -Dtest='!*PerformanceBatchSamplesTest*,!StoragePerformanceBenchmark*'

      - name: Generate test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-unit
          path: target/surefire-reports/
          retention-days: 7

      - name: Generate JaCoCo coverage report
        if: always()
        run: mvn jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Generate coverage badge
        run: |
          COVERAGE=$(cat target/site/jacoco/jacoco.xml | grep -oP '(?<=<counter type="LINE" missed="\d+" covered="\d+"/>' | head -1 | grep -oP '\d+' | tail -1)
          COVERAGE=$(cat target/site/jacoco/jacoco.xml | grep -oP 'covered="\K\d+' | head -1)
          MISSED=$(cat target/site/jacoco/jacoco.xml | grep -oP 'missed="\K\d+' | head -1)
          if [ -n "$COVERAGE" ] && [ -n "$MISSED" ]; then
            TOTAL=$((COVERAGE + MISSED))
            PERCENT=$((COVERAGE * 100 / TOTAL))
            echo "Line Coverage: ${PERCENT}%"
          fi

  # ========== Integration Tests ==========
  integration-tests:
    name: Integration Tests (MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: starcore_test
          MYSQL_USER: starcore
          MYSQL_PASSWORD: starcore123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h localhost -u root -ptestpass && break
            sleep 1
          done

      - name: Create test database
        run: mysql -h localhost -u root -ptestpass -e "CREATE DATABASE IF NOT EXISTS starcore_test;"

      - name: Run integration tests
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DATABASE: starcore_test
          MYSQL_USER: starcore
          MYSQL_PASSWORD: starcore123
        run: mvn verify -Pitest -Dtest='*IntegrationTest*,*Sql*Test*'

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-integration
          path: target/surefire-reports/
          retention-days: 7

  # ========== Code Quality ==========
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: mvn checkstyle:check -DskipTests || true

      - name: Upload Checkstyle results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          retention-days: 7

  # ========== Build & Package ==========
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [unit-tests, code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: starcore-jar
          path: target/starcore-*.jar
          retention-days: 30

      - name: Upload obfuscated JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: starcore-obfuscated-jar
          path: target/starcore-*-obfuscated.jar
          retention-days: 30

  # ========== Performance Tests ==========
  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[perf]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run performance benchmarks
        run: mvn test -Dtest='StoragePerformanceBenchmark,*PerformanceBatchSamplesTest*'

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/surefire-reports/
          retention-days: 30
