# PvP 系统配置
# StarCore v1.0.0

# ==================== 决斗系统 ====================
duel:
  # 决斗请求超时时间（秒）
  request-timeout: 60
  # 决斗准备时间（秒）- 传送后等待开始的时间
  preparation-time: 5
  # 决斗超时时间（秒）- 0 表示不超时
  timeout: 600
  # 允许的最大赌注金额
  max-wager: 10000.0
  # 最小赌注金额
  min-wager: 0.0
  # 是否启用赌注系统
  wager-enabled: true
  # 观战是否免费
  spectator-free: true

# ==================== 决斗 Kit 系统 ====================
kits:
  # 默认装备
  default:
    name: "默认"
    enabled: true
    # 装备内容（物品格式：材质:数量 或 材质:数量:属性:值）
    armor:
      helmet: DIAMOND_HELMET
      chestplate: DIAMOND_CHESTPLATE
      leggings: DIAMOND_LEGGINGS
      boots: DIAMOND_BOOTS
    weapons:
      - DIAMOND_SWORD
    # 药水效果（格式：效果:等级:持续时间(秒)）
    effects:
      - FIRE_RESISTANCE:0:300
    # 清除的负面药水效果
    clear-effects: true

  # Overpowered 装备
  overpowered:
    name: "OP装备"
    enabled: true
    armor:
      helmet: NETHERITE_HELMET
      chestplate: NETHERITE_CHESTPLATE
      leggings: NETHERITE_LEGGINGS
      boots: NETHERITE_BOOTS
    weapons:
      - NETHERITE_SWORD
      - BOW
      - ARROW:64
    effects:
      - FIRE_RESISTANCE:0:600
      - STRENGTH:1:300
      - SPEED:1:300
    clear-effects: true

  # 经典装备
  classic:
    name: "经典"
    enabled: true
    armor:
      helmet: IRON_HELMET
      chestplate: IRON_CHESTPLATE
      leggings: IRON_LEGGINGS
      boots: IRON_BOOTS
    weapons:
      - IRON_SWORD
    effects: []
    clear-effects: true

  # 徒手装备
  barehand:
    name: "徒手"
    enabled: true
    armor: {}
    weapons: []
    effects: []
    clear-effects: true

  # 弓箭装备
  archer:
    name: "弓箭"
    enabled: true
    armor:
      helmet: LEATHER_HELMET
      chestplate: CHAINMAIL_CHESTPLATE
      leggings: LEATHER_LEGGINGS
      boots: LEATHER_BOOTS
    weapons:
      - BOW
      - ARROW:64
    effects:
      - SPEED:0:300
    clear-effects: true

# ==================== BO3/BO5 多局制 ====================
best-of:
  # 是否启用 BO 多局制
  enabled: true
  # 默认局数选项
  options: [1, 3, 5]
  # 获胜需要的最小回合数
  wins-required:
    1: 1
    3: 2
    5: 3
  # 每回合之间的间隔（秒）
  round-interval: 3
  # 多局制决斗超时时间（秒）- 每回合单独计时
  round-timeout: 300

# ==================== 奖励系统 ====================
rewards:
  # 是否启用奖励系统
  enabled: true
  # 决斗胜利基础奖励（金币）
  win-base: 10.0
  # 决斗胜利赌注奖励比例
  wager-ratio: 1.0
  # 连胜奖励配置
  winstreak:
    enabled: true
    # 每 N 场连胜增加奖励倍率
    multiplier-per: 5
    # 最大奖励倍率
    max-multiplier: 3.0
    # 每场连胜奖励金币
    per-win: 5.0

# ==================== 连杀系统 ====================
killstreak:
  # 是否启用连杀系统
  enabled: true
  # 连杀里程碑配置
  milestones:
    - kills: 3
      name: "大杀特杀"
      reward: 100
      broadcast: true
    - kills: 5
      name: "暴走"
      reward: 200
      broadcast: true
    - kills: 10
      name: "主宰"
      reward: 500
      broadcast: true
    - kills: 15
      name: "无人能挡"
      reward: 1000
      broadcast: true
    - kills: 20
      name: "如同天神"
      reward: 2000
      broadcast: true
    - kills: 25
      name: "传说"
      reward: 5000
      broadcast: true
    - kills: 30
      name: "不朽"
      reward: 10000
      broadcast: true
  # 是否启用终结连杀奖励
  vengeance-reward:
    enabled: true
    # 终结奖励基数
    base: 50
    # 按被终结连杀数额外增加
    per-streak: 10

# ==================== 统计系统 ====================
stats:
  # 是否启用统计系统
  enabled: true
  # 统计保存间隔（秒）
  save-interval: 300
  # 排行榜显示数量
  leaderboard-size: 10

# ==================== 消息配置 ====================
messages:
  # 决斗请求发送
  request-sent: "&a已向 {player} 发送决斗请求"
  request-received: "&e{player} 向你发起了决斗！输入 /duel accept 接受或 /duel deny 拒绝"
  # 决斗接受
  accepted: "&a决斗已开始！"
  accepted-other: "&e{player} 接受了你的决斗请求！"
  # 决斗拒绝
  denied: "&c你拒绝了决斗请求"
  denied-other: "&c{player} 拒绝了你的决斗请求"
  # 决斗开始
  countdown: "&e决斗将在 &f{seconds} &e秒后开始..."
  started: "&a&l决斗开始！"
  # 决斗结束
  won: "&a&l✔ 决斗胜利！"
  lost: "&c&l✘ 决斗失败！"
  draw: "&e&l✖ 决斗平局！"
  # 观战
  spectate-joined: "&7你已进入观战模式"
  spectate-left: "&7你已离开观战模式"
  # 错误消息
  not-in-duel: "&c你当前不在决斗中"
  target-in-duel: "&c对方正在决斗中"
  already-in-duel: "&c你已经在决斗中"
  no-arenas: "&c没有可用的竞技场"
  timeout-expired: "&c决斗超时"
