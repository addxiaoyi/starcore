# StarCore 王位继承系统配置文件
# Dynasty Succession System Configuration

# 模块设置
module:
  # 是否启用王位继承系统
  enabled: true
  # 模块描述
  description: "王位继承系统 - 提供君主禅让、继承、空位期等功能"

# 继承规则设置
succession:
  # 默认继承类型
  default-type: "MALE_PREMIogeniture"
  # 是否允许君主退位
  allow-abdication: true
  # 是否在君主死亡时自动触发空位期
  auto-interregnum-on-death: true
  # 空位期最大持续天数（超过后自动解散国家）
  max-interregnum-days: 30
  # 空位期是否允许国家运作
  allow-operations-during-interregnum: true

# 继承人设置
heir:
  # 最大继承人数量
  max-heirs: 10
  # 是否允许君主指定继承人
  allow-monarch-appointment: true
  # 是否允许玩家主动索取王位
  allow-claim-crown: true
  # 第一顺位继承人是否自动继承
  auto-inherit-first-heir: false

# 消息设置
messages:
  # 禅让成功消息
  abdication-success: "&a王位禅让成功！新君主: {new_monarch}"
  # 继承成功消息
  inheritance-success: "&a王位继承成功！新君主: {monarch}"
  # 空位期开始消息
  interregnum-start: "&c王位空缺！国家处于空位期。"
  # 加冕成功消息
  coronation-success: "&6你成功加冕为 {nation} 的君主！"

# 权限设置
permissions:
  # 禅让王位所需权限
  abdicate-permission: "starcore.dynasty.abdicate"
  # 继承王位所需权限
  inherit-permission: "starcore.dynasty.inherit"
  # 添加继承人所需权限
  add-heir-permission: "starcore.dynasty.addheir"
  # 查看王朝信息权限
  info-permission: "starcore.dynasty.info"

# 事件广播设置
broadcast:
  # 是否广播继承事件
  broadcast-succession: true
  # 是否广播空位期开始
  broadcast-interregnum: true
  # 广播范围（nation: 国家内, world: 世界内, global: 全局）
  broadcast-scope: "nation"

# 数据持久化设置
persistence:
  # 是否自动保存（定期保存）
  auto-save: true
  # 自动保存间隔（分钟）
  auto-save-interval: 5
  # 是否在玩家操作时立即保存
  save-on-action: true
