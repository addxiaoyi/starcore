# Nation Banner Module Configuration
# Feature ID: 15

# Whether the banner module is enabled
enabled: true

# Banner module settings
banner:
  # Maximum custom banners per nation (0 = unlimited)
  max-banners-per-nation: 1

  # Default banner settings for new nations
  default:
    # Default pattern for new nations
    pattern: "plain"
    # Default base color
    base-color: "WHITE"
    # Default pattern color
    pattern-color: "BLACK"

  # Pattern costs (in currency units)
  # 0 = free, higher value = more expensive
  pattern-costs:
    plain: 0
    stripe_v: 100
    stripe_h: 100
    cross: 150
    diagonal: 120
    diagonal_r: 120
    border: 200
    border_g: 300
    flower: 500
    gradient: 250
    triangle: 180
    triangle_i: 180
    diamond: 250
    diamond_g: 350
    circle: 300
    rhombus: 200
    square: 150
    creeper: 800
    skull: 800
    flower_charge: 600
    mojang: 1000
    globe: 1200
    illager: 900

  # Color customization costs
  color-change-cost: 50

  # Reset cost (to reset to default banner)
  reset-cost: 0

# Feedback settings
feedback:
  # Enable/disable feedback messages
  enabled: true

  # Default feedback settings
  default:
    sound: ""
    sound-volume: 0.7
    sound-pitch: 1.0

  # Banner updated feedback
  updated:
    sound: "UI_BUTTON_CLICK"
    sound-volume: 0.6
    actionbar: "旗帜已更新！"

  # Banner reset feedback
  reset:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    sound-volume: 0.5
    actionbar: "旗帜已重置为默认"

# Display settings
display:
  # Show banner preview in chat when viewing
  show-preview: true

  # Show banner info in action bar when clicking on nation banners
  show-actionbar-info: true

  # Banner display name format
  name-format: "[{nation}] {pattern} {baseColor}/{patternColor}"

# Permissions
permissions:
  # Permission required to change nation banner
  change-banner: "starcore.banner.change"
  # Permission required to view other nations' banners
  view-other-banners: "starcore.banner.viewother"
  # Permission required to bypass cost
  bypass-cost: "starcore.banner.bypass"

# Integration settings
integration:
  # Enable banner display on map web interface
  show-on-map: true

  # Enable banner display in nation GUI
  show-in-nation-gui: true

  # Enable banner preview in chat
  show-chat-preview: true