# StarCore 领土仲裁系统配置文件
# Version: 1.0.0

# ============================================
# 费用配置
# ============================================
fees:
  # 仲裁申请费用
  filing-fee: 100.00
  # 最低申诉费用
  minimum-claim-fee: 500.00
  # 最高申诉费用
  maximum-claim-fee: 10000.00
  # 是否收取申请费用
  charge-filing-fee: true
  # 撤诉是否退还费用
  refund-on-withdrawal: true

# ============================================
# 案件配置
# ============================================
case:
  # 每方最大证据数量
  max-evidence-per-side: 10
  # 案件过期天数
  expiration-days: 30
  # 是否允许重复申诉（同一争议）
  allow-duplicate: false
  # 是否启用自动分配仲裁员
  auto-assign-arbitrator: false

# ============================================
# 仲裁员配置
# ============================================
arbitrator:
  # 是否启用仲裁员系统
  enabled: true
  # 仲裁员最小评级
  min-rating: 3.0
  # 每位仲裁员最大同时处理案件数
  max-concurrent-cases: 5
  # 是否允许国家成员担任仲裁员
  allow-nation-member: false
  # 仲裁员自动注册（当满足条件时）
  auto-register: true

# ============================================
# 通知配置
# ============================================
notifications:
  # 案件提交时通知相关方
  notify-on-submit: true
  # 案件受理时通知相关方
  notify-on-accept: true
  # 裁决时通知相关方
  notify-on-ruling: true
  # 通知是否使用 ActionBar
  use-actionbar: true
  # 通知是否使用 Title
  use-title: false

# ============================================
# 裁决执行配置
# ============================================
execution:
  # 裁决后是否自动执行领土转让
  auto-execute-transfer: true
  # 领土转让是否需要双方确认
  require-confirmation: false
  # 执行失败是否通知管理员
  notify-admin-on-failure: true

# ============================================
# 消息配置
# ============================================
messages:
  # 是否启用自定义消息
  custom-messages: true
  # 语言（目前支持 zh_cn, en_us）
  language: zh_cn

# ============================================
# 案件类型配置
# ============================================
case-types:
  territory-boundary:
    # 是否启用此类型
    enabled: true
    # 最低申诉费用倍数
    fee-multiplier: 1.0
  territory-invasion:
    enabled: true
    fee-multiplier: 1.5
  territory-ownership:
    enabled: true
    fee-multiplier: 1.2
  resource-rights:
    enabled: true
    fee-multiplier: 1.0
  military-activity:
    enabled: true
    fee-multiplier: 2.0
  diplomatic-breach:
    enabled: true
    fee-multiplier: 1.5
  trade-dispute:
    enabled: true
    fee-multiplier: 1.0
  other:
    enabled: true
    fee-multiplier: 1.0
