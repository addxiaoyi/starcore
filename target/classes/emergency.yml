# 紧急状态系统配置
# Emergency State System Configuration

# 是否启用紧急状态系统
enabled: true

# 紧急状态默认持续时间（分钟）
default-duration: 60

# 紧急状态最大持续时间（分钟）
max-duration: 43200  # 30天

# 紧急状态最小持续时间（分钟）
min-duration: 5

# 是否允许叠加不同类型的紧急状态
allow-stacking: true

# 紧急状态到期前提醒（分钟）
notify-before-expire: 5

# 是否在紧急状态到期时自动广播
broadcast-on-expire: true

# 戒严状态（MARTIAL_LAW）不能与其他状态叠加
martial-law-exclusive: true

# 紧急状态类型配置
types:
  WAR:
    # 默认持续时间（分钟）
    default-duration: 120
    # 是否允许叠加
    can-stack: true
    # 最高叠加数量
    max-stacks: 1
    # 效果说明
    effects:
      - "战争动员模式启动"
      - "军事设施全面戒备"
      - "征兵系统激活"

  NATURAL_DISASTER:
    default-duration: 240
    can-stack: true
    max-stacks: 2
    effects:
      - "自然灾害响应启动"
      - "紧急救援队伍待命"
      - "资源调配优先"

  ECONOMIC_CRISIS:
    default-duration: 1440  # 1天
    can-stack: true
    max-stacks: 1
    effects:
      - "经济紧急措施生效"
      - "市场调控启动"
      - "资源储备开放"

  CIVIL_UNREST:
    default-duration: 480  # 8小时
    can-stack: true
    max-stacks: 1
    effects:
      - "维稳措施启动"
      - "安全等级提升"
      - "特殊管制生效"

  MARTIAL_LAW:
    default-duration: 720  # 12小时
    can-stack: false
    max-stacks: 1
    effects:
      - "军事管制生效"
      - "公民自由受限"
      - "宵禁启动"
      - "所有军队进入战备"

  PUBLIC_HEALTH:
    default-duration: 2160  # 3天
    can-stack: true
    max-stacks: 2
    effects:
      - "公共卫生紧急状态"
      - "医疗资源优先"
      - "人员流动限制"

  ENERGY_CRISIS:
    default-duration: 720  # 12小时
    can-stack: true
    max-stacks: 1
    effects:
      - "能源配给制度"
      - "工业用电限制"
      - "公共设施节能"
