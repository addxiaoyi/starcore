# 每日任务奖励加成
daily_bonuses:
  # 完成所有每日任务的额外奖励
  all_complete:
    money: 200.0
    experience: 500
    items:
      - material: DIAMOND
        amount: 1

  # 连续完成天数奖励
  streak_rewards:
    3:  # 连续3天
      money: 100.0
      experience: 200
    7:  # 连续7天
      money: 300.0
      experience: 600
      items:
        - material: ENCHANTED_BOOK
          amount: 1
    14: # 连续14天
      money: 500.0
      experience: 1000
      items:
        - material: DIAMOND_BLOCK
          amount: 1
    30: # 连续30天
      money: 1000.0
      experience: 2000
      items:
        - material: NETHERITE_INGOT
          amount: 1

# 每日任务设置
settings:
  # 刷新时间（小时）
  refresh_hour: 4

  # 每天提供的任务数量
  daily_count: 5

  # 是否启用个性化任务
  personalized: true

  # 任务时限（小时，0表示无限制）
  time_limit: 24

  # 是否允许手动刷新
  allow_manual_refresh: true

  # 手动刷新费用
  manual_refresh_cost: 50.0

  # 手动刷新冷却时间（小时）
  manual_refresh_cooldown: 6
