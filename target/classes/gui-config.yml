# ============================================================
# STARCORE 通用 GUI 配置文件
# ============================================================
# 所有自定义 GUI 的可编辑配置
#
# 配置格式说明:
# - 每个 GUI 有独立的配置节点
# - 支持占位符: {player_name}, {value}, {count} 等
# - 物品支持颜色代码: &0-&9, &a-&f, &l, &o, &n 等
# ============================================================

# ============================================================
# 社交系统 GUI
# ============================================================
social:
  # 社交主菜单
  main-menu:
    title: "&6&l社交系统 &7| &f主菜单"
    rows: 6

    items:
      friends:
        slot: 11
        material: PLAYER_HEAD
        display-name: "&f&l👥 好友管理"
        glow: false
        lore:
          - ""
          - "&7好友数量: &a{friend_count}"
          - "&7在线好友: &a{online_count}"
          - ""
          - "&e▶ 点击管理好友"

      guild:
        slot: 13
        material: CREEPER_BANNER_PATTERN
        display-name: "&f&l🎭 派系管理"
        glow: false
        lore:
          - ""
          - "&7派系数量: &a{guild_count}"
          - "&7派系成员: &a{member_count}"
          - ""
          - "&e▶ 点击管理派系"

      party:
        slot: 15
        material: FIREWORK_ROCKET
        display-name: "&f&l🎉 组队功能"
        glow: false
        lore:
          - ""
          - "&7当前队伍: &e{party_status}"
          - "&7队伍成员: &a{member_count}"
          - ""
          - "&e▶ 点击组队"

      mail:
        slot: 20
        material: ENVELOPE
        display-name: "&f&l📧 邮件系统"
        glow: false
        lore:
          - ""
          - "&7未读邮件: &c{unread_count}"
          - "&7总邮件数: &7{total_count}"
          - ""
          - "&e▶ 点击查看邮件"

      reputation:
        slot: 24
        material: HEART
        display-name: "&f&l⭐ 声望系统"
        glow: true
        lore:
          - ""
          - "&7当前声望: &b{reputation}"
          - "&7声望等级: &e{level}"
          - ""
          - "&e▶ 点击查看声望"

      influence:
        slot: 31
        material: NETHER_STAR
        display-name: "&f&l✨ 影响力"
        glow: true
        lore:
          - ""
          - "&7当前影响力: &d{influence}"
          - "&7社交圈: &b{reach}"
          - ""
          - "&e▶ 点击查看详情"

      social-ranking:
        slot: 33
        material: LEADERBOARD
        display-name: "&f&l🏆 社交排行榜"
        glow: false
        lore:
          - ""
          - "&7当前排名: &e#{rank}"
          - "&7本周变化: &a+{change}"
          - ""
          - "&e▶ 点击查看排行"

    border:
      enabled: true
      material: BLACK_STAINED_GLASS_PANE
      display-name: " "

  # 影响力排行榜
  influence-leaderboard:
    title: "&d&l影响力排行榜 &7| &f{period}"
    rows: 6

    items:
      # 排行榜标题
      title-item:
        slot: 4
        material: NETHER_STAR
        display-name: "&d&l✨ 影响力排行榜"
        glow: true
        lore:
          - ""
          - "&7当前周期: &e{period}"
          - "&7玩家数量: &a{player_count}"
          - ""
          - "&7选择周期查看详细排名"

      # 我的排名
      my-rank:
        slot: 49
        material: PLAYER_HEAD
        skull-owner: "{player_name}"
        display-name: "&b&l我的排名"
        glow: true
        lore:
          - ""
          - "&7当前排名: &e#{my_rank}"
          - "&7影响力: &d{my_influence}"
          - "&7本周变化: &a+{my_change}"
          - ""
          - "&e点击查看我的详情"

    border:
      enabled: true
      material: BLACK_STAINED_GLASS_PANE
      display-name: " "

