      - "&7共 &e{total} &7页"

# ============================================================
# 占位符说明
# ============================================================
#
# 通用占位符:
#   {player_name} - 玩家名称
#   {player_uuid} - 玩家UUID
#   {balance} - 余额
#   {count} - 数量
#   {rank} - 排名
#   {total} - 总数
#   {current_page} - 当前页
#   {total_pages} - 总页数
#   {progress_bar} - 进度条
#
# 系统特定占位符:
#   {nation_name} - 国家名称
#   {guild_name} - 公会名称
#   {army_count} - 军队数量
#   {influence} - 影响力
#   {reputation} - 声望
#   {my_rank} - 我的排名
#   {my_influence} - 我的影响力
#   {friend_count} - 好友数量
#   {unread_count} - 未读数量
#   {period} - 时间周期 (日/周/月/总)
#   {current_tech} - 当前研究科技
#   {remaining_time} - 剩余时间
#
# 物品属性:
#   slot - 槽位 (0-53)
#   material - 物品材质
#   display-name - 显示名称 (支持颜色代码)
#   glow - 是否发光 (true/false)
#   lore - 描述文字列表
#   command - 点击执行的命令
#   permission - 需要的权限
#
# 边框配置:
#   border.enabled - 是否启用边框
#   border.material - 边框材质
#   border.display-name - 边框显示名称
#