# ============================================================
# STARCORE 科技系统 GUI 配置
# ============================================================

# --- 科技树主菜单 ---
tech-tree:
  title: "&b&l🔬 科技树 &7| &f主菜单"
  rows: 6

  items:
    # 科技概览
    overview:
      slot: 4
      material: ENCHANTING_TABLE
      display-name: "&b&l🔬 科技概览"
      glow: true
      lore:
        - ""
        - "&7已解锁: &a{unlocked} &7/ &e{total}"
        - "&7研究进度: {progress_bar}"
        - "&7研究点: &b{research_points}"
        - ""
        - "&e▶ 点击查看详情"

    # 军事科技
    military:
      slot: 11
      material: IRON_SWORD
      display-name: "&c&l⚔ 军事科技"
      glow: false
      lore:
        - ""
        - "&7已研究: &a{military_unlocked}"
        - "&7总数量: &e{military_total}"
        - ""
        - "&e▶ 点击研究"

    # 经济科技
    economy:
      slot: 13
      material: GOLD_INGOT
      display-name: "&6&l💰 经济科技"
      glow: false
      lore:
        - ""
        - "&7已研究: &a{economy_unlocked}"
        - "&7总数量: &e{economy_total}"
        - ""
        - "&e▶ 点击研究"

    # 农业科技
    agriculture:
      slot: 15
      material: WHEAT
      display-name: "&a&l🌾 农业科技"
      glow: false
      lore:
        - ""
        - "&7已研究: &a{agri_unlocked}"
        - "&7总数量: &e{agri_total}"
        - ""
        - "&e▶ 点击研究"

    # 当前研究
    current-research:
      slot: 22
      material: BOOK
      display-name: "&e&l📖 当前研究"
      glow: false
      lore:
        - ""
        - "&7正在研究: &e{current_tech}"
        - "&7进度: {progress_bar}"
        - "&7剩余时间: &c{remaining_time}"
        - ""
        - "&e▶ 点击管理"

    # 可用研究
    available:
      slot: 31
      material: NETHER_STAR
      display-name: "&b&l✨ 可用研究"
      glow: true
      lore:
        - ""
        - "&7可研究: &a{available_count}"
        - "&7研究点: &b{research_points}"
        - ""
        - "&e▶ 点击查看"

    # 研究加速
    accelerate:
      slot: 33
      material: FIREWORK_STAR
      display-name: "&d&l⚡ 研究加速"
      glow: false
      lore:
        - ""
        - "&7加速卡: &e{accelerators}"
        - "&7加速效果: &a+{boost}%"
        - ""
        - "&e▶ 使用加速"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 科技详情 ---
tech-detail:
  title: "&b&l🔬 科技详情"
  rows: 4

  items:
    # 科技图标
    icon:
      slot: 4
      material: ENCHANTING_TABLE
      display-name: "&e&l{tech_name}"
      glow: true
      lore:
        - ""
        - "&7类型: &e{category}"
        - "&7等级: &bLv.{level}"

    # 效果描述
    effects:
      slot: 11
      material: BOOK
      display-name: "&f&l效果"
      glow: false
      lore:
        - ""
        - "&7{effect_description}"

    # 需求
    requirements:
      slot: 15
      material: REDSTONE
      display-name: "&c&l需求"
      glow: false
      lore:
        - ""
        - "&7前置科技: &e{requires}"
        - "&7研究点: &b{cost}"
        - "&7时间: &e{duration}"

    # 研究按钮
    research-btn:
      slot: 22
      material: NETHER_STAR
      display-name: "&a&l开始研究"
      glow: true
      lore:
        - ""
        - "&7消耗: &b{research_points} &7研究点"
        - "&7时间: &e{duration}"
        - ""
        - "&e▶ 点击开始研究"

    # 已解锁
    unlocked:
      slot: 22
      material: EMERALD
      display-name: "&a&l✓ 已解锁"
      glow: false
      lore:
        - ""
        - "&7已完全研究此科技"
        - ""

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "

# --- 研究中科技 ---
tech-researching:
  title: "&e&l📖 研究中"
  rows: 3

  items:
    # 进度条
    progress:
      slot: 4
      material: EXPERIENCE_BOTTLE
      display-name: "&e&l{tech_name}"
      glow: false
      lore:
        - ""
        - "&7进度: {progress_bar}"
        - "&7{progress_percent}%"
        - "&7剩余: &c{remaining_time}"
        - ""

    # 加速按钮
    accelerate:
      slot: 22
      material: NETHER_STAR
      display-name: "&d&l⚡ 加速完成"
      glow: true
      lore:
        - ""
        - "&7消耗: &e{accelerator_cost} &7加速卡"
        - "&7立即完成研究"
        - ""
        - "&e▶ 点击加速"

    # 取消按钮
    cancel:
      slot: 26
      material: BARRIER
      display-name: "&c&l✖ 取消研究"
      glow: false
      lore:
        - ""
        - "&c⚠ 取消将损失50%研究点"
        - ""
        - "&e▶ 点击取消"

  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
