# ===============================================
# 夜间突袭模块配置
# ===============================================

night-raid:
  # 是否启用夜间突袭功能
  enabled: true

  # 夜间突袭开放时间（服务器时区）
  # 使用 24 小时制，格式：小时:分钟
  # 例如：20:00 表示晚上 8 点开始
  raid-window:
    start: "20:00"    # 突袭开始时间
    end: "06:00"      # 突袭结束时间（凌晨 6 点）

  # 突袭要求
  requirements:
    # 最少士兵数量
    min-soldiers: 50
    # 最多参与突袭的军队数
    max-armies-per-raid: 3
    # 突袭距离限制（方块）
    max-raid-distance: 500

  # 冷却时间
  cooldowns:
    # 同一国家发起突袭的冷却时间（小时）
    nation-cooldown-hours: 12
    # 被突袭国家的保护时间（小时）
    target-protection-hours: 6

  # 成本与奖励
  economics:
    # 发起突袭的基础费用
    base-cost: 1000.0
    # 每个士兵的费用
    cost-per-soldier: 10.0
    # 成功突袭奖励（乘以敌方损失）
    success-reward-multiplier: 0.5
    # 失败突袭的损失比例
    failure-loss-ratio: 0.5

  # 战斗设置
  combat:
    # 突袭战斗半径（方块）
    battle-radius: 100.0
    # 防守方增援半径（方块）
    defender-reinforcement-radius: 200.0
    # 突袭持续时间（秒）
    raid-duration-seconds: 300

  # 警报设置
  alerts:
    # 是否向被突袭国家发送警报
    notify-target: true
    # 警报提前时间（秒）
    warning-seconds: 30

  # 权限设置
  permissions:
    # 发起突袭需要的官员级别
    required-rank: "officer"