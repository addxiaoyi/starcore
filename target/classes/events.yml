# ==========================================
# StarCore 随机事件配置文件
# ==========================================
#
# 此配置文件定义了游戏中的所有随机事件
# 每个事件可以有多个触发器和效果
# 支持事件链和玩家响应选项
#

events:
  # ==========================================
  # 1. 洪水灾害
  # ==========================================
  flood_disaster:
    name: "洪水灾害"
    description: "暴雨导致洪水泛滥，淹没了农田和建筑"
    global: false
    priority: 10
    cooldown: 3600  # 1小时冷却

    triggers:
      weather:
        type: "weather"
        weather_type: "RAIN"

      probability:
        type: "probability"
        probability: 0.05  # 5%概率

      location:
        type: "location"
        location_type: "Y_LEVEL"
        values:
          - "0-80"  # 低海拔地区

    effects:
      crop_damage:
        type: "crop"
        effect_type: "DESTROY"
        value: 0.3  # 30%作物被摧毁
        radius: 50

      building_damage:
        type: "building"
        effect_type: "DAMAGE"
        value: 0.2  # 20%建筑受损
        radius: 50

      player_damage:
        type: "player"
        effect_type: "DAMAGE"
        value: 5.0
        message: "§c你被洪水冲击受到了伤害！"

    responses:
      evacuate:
        name: "撤离"
        description: "立即撤离到高处"
        requirements:
          items:
            - material: "ENDER_PEARL"
              amount: 3
              name: "末影珍珠"
        effects:
          teleport:
            type: "player"
            effect_type: "TELEPORT"
            message: "§a你安全撤离到了高处"

      build_dam:
        name: "建造防洪设施"
        description: "花费资源建造防洪设施"
        requirements:
          money: 1000
        effects:
          cost:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 1000
        chain_events:
          - "flood_prevented"

  # ==========================================
  # 2. 神秘商队
  # ==========================================
  mysterious_caravan:
    name: "神秘商队"
    description: "一支神秘的商队来到了你的领地"
    global: false
    priority: 5
    cooldown: 1800  # 30分钟冷却

    triggers:
      time:
        type: "time"
        time_type: "GAME_TIME"
        start: 6000
        end: 18000  # 白天

      probability:
        type: "probability"
        probability: 0.1  # 10%概率

    effects:
      notification:
        type: "player"
        effect_type: "EXPERIENCE"
        value: 0
        message: "§6神秘商队抵达！他们带来了稀有商品..."

    responses:
      trade:
        name: "交易"
        description: "与商队进行交易"
        effects:
          give_items:
            type: "economy"
            effect_type: "ADD_RESOURCE"
            value: 10
            resource_type: "rare_goods"
          cost:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 500

      attack:
        name: "抢劫"
        description: "攻击商队抢夺物资（有风险）"
        chain_events:
          - "caravan_fight"

      ignore:
        name: "忽视"
        description: "让商队离开"
        effects:
          leave:
            type: "player"
            effect_type: "EXPERIENCE"
            value: 0
            message: "§7商队离开了..."

  # ==========================================
  # 3. 蛮族入侵（重新设计：国战风格）
  # ==========================================
  barbarian_invasion:
    name: "蛮族入侵"
    description: "北境蛮族趁虚而入，大军压境！"
    global: false
    priority: 20
    cooldown: 14400  # 4小时冷却

    triggers:
      time:
        type: "time"
        time_type: "GAME_TIME"
        start: 12000
        end: 24000  # 夜间更容易发生

      probability:
        type: "probability"
        probability: 0.05  # 5%基础概率

      nation_vulnerability:
        type: "nation_state"
        state_type: "TREASURY"
        comparison: "LESS_THAN"
        threshold: 1000  # 国库低于1000时才可能触发（表示防御松懈）

    effects:
      # 立即显示入侵警告
      broadcast:
        type: "broadcast"
        message: "§c⚔️ 【紧急军情】蛮族大军正向边境推进！各城池做好防御准备！"

      # 降低国家士气
      morale_decrease:
        type: "nation"
        effect_type: "MORALE_CHANGE"
        value: -10
        message: "§e国民得知入侵消息，人心惶惶，士气下降！"

      # 启动入侵持续效果
      start_siege:
        type: "siege"
        damage_per_minute: 1  # 每分钟1%领地损失
        morale_drain: 2  # 每分钟士气损失
        duration: 1800  # 30分钟围城期

    responses:
      mobilize:
        name: "动员军队"
        description: "命令军队前往边境迎敌"
        icon: "IRON_SWORD"
        permission: "starcore.army.manage"
        effects:
          buff:
            type: "player"
            effect_type: "POTION_EFFECT"
            value: 1  # 力量I
            duration: 1800
            message: "§a你被动员参加防御战！"
        cooldown: 3600

      fortify:
        name: "加固城防"
        description: "消耗资源加强防御工事"
        icon: "SHIELD"
        cost:
          economy: 1000
          resource: "STONE:100"
        effects:
          defense_buff:
            type: "nation"
            effect_type: "DEFENSE_BONUS"
            value: 0.2  # 20%防御加成
            duration: 3600  # 1小时
          message: "§a城墙加固完成！防御力提升20%！"

      rally_citizens:
        name: "动员民众"
        description: "发布征召令，提升国民战斗意志"
        icon: "WHITE_BANNER"
        cost:
          economy: 500
        effects:
          morale_boost:
            type: "nation"
            effect_type: "MORALE_CHANGE"
            value: 15
          defense_spirit:
            type: "nation"
            effect_type: "COMBAT_BONUS"
            value: 0.15  # 15%战斗加成
            duration: 3600
        cooldown: 7200

      negotiate:
        name: "遣使谈判"
        description: "派出使者尝试与蛮族谈判（需支付赎金）"
        icon: "BOOK"
        cost:
          economy: 5000
        effects:
          # 谈判需要支付赎金，移除围城
          end_siege:
            type: "siege"
            action: "CANCEL"
            message: "§a使者成功说服蛮族退兵！"
        cooldown: 14400

      await:
        name: "静观其变"
        description: "不采取行动，观察形势发展"
        icon: "CLOCK"
        effects:
          warning:
            type: "broadcast"
            message: "§e你选择静观其变... 蛮族正在逼近！"

      await:
        name: "静观其变"
        description: "不采取行动，观察形势发展"
        icon: "CLOCK"
        effects:
          warning:
            type: "message"
            message: "§e你选择静观其变... 蛮族正在逼近！"

  # ==========================================
  # 4. 瘟疫流行
  # ==========================================
  plague_outbreak:
    name: "瘟疫流行"
    description: "一场可怕的瘟疫开始在人群中传播"
    global: true
    priority: 20
    cooldown: 10800  # 3小时冷却

    triggers:
      probability:
        type: "probability"
        probability: 0.03  # 3%概率

      player_count:
        type: "player_count"
        count_type: "GLOBAL"
        min: 5
        max: 999

    effects:
      weaken_players:
        type: "player"
        effect_type: "POTION_EFFECT"
        value: 1  # 虚弱I
        duration: 600
        message: "§4你感到身体不适，似乎染上了瘟疫..."

      economic_impact:
        type: "economy"
        effect_type: "TAX_INCREASE"
        value: 1.5  # 税收增加50%
        duration: 600

    responses:
      quarantine:
        name: "隔离"
        description: "实施隔离措施"
        requirements:
          money: 2000
        effects:
          cost:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 2000
        chain_events:
          - "plague_controlled"

      research_cure:
        name: "研究治疗方法"
        description: "投入资源研究治疗方法"
        requirements:
          money: 3000
        effects:
          cost:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 3000
        chain_events:
          - "plague_cured"

  # ==========================================
  # 5. 丰收
  # ==========================================
  bountiful_harvest:
    name: "丰收"
    description: "风调雨顺，农作物获得了大丰收"
    global: false
    priority: 5
    cooldown: 2400  # 40分钟冷却

    triggers:
      weather:
        type: "weather"
        weather_type: "CLEAR"

      probability:
        type: "probability"
        probability: 0.15  # 15%概率

    effects:
      boost_crops:
        type: "crop"
        effect_type: "INSTANT_GROW"
        value: 1.0
        radius: 100

      economic_bonus:
        type: "economy"
        effect_type: "ADD_MONEY"
        value: 500
        message: "§a丰收带来了额外收入！"

      resource_bonus:
        type: "economy"
        effect_type: "ADD_RESOURCE"
        value: 50
        resource_type: "food"

    chain_events:
      - "harvest_festival"

  # ==========================================
  # 6. 歉收
  # ==========================================
  poor_harvest:
    name: "歉收"
    description: "恶劣天气导致农作物大幅减产"
    global: false
    priority: 8
    cooldown: 2400  # 40分钟冷却

    triggers:
      probability:
        type: "probability"
        probability: 0.1  # 10%概率

    effects:
      damage_crops:
        type: "crop"
        effect_type: "DESTROY"
        value: 0.4  # 40%作物被摧毁
        radius: 100

      economic_loss:
        type: "economy"
        effect_type: "REMOVE_MONEY"
        value: 300
        message: "§c歉收导致了经济损失！"

      hunger_effect:
        type: "player"
        effect_type: "HUNGER"
        value: -4
        message: "§c食物短缺让你感到饥饿"

    responses:
      import_food:
        name: "进口食物"
        description: "从外地进口食物"
        requirements:
          money: 800
        effects:
          cost:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 800
          gain_food:
            type: "economy"
            effect_type: "ADD_RESOURCE"
            value: 30
            resource_type: "food"

  # ==========================================
  # 7. 宝藏发现
  # ==========================================
  treasure_discovery:
    name: "宝藏发现"
    description: "你发现了一处隐藏的宝藏"
    global: false
    priority: 3
    cooldown: 1200  # 20分钟冷却

    triggers:
      probability:
        type: "probability"
        probability: 0.05  # 5%概率

      location:
        type: "location"
        location_type: "Y_LEVEL"
        values:
          - "0-50"  # 地下

    effects:
      give_money:
        type: "economy"
        effect_type: "ADD_MONEY"
        value: 1000
        message: "§6你发现了宝藏，获得了1000金币！"

      give_experience:
        type: "player"
        effect_type: "EXPERIENCE"
        value: 100
        message: "§a你获得了100点经验！"

    responses:
      take_all:
        name: "全部拿走"
        description: "将宝藏全部拿走"
        effects:
          bonus:
            type: "economy"
            effect_type: "ADD_MONEY"
            value: 500

      share:
        name: "分享"
        description: "与其他玩家分享宝藏"
        effects:
          reputation:
            type: "economy"
            effect_type: "ADD_RESOURCE"
            value: 10
            resource_type: "reputation"

  # ==========================================
  # 8. 间谍潜入
  # ==========================================
  spy_infiltration:
    name: "间谍潜入"
    description: "敌对势力的间谍潜入了你的领地"
    global: false
    priority: 12
    cooldown: 5400  # 90分钟冷却

    triggers:
      probability:
        type: "probability"
        probability: 0.06  # 6%概率

    effects:
      steal_resources:
        type: "economy"
        effect_type: "REMOVE_RESOURCE"
        value: 20
        resource_type: "strategic_resources"

      steal_money:
        type: "economy"
        effect_type: "REMOVE_MONEY"
        value: 300
        message: "§4间谍偷走了你的部分资源和金钱！"

    responses:
      hunt_spy:
        name: "追捕间谍"
        description: "派人追捕间谍"
        effects:
          notification:
            type: "player"
            effect_type: "EXPERIENCE"
            value: 50
            message: "§a你成功抓住了间谍！"
        chain_events:
          - "spy_captured"

      ignore:
        name: "忽视"
        description: "让间谍逃走"
        chain_events:
          - "spy_escaped"

  # ==========================================
  # 9. 暴乱
  # ==========================================
  civil_unrest:
    name: "暴乱"
    description: "民众对当前统治不满，发生了暴乱"
    global: false
    priority: 18
    cooldown: 7200  # 2小时冷却

    triggers:
      probability:
        type: "probability"
        probability: 0.04  # 4%概率

    effects:
      building_damage:
        type: "building"
        effect_type: "DAMAGE"
        value: 0.3
        radius: 40

      economic_loss:
        type: "economy"
        effect_type: "REMOVE_MONEY"
        value: 800
        message: "§c暴乱造成了严重的经济损失！"

      spawn_rioters:
        type: "spawn"
        entity_type: "ZOMBIE_VILLAGER"
        amount: 15
        radius: 25
        hostile: true
        health_multiplier: 1.0

    responses:
      negotiate:
        name: "谈判"
        description: "与暴乱者谈判"
        requirements:
          money: 500
        effects:
          pay:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 500
        chain_events:
          - "unrest_resolved"

      suppress:
        name: "镇压"
        description: "武力镇压暴乱"
        effects:
          buff:
            type: "player"
            effect_type: "POTION_EFFECT"
            value: 1
            duration: 300
        chain_events:
          - "unrest_suppressed"

  # ==========================================
  # 10. 节日庆典
  # ==========================================
  festival_celebration:
    name: "节日庆典"
    description: "今天是节日，人们聚集在一起庆祝"
    global: true
    priority: 2
    cooldown: 14400  # 4小时冷却

    triggers:
      time:
        type: "time"
        time_type: "GAME_TIME"
        start: 6000
        end: 12000  # 正午

      probability:
        type: "probability"
        probability: 0.12  # 12%概率

    effects:
      heal_players:
        type: "player"
        effect_type: "HEAL"
        value: 10.0
        message: "§d节日的欢乐气氛让你感到精神焕发！"

      economic_boom:
        type: "economy"
        effect_type: "MARKET_BOOM"
        value: 1.2  # 物价上涨20%
        duration: 1200

      income_boost:
        type: "economy"
        effect_type: "MULTIPLY_INCOME"
        value: 1.5  # 收入增加50%
        duration: 1200

    responses:
      participate:
        name: "参加庆典"
        description: "积极参与节日庆典"
        effects:
          bonus:
            type: "economy"
            effect_type: "ADD_MONEY"
            value: 200
          experience:
            type: "player"
            effect_type: "EXPERIENCE"
            value: 50

      organize:
        name: "组织活动"
        description: "花费资源组织更盛大的活动"
        requirements:
          money: 1000
        effects:
          cost:
            type: "economy"
            effect_type: "REMOVE_MONEY"
            value: 1000
          reputation:
            type: "economy"
            effect_type: "ADD_RESOURCE"
            value: 20
            resource_type: "reputation"
        chain_events: []

  # ==========================================
  # 后续事件（事件链）
  # ==========================================

  flood_prevented:
    name: "洪水已阻止"
    description: "防洪设施成功阻止了洪水"
    global: false
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0  # 总是触发
    effects:
      notification:
        type: "player"
        effect_type: "EXPERIENCE"
        value: 100
        message: "§a你的防洪设施成功阻止了洪水！"

  caravan_fight:
    name: "商队战斗"
    description: "商队护卫开始反击"
    global: false
    priority: 10
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      spawn_guards:
        type: "spawn"
        entity_type: "PILLAGER"
        amount: 5
        radius: 10
        hostile: true
        health_multiplier: 2.0

  plague_controlled:
    name: "瘟疫得到控制"
    description: "隔离措施起效，瘟疫得到了控制"
    global: true
    priority: 1
    cooldown: 0
    triggers:
      # 无自主触发，只能通过 chain_events 触发
      probability:
        type: "probability"
        probability: 0.0
    effects:
      heal:
        type: "player"
        effect_type: "HEAL"
        value: 5.0
        message: "§a瘟疫得到了控制，你的健康正在恢复"

  plague_cured:
    name: "瘟疫已治愈"
    description: "研究成功，找到了治疗方法"
    global: true
    priority: 1
    cooldown: 0
    triggers:
      # 无自主触发，只能通过 chain_events 触发
      probability:
        type: "probability"
        probability: 0.0
    effects:
      cure:
        type: "player"
        effect_type: "HEAL"
        value: 10.0
        message: "§a瘟疫已被治愈！"

  harvest_festival:
    name: "丰收节"
    description: "为庆祝丰收而举办的节日"
    global: false
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      bonus:
        type: "economy"
        effect_type: "ADD_MONEY"
        value: 300
        message: "§6丰收节带来了额外收入！"

  spy_captured:
    name: "间谍被捕"
    description: "间谍被成功抓获"
    global: false
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      reward:
        type: "economy"
        effect_type: "ADD_MONEY"
        value: 500
        message: "§a你抓获了间谍，获得了奖励！"

  spy_escaped:
    name: "间谍逃脱"
    description: "间谍成功逃脱"
    global: false
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      warning:
        type: "player"
        effect_type: "EXPERIENCE"
        value: 0
        message: "§c间谍逃脱了，可能会带来更多麻烦..."

  unrest_resolved:
    name: "暴乱平息"
    description: "通过谈判成功平息了暴乱"
    global: false
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      peace:
        type: "player"
        effect_type: "EXPERIENCE"
        value: 50
        message: "§a暴乱已平息，秩序得到恢复"

  unrest_suppressed:
    name: "暴乱镇压"
    description: "暴乱被武力镇压"
    global: false
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      consequence:
        type: "economy"
        effect_type: "ADD_RESOURCE"
        value: -10
        resource_type: "reputation"

  grand_festival:
    name: "盛大庆典"
    description: "组织的盛大庆典非常成功"
    global: true
    priority: 1
    cooldown: 0
    triggers:
      probability:
        type: "probability"
        probability: 1.0
    effects:
      success:
        type: "economy"
        effect_type: "ADD_MONEY"
        value: 500
        message: "§6盛大庆典非常成功，吸引了大量游客！"
