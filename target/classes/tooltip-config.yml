# StarCore 智能物品提示配置文件
# 快捷栏提示和物品说明优化

# ==================== 快捷栏提示设置 ====================
hotbar-hints:
  # 是否启用快捷栏提示
  enabled: true
  # 提示显示时长（秒）
  duration: 3
  # 提示冷却时间（毫秒）
  cooldown: 1000
  # 是否在按住Shift时显示
  show-on-shift: true

# ==================== 自定义提示设置 ====================
custom-tooltips:
  # 是否启用自定义物品提示
  enabled: true

# ==================== 稀有度颜色设置 ====================
rarity-colors:
  # 是否启用稀有度颜色
  enabled: true
  # 稀有度颜色（支持HEX颜色格式 #RRGGBB）
  common: "#9E9E9E"        # 普通 - 灰色
  uncommon: "#4CAF50"      # 优秀 - 绿色
  rare: "#2196F3"          # 稀有 - 蓝色
  epic: "#9C27B0"          # 史诗 - 紫色
  legendary: "#FF9800"    # 传说 - 橙色
  mythic: "#F44336"       # 神话 - 红色

# ==================== 物品信息显示设置 ====================
item-stats:
  # 是否显示物品统计信息
  enabled: true

enchantment-info:
  # 是否显示附魔信息
  enabled: true

# ==================== 提示样式设置 ====================
tooltip-style:
  # 显示物品ID
  show-item-id: true
  # 显示耐久度
  show-durability: true
  # 显示附魔
  show-enchantments: true
  # 显示稀有度标签
  show-rarity: true
  # 显示自定义Lore
  show-lore: true

# ==================== 性能设置 ====================
performance:
  # 最大提示行数
  max-tooltip-lines: 20
  # 提示缓存过期时间（毫秒）
  cache-expiration-ms: 60000
