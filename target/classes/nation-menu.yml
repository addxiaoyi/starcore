      permission: ""

  # 边框装饰配置 - 现代化设计
  border:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    display-name: " "
    slots:
      top-row: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      bottom-row: [45, 46, 47, 48, 49, 50, 51, 52, 53]
