# ============================================================
# 辅助信息
# ============================================================
#
# 占位符说明:
#   {nation_name} - 国家名称
#   {nation_level} - 国家等级
#   {member_count} - 成员数量
#   {claim_count} - 领土数量
#   {balance} - 国库余额
#   {ally_count} - 盟友数量
#   {hostile_count} - 敌对数量
#   {tech_unlocked} - 已解锁科技
#   {tech_total} - 科技总数
#   {government_type} - 政体类型
#   {player_name} - 玩家名称
#   {current_page} - 当前页码
#   {total_pages} - 总页数
#
# 命令类型:
#   submenu:xxx - 打开子菜单 (members/territory/diplomacy/technology/policy/treasury/settings)
#   anvil_rename - 改名输入
#   anvil_create_nation - 创建国家输入
#   close - 关闭菜单
#   sc xxx - 执行命令
#
# Lore 格式:
#   &0-9,a-f - 颜色代码
#   &l - 粗体
#   &o - 斜体
#   &n - 下划线
#   &m - 删除线
#   &k - 魔法字
#   &r - 重置
