# --- 主菜单（成员模式）---
main-member:
  title: "&6&l⚔ &e{nation_name} &7| &f国家管理"
  rows: 6

  items:
    # 国家信息 - 中心位置
    info:
      slot: 22
      material: NETHER_STAR
      display-name: "&f&l✦ &6国家信息 &f✦"
      glow: true
      lore:
        - ""
        - "&7═══════════════════════════"
        - "&f  国家名称: &e{nation_name}"
        - "&f  政体类型: &b{government_type}"
        - "&f  国家等级: &aLv.{nation_level}"
        - "&f  成员数量: &a{member_count} &7人"
        - "&f  领土数量: &a{claim_count} &7区块"
        - "&7═══════════════════════════"
        - ""
        - "&e▶ &7点击查看详细信息"
      command: "sc nation info"
      permission: ""

    # 成员管理 - 左上
    members:
      slot: 10
      material: PLAYER_HEAD
      skull-owner: "{player_name}"
      display-name: "&f&l👥 成员管理"
      glow: false
      lore:
        - ""
        - "&7当前成员: &a{member_count} &7人"
        - "&7在线人数: &a{online_count} &7人"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击管理成员"
        - "&7═══════════════════════"
      command: "submenu:members"
      permission: ""

    # 领土管理 - 中上
    territory:
      slot: 12
      material: MAP
      display-name: "&f&l🗺 领土管理"
      glow: false
      lore:
        - ""
        - "&7已占领: &a{claim_count} &7区块"
        - "&7本周收入: &6+1,234 &7星尘"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击管理领土"
        - "&7═══════════════════════"
      command: "submenu:territory"
      permission: ""

    # 国库管理 - 右上
    treasury:
      slot: 14
      material: GOLD_INGOT
      display-name: "&f&l💰 国库管理"
      glow: false
      lore:
        - ""
        - "&7国库余额: &6✦ {balance}"
        - "&7本周税收: &a+5,000"
        - "&7本周支出: &c-2,000"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击管理国库"
        - "&7═══════════════════════"
      command: "submenu:treasury"
      permission: ""

    # 外交关系 - 左中
    diplomacy:
      slot: 19
      material: EMBER_ROLL
      display-name: "&f&l🤝 外交关系"
      glow: false
      lore:
        - ""
        - "&a盟友数量: &f{ally_count} &7个"
        - "&c敌对国家: &f{hostile_count} &7个"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击管理外交"
        - "&7═══════════════════════"
      command: "submenu:diplomacy"
      permission: ""

    # 科技树 - 中中
    technology:
      slot: 21
      material: ENCHANTING_TABLE
      display-name: "&f&l🔬 科技树"
      glow: false
      lore:
        - ""
        - "&7已解锁: &a{tech_unlocked} &7/ &e{tech_total}"
        - "&7研究进度: &b████████░░ &780%"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击查看科技"
        - "&7═══════════════════════"
      command: "submenu:technology"
      permission: ""

    # 国策 - 右中
    policy:
      slot: 23
      material: BOOK
      display-name: "&f&l📜 国家政策"
      glow: false
      lore:
