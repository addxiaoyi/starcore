        - "&7今日任务: &e3/5 &7完成"
        - "&7任务奖励: &6+500 ✦ &7星尘"
        - "&7剩余时间: &c23:45:12"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击查看任务"
        - "&7═══════════════════════"
      command: "daily"
      permission: ""

    # 官职管理 - 左下
    officer:
      slot: 28
      material: NAME_TAG
      display-name: "&f&l⭐ 官职管理"
      glow: false
      lore:
        - ""
        - "&7当前官职: &e{player_rank}"
        - "&7可用职位: &a5 &7个"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击管理官职"
        - "&7═══════════════════════"
      command: "sc officer"
      permission: ""

    # 国家改名 - 中下左
    rename:
      slot: 30
      material: ANVIL
      display-name: "&f&l✏ 国家改名"
      glow: true
      lore:
        - ""
        - "&7当前名称: &e{nation_name}"
        - "&c⚠ 需要管理员权限"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击修改国家名称"
        - "&7═══════════════════════"
      command: "anvil_rename"
      permission: "admin"

    # 国家设置 - 中下中
    settings:
      slot: 32
      material: COMPARATOR
      display-name: "&f&l⚙ 国家设置"
      glow: false
      lore:
        - ""
        - "&7政体: &e{government_type}"
        - "&7等级: &eLv.{nation_level}"
        - ""
        - "&7═══════════════════════"
        - "&e▶ &7点击查看设置"
        - "&7═══════════════════════"
      command: "submenu:settings"
      permission: ""

    # 新手引导 - 右下
    tutorial:
      slot: 34
      material: NETHER_STAR
      display-name: "&f&l📖 新手引导"
      glow: true
      lore:
        - ""
        - "&7学习国家系统基础操作"
        - "&7了解各种玩法机制"
        - ""
        - "&7═══════════════════════"
        - "&a▶ 点击开始教程"
        - "&7═══════════════════════"
      command: "tutorial start"
      permission: ""

    # 快速帮助 - 底部左
    help:
      slot: 46
      material: BOOK
      display-name: "&f&l❓ 快速帮助"
      glow: false
      lore:
        - ""
        - "&7查看常用指令"
        - "&7了解操作方法"
        - ""
        - "&e▶ 点击获取帮助"
      command: "sc help nation"
      permission: ""

    # 关闭按钮 - 底部中间
    close:
      slot: 49
      material: BARRIER
      display-name: "&c✖ 关闭菜单"
      glow: false
      lore:
        - ""
        - "&7点击关闭菜单"
        - ""
