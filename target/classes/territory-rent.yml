# StarCore 领土租借系统配置
# 租借系统允许国家之间租借领土

territory-rent:
  # 默认每区块每日租金
  default-rent-per-chunk: 10.0

  # 创建租借契约的手续费
  creation-fee: 50.0

  # 租借提议过期时间（分钟）
  proposal-expiry-minutes: 1440

  # 最大租借天数
  max-lease-days: 365

  # 每日自动扣款是否启用
  auto-daily-rent: true

  # 是否允许个人租借（不通过国家）
  allow-player-lease: false

  # 租借区块最小数量
  min-chunks: 1

  # 租借区块最大数量
  max-chunks: 100

  feedback:
    # 是否启用游戏内反馈
    enabled: true
    default:
      sound: ENTITY_EXPERIENCE_ORB_PICKUP
      sound-volume: 0.7
      sound-pitch: 1.0
      actionbar: ""
      title: ""
      subtitle: ""
      title-fade-in-ticks: 8
      title-stay-ticks: 36
      title-fade-out-ticks: 10
      bossbar: ""
      bossbar-color: GREEN
      bossbar-overlay: PROGRESS
      bossbar-progress: 1.0
      bossbar-duration-ticks: 20
    lease-created:
      sound: ENTITY_PLAYER_LEVELUP
      particle: HAPPY_VILLAGER
      particle-count: 12
      actionbar: "租借契约已创建，等待对方确认"
      title: "租借提议"
      subtitle: "等待对方接受租借"
      bossbar: "租借提议已创建"
      bossbar-color: YELLOW
    lease-accepted:
      sound: ENTITY_EXPERIENCE_ORB_PICKUP
      particle: END_ROD
      particle-count: 10
      actionbar: "租借契约已生效"
      title: "租借生效"
      subtitle: "领土使用权已转移"
      bossbar: "租借契约已生效"
      bossbar-color: GREEN
    lease-rejected:
      sound: UI_BUTTON_CLICK
      sound-volume: 0.55
      actionbar: "租借提议已被拒绝"
      bossbar: "租借提议被拒绝"
      bossbar-color: RED
      bossbar-progress: 0.5
    lease-terminated:
      sound: BLOCK_NOTE_BLOCK_BASS
      sound-pitch: 0.75
      actionbar: "租借契约已被终止"
      bossbar: "租借已终止"
      bossbar-color: RED
    lease-expired:
      sound: UI_BUTTON_CLICK
      sound-volume: 0.5
      actionbar: "租借契约已过期"
      bossbar: "租借已过期"
      bossbar-color: YELLOW
    rent-collected:
      sound: ENTITY_EXPERIENCE_ORB_PICKUP
      particle: HAPPY_VILLAGER
      particle-count: 6
      actionbar: "租金已收取"
      bossbar: "日租已结算"
      bossbar-color: GREEN
    rent-payment-failed:
      sound: BLOCK_NOTE_BLOCK_BASS
      sound-pitch: 0.75
      actionbar: "租金支付失败，契约终止"
      title: "支付失败"
      subtitle: "请检查余额"
      bossbar: "租金支付失败"
      bossbar-color: RED