# ============================================================
# STARCORE 国家教程配置文件
# ============================================================
# 每个教程包含多个步骤，显示在玩家头顶的气泡中
# 支持的触发条件：
#   trigger-first-login - 首次登录时触发
#   trigger-no-nation - 未加入国家时触发
#   trigger-admin-rank - 管理员权限时触发
# ============================================================

# --- 新手入门教程 ---
tutorials:
  beginner:
    enabled: true
    title: "新手入门"
    description: "了解国家系统的基础功能"
    trigger-first-login: true

    steps:
      step1:
        title: "欢迎来到国家系统！"
        content:
          - "欢迎加入 StarCore 国家系统！"
          - "在这里你可以创建或加入国家，"
          - "与其他玩家一起管理和扩展你的王国。"
          - ""
          - "让我们开始了解基本功能吧！"
        hint: "点击任意位置继续..."
        command: "/sc nation gui"

      step2:
        title: "创建或加入国家"
        content:
          - "你有两种选择："
          - ""
          - "1. 创建自己的国家"
          - "   消耗 500 星尘即可创建"
          - "   使用指令: /sc nation create <名称>"
          - ""
          - "2. 加入现有国家"
          - "   使用指令: /sc nation list 查看所有国家"
          - "   然后申请加入你喜欢的国家"
        hint: "准备好后继续下一步..."
        command: "/sc nation list"

      step3:
        title: "国家核心功能"
        content:
          - "加入国家后，你可以："
          - ""
          - "- 查看和管理成员"
          - "- 管理和使用国库资金"
          - "- 占领和扩展领土"
          - "- 研发科技提升实力"
          - "- 制定国家政策和外交关系"
        hint: "继续了解更多信息..."
        command: ""

      step4:
        title: "政体系统"
        content:
          - "国家有不同的政体类型："
          - ""
          - "君主制 - 君主拥有最高决策权"
          - "共和制 - 议会投票决策"
          - "独裁制 - 快速决策，高效执行"
          - "民主制 - 所有成员参与决策"
        hint: "了解税率系统..."
        command: "/sc government"

      step5:
        title: "税率与国库"
        content:
          - "国家会从成员收取税款："
          - ""
          - "税率由管理员设置 (0-50%)"
          - "税款自动存入国库"
          - "国库用于：购买领土、科技研发等"
          - ""
          - "建议：初期设置低税率吸引成员"
        hint: "了解领土系统..."
        command: "/sc treasury"

      step6:
        title: "领土系统"
        content:
          - "领土是国家的重要组成部分："
          - ""
          - "- 使用领地工具选择区域"
          - "- 从国库支付购买费用"
          - "- 领土提供资源采集加成"
          - "- 保护成员免受入侵"
        hint: "继续了解外交..."
        command: "/sc claim"

      step7:
        title: "外交与战争"
        content:
          - "与其他国家的互动："
          - ""
          - "- 联盟 - 互相帮助，共同防御"
          - "- 停战 - 暂时休战"
          - "- 宣战 - 发动战争掠夺资源"
          - "- 吞并 - 战胜后可吞并敌国"
        hint: "教程即将完成..."
        command: "/sc diplomacy"

      step8:
        title: "教程完成！"
        content:
          - "恭喜你完成了新手教程！"
          - ""
          - "你现在可以："
          - "1. 使用 /sc nation gui 打开国家菜单"
          - "2. 邀请朋友加入你的国家"
          - "3. 开始扩展领土和发展科技"
          - ""
          - "祝你游戏愉快！"
        hint: "点击关闭教程气泡"
        command: "/sc nation gui"

  # --- 访客指南 ---
  visitor:
    enabled: true
    title: "访客指南"
    description: "为未加入国家的玩家提供指导"
    trigger-no-nation: true

    steps:
      step1:
        title: "你还没有加入国家"
        content:
          - "欢迎来到 StarCore 世界！"
          - ""
          - "要参与更多玩法，你需要加入一个国家，"
          - "或者创建自己的国家！"
        hint: "查看创建国家选项..."
        command: "/sc nation gui"

      step2:
        title: "快速开始"
        content:
          - "创建国家仅需 500 星尘："
          - ""
          - "1. 输入 /sc nation create <国家名>"
          - "2. 等待国家创建完成"
          - "3. 使用 /sc nation gui 管理国家"
        hint: "查看加入国家选项..."
        command: "/sc nation create"

      step3:
        title: "加入现有国家"
        content:
          - "也可以加入已有国家："
          - ""
          - "1. 输入 /sc nation list 查看所有国家"
          - "2. 选择你喜欢的国家"
          - "3. 发送加入申请"
          - "4. 等待管理员批准"
        hint: "教程完成！"
        command: "/sc nation list"

  # --- 管理员指南 ---
  admin:
    enabled: true
    title: "管理员指南"
    description: "帮助管理员更好地管理国家"
    trigger-admin-rank: true

    steps:
      step1:
        title: "管理员权限"
        content:
          - "作为管理员，你可以："
          - ""
          - "- 修改国家名称"
          - "- 设置税率"
          - "- 变更政体"
          - "- 管理成员权限"
          - "- 邀请或踢出成员"
        hint: "继续了解..."
        command: ""

      step2:
        title: "政体选择建议"
        content:
          - "不同政体适合不同情况："
          - ""
          - "君主制 - 适合小型、紧密的团队"
          - "独裁制 - 适合军事化管理"
          - "共和制 - 适合中等规模国家"
          - "民主制 - 适合大型社区"
        hint: "继续..."
        command: "/sc government"

      step3:
        title: "税率设置建议"
        content:
          - "税率设置平衡指南："
          - ""
          - "5% - 低税率，吸引成员"
          - "10% - 中税率，平衡发展"
          - "15% - 高税率，快速积累"
          - "20%+ - 危险，可能流失成员"
        hint: "完成管理员教程"
        command: "/sc treasury"