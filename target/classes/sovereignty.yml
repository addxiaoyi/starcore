# Sovereignty Module Configuration
# V0.1.0

# 模块启用/禁用
enabled: true

# 主权声明设置
declaration:
  # 每个国家最多声明的主权数量
  max-sovereignties-per-nation: 10
  # 每个区域允许的最大主权声明数量（通常为1）
  max-claims-per-region: 1
  # 初始主权强度
  initial-strength: 0
  # 主权强度上限
  max-strength: 1000

# 主权重要性等级权重
significance:
  # 低重要性
  low:
    priority: 1
    strength-bonus: 0
  # 中重要性
  medium:
    priority: 2
    strength-bonus: 50
  # 高重要性
  high:
    priority: 3
    strength-bonus: 150
  # 关键重要性
  critical:
    priority: 5
    strength-bonus: 500

# 事件设置
events:
  # 是否在主权声明时广播消息
  broadcast-on-declare: true
  # 是否在主权撤销时广播消息
  broadcast-on-revoke: true
  # 是否启用进入主权区域提示
  show-region-enter-title: true

# 权限设置
permissions:
  # 声明主权所需权限
  declare: "starcore.sovereignty.declare"
  # 撤销主权所需权限
  revoke: "starcore.sovereignty.revoke"
  # 查看主权所需权限
  view: "starcore.sovereignty.view"
  # 管理他国主权所需权限（管理员）
  admin: "starcore.sovereignty.admin"
