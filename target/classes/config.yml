    tool:
      # 是否启用 RPG 式圈地工具。玩家可用 /sc n t 获取工具。
      enabled: true
      # 工具物品材质，使用 Bukkit/Paper 材质名。默认 GOLDEN_SHOVEL，适合做“领地权杖”。
      material: GOLDEN_SHOVEL
      # 工具显示名。
      name: 领地权杖
      # 工具说明。尽量保持短句，避免物品描述过长。
      lore:
        - 左键选择第一个区块
        - 右键选择第二个区块
        - 输入 /sc n ok 确认圈地
    protection:
      # 是否启用 STARCORE 原生领地保护。关闭后领地仍会记录和显示在地图上，但不拦截破坏/交互等事件。
      enabled: true
      # 是否允许本国成员操作本国领地。关闭后只有国家领导者和拥有 starcore.admin 权限的管理员可操作。
      allow-nation-members: true
      # 保护方块破坏和放置。
      protect-build: true
      # 保护按钮、门、容器、农田踩踏等方块交互，以及实体右键交互。
      protect-interactions: true
      # 保护水桶/岩浆桶取放。
      protect-buckets: true
      # 保护领地内的展示框、盔甲架、载具等实体不被外人操作或破坏。
      protect-entities: true
      # 保护爆炸不破坏已圈领地区块。
      protect-explosions: true
      # 保护活塞不把方块推入或拉出不同归属的领地区块。
      protect-pistons: true
      # 保护末影人搬方块、实体踩改方块等无玩家直接操作者的破坏。
      protect-entity-grief: true
      # 保护液体不要跨领地边界流入或流出。
      protect-liquid-flow: true
      # 保护火焰点燃、蔓延和燃烧已圈领地区块。
      protect-fire-spread: true
      # 拒绝提示冷却秒数，避免玩家持续点击时刷屏；0 表示每次都提示。
      message-cooldown-seconds: 2
