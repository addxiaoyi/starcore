# STARCORE V0.1.0 核心配置
# 说明：
# - 时间单位支持 seconds/minutes/hours/days，也支持中文 秒/分钟/小时/天。
# - 金额保留两位小数；0 表示免费。
# - 修改 modules 模块开关后需要重启服务器，普通数值配置可用 /starcore reload 重载。
#
# ⚠️ 重要: config-version 用于配置迁移校验，请勿随意修改
config-version: "1.0"

# 语言/国际化配置
locale: zh_cn
# 支持的语言代码：
# - zh_cn: 简体中文（默认）
# - en_us: English
# - zh_tw: 繁體中文
# - ja_jp: 日本語
# - ko_kr: 한국어
# 玩家可使用 /language 命令切换自己的语言，管理员可使用 /language set <玩家> <语言> 设置他人语言

# 菜单系统配置
menu:
  # 菜单提供者类型：
  # - auto: 自动选择最佳可用提供者（推荐）
  # - nightcore: NightCore Dialog（原生风格输入界面，需要 NightCore 插件）
  # - protocollib: ProtocolLib AnvilGUI（Anvil 输入框，需要 ProtocolLib）
  # - triumph: TriumphGUI 箱子界面（需要 TriumphGUI 库）
  # - fallback: 纯聊天式交互（始终可用）
  provider: auto

# 经济转账配置
economy:
  transfer:
    # 转账税率（0.0-1.0），0 表示无税，0.05 表示 5%
    tax-rate: 0.05
    # 最小转账金额
    min-amount: 1.0
    # 每日转账限额
    daily-limit: 100000.0
  # Vault 货币名称配置
  currency:
    # 单数形式（如：金币、元、美元）
    singular: "金币"
    # 复数形式（如：金币、元、美元）
    plural: "金币"

database:
  # 是否启动 STARCORE 数据库连接池。默认启用 SQLite，后续 SQL 仓库迁移可直接复用。
  # 当前已默认由 SQL 托管的运行态包括：领地、个人余额、国家、资源区块、金库、外交、国策、资源库存、科技、战争、官员、事件与决议状态。
  # 首次切到 SQL 时，如果对应数据表为空，会自动导入旧的 properties 快照；数据库不可用时这些状态会回退到文件存储。
  enabled: true
  # 数据库启动失败时是否阻止插件继续启用。
  # false 表示记录错误后继续使用本地 properties 状态，适合测试服；生产服强依赖 SQL 时可改 true。
  fail-fast: false
  # 数据库类型：sqlite 或 mysql。mariadb 会按 mysql 驱动连接。
  type: sqlite
  sqlite:
    # SQLite 数据库文件。相对路径会放在 plugins/STARCORE/ 下；也可以写绝对路径。
    file: starcore.db
  mysql:
    # MySQL/MariaDB 地址。切换 type: mysql 后生效。
    host: 127.0.0.1
    # MySQL/MariaDB 端口。
    port: 3306
    # 数据库名，需要提前创建并授予账号权限。
    database: starcore
    # 数据库用户名。
    username: starcore
    # 数据库密码。正式服建议只在本机配置文件中填写，不要上传到公开仓库。
    password: ""
    # JDBC 参数。大多数服保持默认即可；需要 SSL 或连接时区时在这里调整。
    parameters: "useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC"
  pool:
    # 最大连接数。小服 SQLite 建议 2-4；MySQL 大服可按在线人数和机器资源提高。
    maximum-pool-size: 8
    # 最小空闲连接数。SQLite 可设 0-1，MySQL 建议 1-2。
    minimum-idle: 1
    # 获取连接最长等待时间，单位毫秒。
    connection-timeout-ms: 30000
    # 空闲连接保留时间，单位毫秒。
    idle-timeout-ms: 600000
    # 单个连接最长生命周期，单位毫秒。MySQL 应低于服务端 wait_timeout。
    max-lifetime-ms: 1800000
    # 连接保活间隔，单位毫秒。0 表示关闭 HikariCP 保活。
    keepalive-time-ms: 0
    # 连接校验超时，单位毫秒。
    validation-timeout-ms: 5000
    # 泄漏检测阈值，单位毫秒。0 表示关闭；排查卡顿/连接泄漏时可临时设 60000。
    leak-detection-threshold-ms: 0

core:
  # STARCORE 内部异步线程数。建议 2-8，地图渲染/头像缓存等异步任务会使用它。
  async-threads: 4
  # 开启后会输出更多诊断日志。
  debug: false

epoch:
  # 是否启用纪元系统。启用后可通过 /starcore epoch status 查看当前纪元。
  enabled: true
  # 纪元开始时间，ISO-8601 UTC 格式。留空时使用 Unix 起点 1970-01-01T00:00:00Z。
  start-time: "1970-01-01T00:00:00Z"
  length:
    # 每个纪元的长度数值。
    amount: 1
    # 每个纪元的单位：seconds/minutes/hours/days 或 秒/分钟/小时/天。
    unit: days

time-sync:
  # 是否把游戏世界时间同步到现实时间。开启后现实白天游戏也会是白天，现实夜晚游戏也会是夜晚。
  enabled: false
  # 使用哪个现实世界时区来计算昼夜。中国服务器建议 Asia/Shanghai。
  timezone: Asia/Shanghai
  # 同步哪些世界。空列表表示自动同步所有普通主世界；填写世界名时只同步这些世界。
  worlds: []
  # 同步间隔，单位 tick，20 tick = 1 秒。建议 100-400，默认 200 即每 10 秒校准一次。
  interval-ticks: 200
  # 是否允许同步下界和末地。默认关闭，避免 RPG 服务器维度氛围被现实时间覆盖。
  allow-nether-end: false

nation:
  limits:
    # 每名玩家最多可以创建/领导几个国家。
    max-nations-per-player: 1
    # 每名玩家最多可以创建/领导几个城邦。
    max-city-states-per-player: 3
    # 每个国家下面最多允许几个城邦。
    max-city-states-per-nation: 3
    # 每个国家最多圈多少区块；-1 表示无限制。
    max-claims-per-nation: 64
    # 每个国家最多多少成员；-1 表示无限制。
    max-members-per-nation: 50
  economy:
    # 创建国家需要从玩家个人账户扣除的费用。
    nation-create-cost: 500.00
    # 创建城邦需要从玩家个人账户扣除的费用。
    city-state-create-cost: 250.00
    # 每次圈地区块需要从玩家个人账户扣除的费用。
    claim-cost: 100.00
    # 是否只有国家创建者/领导者能圈地。
    leader-only-claim: true
    daily-income:
      # 是否允许后续周期任务自动结算国家日常收入。当前版本先提供手动 /sc tr inc/all，默认关闭自动结算。
      auto-enabled: false
      # 自动结算周期预留配置。后续接入纪元/每日任务时使用，当前不主动运行。
      auto-interval: days
      auto-amount: 1
      # 国家日常收入结算的基础金额。管理员可用 /sc tr inc <国家> 手动结算。
      base-amount: 100.00
      # 每名国家成员额外给予多少国库收入。
      per-member: 25.00
      # 每个已圈领地区块额外给予多少国库收入。
      per-claim: 5.00
    tax:
      # 是否启用玩家税收。默认关闭，避免未经服主确认就自动扣玩家余额。
      enabled: false
      # 每名国家成员每次税收结算固定扣多少金币。0 表示不启用固定税。
      fixed-amount: 0.00
      # 每名成员按个人余额百分比扣税。例：2.50 表示扣当前余额的 2.5%。0 表示不启用比例税。
      balance-percent: 0.00
      # 税后至少保留多少个人余额。用于 RPG 服保护新玩家不被扣空。
      minimum-balance: 0.00
      # 成员余额不足时是否跳过该成员。true 表示跳过；false 表示扣到 minimum-balance 以上的可用余额。
      skip-insufficient-members: true
      # 是否自动周期结算玩家税收。必须 enabled 和 auto-enabled 同时为 true 才会启动。
      auto-enabled: false
      # 自动税收结算周期单位，支持 seconds/minutes/hours/days，也支持 秒/分钟/小时/天。
      auto-interval: days
      # 自动税收结算周期数量。auto-interval=hours、auto-amount=6 表示每 6 小时结算一次。
      auto-amount: 1
  resources:
    # 是否启用国家资源区块、国家经验和等级领地上限。
    enabled: true
    # 国家领导者迁移一个资源区块需要支付的个人金币。
    migration-cost: 100000.00
    # 迁移目标设置后，如果旧资源区块长时间没人挖完，多少小时后强制清空旧资源并迁移。
    force-migration-hours: 4
    level:
      # 是否使用国家等级计算圈地上限。开启后 nation.limits.max-claims-per-nation 只作为旧版备用。
      use-level-claim-limit: true
      # 国家最高等级。
      max-level: 100
      # 1 级升 2 级需要的国家经验。
      base-experience: 1000
      # 每升一级额外增加的升级经验需求。例：2->3 需要 base + step。
      experience-step: 250
      # 1 级国家最多覆盖多少区块。
      claims-at-level-1: 20
      # 每提升 1 级额外增加多少领地区块上限。
      claims-per-level: 5
      # 国家领地区块硬上限；-1 表示不额外限制，只按等级公式计算。
      hard-max-claims-per-nation: -1
    resource-districts:
      # 初始资源区块上限。建立国家并拥有领地后，默认会自动生成 1 个资源区块。
      initial-limit: 1
      # 每多少国家等级额外解锁 1 个资源区块上限。默认每 10 级 +1。
      levels-per-district: 10
      # 资源区块总硬上限；100 级、初始 1、每 10 级 +1 时默认最多 11 个。
      max-limit: 11
    refresh:
      # 检查资源区块是否该刷新的间隔，单位 tick，20 tick = 1 秒。
      check-interval-ticks: 1200
      # 资源刷新基础冷却，单位分钟。实际冷却会按生物群系资源丰富度缩短或延长。
      base-cooldown-minutes: 60
      # 资源刷新最短冷却，单位分钟。
      min-cooldown-minutes: 20
      # 资源刷新最长冷却，单位分钟。
      max-cooldown-minutes: 180
      # 每次刷新尝试生成的基础矿物数量。
      base-resource-amount: 32
      # 生物群系资源丰富度对矿物数量的影响倍率。
      richness-amount-multiplier: 1.0
      # 每次资源刷新给予国家的基础经验。
      base-experience: 120
      treasury-income:
        # 是否在资源区块成功刷新矿物时，自动给国家国库发放资源产出收入。
        enabled: true
        # 每个资源区块每轮成功刷新后的国库基础收入。
        base-income: 250.00
        # 每生成 1 个矿物方块额外给予多少国库收入。
        income-per-generated-block: 15.00
        # 生物群系资源丰富度对国库收入的倍率。实际收入 = (基础收入 + 单块收入 × 生成数量) × 丰富度 × 此倍率。
        richness-multiplier: 1.0
      # 单个资源区块每轮最多实际放置多少个矿物方块，避免一次性改太多方块。
      max-blocks-per-cycle: 96
    beacon:
      # 资源区块地表标记方块。默认 BEACON，会被 STARCORE 保护为无法破坏。
      material: BEACON
      # 是否在信标上方显示资源状态悬浮文字。
      display-enabled: true
      # 悬浮文字距离信标方块底部的高度。
      display-y-offset: 2.35
    feedback:
      # 是否启用资源区块相关的游戏内声音和粒子反馈。关闭后仍保留文字、GUI 和事件日志。
      enabled: true
      default:
        # 默认音量和音高会被单个事件覆盖。声音名称使用 Paper/Bukkit Sound 枚举名。
        sound-volume: 0.8
        sound-pitch: 1.0
        # 默认粒子数量和扩散半径会被单个事件覆盖。粒子名称使用 Paper/Bukkit Particle 枚举名。
        particle-count: 12
        particle-spread: 0.45
        # 粒子相对信标/目标方块中心向上的偏移，避免挡住方块本体。
        particle-y-offset: 1.2
        # 默认可见提示。留空表示该事件不发送对应 actionbar/title。
        actionbar: ""
        title: ""
        subtitle: ""
        # title 动画时长，单位为 tick。20 tick = 1 秒。
        title-fade-in-ticks: 10
        title-stay-ticks: 40
        title-fade-out-ticks: 10
        # BossBar 短时提示。留空表示该事件不显示 BossBar；颜色/样式使用 Adventure BossBar 枚举名。
        bossbar: ""
        bossbar-color: YELLOW
        bossbar-overlay: PROGRESS
        bossbar-progress: 1.0
        bossbar-duration-ticks: 30
      migration-started:
        # 领袖确认迁移并领取迁移核心时的反馈。
        sound: ENTITY_PLAYER_LEVELUP
        particle: END_ROD
        particle-count: 18
        actionbar: "资源区块迁移核心已交付"
        bossbar: "资源区块迁移已启动"
        bossbar-color: YELLOW
        bossbar-duration-ticks: 8
      migration-target-selected:
        # 迁移核心右键本国目标区块成功时的反馈。
        sound: BLOCK_AMETHYST_BLOCK_CHIME
        particle: HAPPY_VILLAGER
        particle-count: 14
        title: "迁移目标已锁定"
        subtitle: "挖空原资源点后完成迁移"
        bossbar: "目标已锁定，等待原资源点耗尽"
        bossbar-color: GREEN
        bossbar-progress: 0.75
        bossbar-duration-ticks: 8
      migration-completed:
        # 旧区块资源挖空后完成迁移时的反馈。
        sound: UI_TOAST_CHALLENGE_COMPLETE
        particle: TOTEM_OF_UNDYING
        particle-count: 24
        particle-spread: 0.75
        title: "资源区块迁移完成"
        subtitle: "新资源点已就绪"
        bossbar: "资源区块迁移完成"
        bossbar-color: GREEN
        bossbar-duration-ticks: 30
      migration-completed-forced:
        # 超时强制迁移时的反馈，默认更克制，避免误认为玩家主动完成。
        sound: BLOCK_BEACON_DEACTIVATE
        particle: CLOUD
        particle-count: 16
        actionbar: "资源区块已按超时规则强制迁移"
        bossbar: "资源区块已强制迁移"
        bossbar-color: YELLOW
        bossbar-progress: 0.5
      migration-blocked:
        # 余额不足、权限不足、目标非法等阻塞状态的短反馈。
        sound: BLOCK_NOTE_BLOCK_BASS
        sound-pitch: 0.75
        particle: SMOKE
        particle-count: 6
        particle-spread: 0.25
        actionbar: "资源区块操作受阻"
        bossbar: "资源区块操作受阻"
        bossbar-color: RED
        bossbar-progress: 0.35
        bossbar-duration-ticks: 20
      resource-refreshed:
        # 资源区块刷新出新矿物时的反馈。
        sound: BLOCK_AMETHYST_BLOCK_RESONATE
        particle: GLOW
        particle-count: 16
        actionbar: "资源区块资源已刷新"
      resource-mined:
        # 玩家挖掉资源区块内追踪矿物时的轻反馈，数量较低以保护性能。
        sound: ENTITY_EXPERIENCE_ORB_PICKUP
        sound-volume: 0.45
        sound-pitch: 1.35
        particle: ENCHANT
        particle-count: 5
        particle-spread: 0.18
        actionbar: "资源采集已记录"
    migration-item:
      # 迁移确认后给国家领导者的下界之星名称。
      name: 资源区块迁移核心
      # 下界之星说明。玩家右键本国领地区块即可设置迁移目标。
      lore:
        - 右键一个本国领地区块
        - 设置资源区块迁移目标
  claims:
    pricing:
      # 网页地图和游戏内领地权杖共用同一套价格算法。
      # 最终价格 = 基础圈地单价 claim-cost × 距离倍率 × 生物群系资源倍率。
      detail-limit: 32
      distance:
        # 是否让距离世界中心越远的区块越贵。
        enabled: true
        # 世界中心坐标，默认 0,0。RPG 服如果以主城为中心，可以改成主城坐标。
        world-center-x: 0.0
        world-center-z: 0.0
        # 每隔多少方块增加一次距离价格倍率。
        step-blocks: 1000
        # 每个距离阶梯增加多少倍率。0.05 表示每 1000 格增加 5%。
        step-multiplier: 0.05
        # 距离倍率上限，避免极远区块价格爆炸。
        max-multiplier: 3.0
      biome:
        # 是否按生物群系理论资源丰富程度调整价格。
        enabled: true
        # 生物群系价格倍率下限和上限。资源越丰富越贵，贫瘠地区越便宜。
        min-multiplier: 0.50
        max-multiplier: 1.80
        # 未识别生物群系的默认资源丰富度。
        unknown-richness: 1.0
        # 生物群系资源丰富度覆盖。键使用 Bukkit 生物群系小写名，例如 snowy_plains、forest、jagged_peaks。
        # 低资源：冰原/冻洋/沙漠通常便宜；高资源：森林/丛林/山地通常更贵。
        richness-overrides:
          snowy_plains: 0.55
          ice_spikes: 0.55
          frozen_ocean: 0.55
          desert: 0.65
          ocean: 0.70
          plains: 0.95
          savanna: 0.90
          forest: 1.15
          birch_forest: 1.12
          dark_forest: 1.18
          taiga: 1.05
          jungle: 1.25
          swamp: 1.20
          mangrove_swamp: 1.20
          stony_peaks: 1.35
          jagged_peaks: 1.35
        meadow: 0.95
        mushroom_fields: 1.40
    feedback:
      # 是否启用圈地相关的游戏内反馈。关闭后仍保留命令文字、网页状态和事件日志。
      enabled: true
      default:
        # 声音名称使用 Paper/Bukkit Sound 枚举名；留空表示该事件不播放声音。
        sound: ""
        sound-volume: 0.7
        sound-pitch: 1.0
        # 粒子名称使用 Paper/Bukkit Particle 枚举名；留空或数量为 0 表示不生成粒子。
        particle: ""
        particle-count: 0
        particle-spread: 0.35
        particle-y-offset: 1.0
        # 默认可见提示。留空表示该事件不发送对应 actionbar/title。
        actionbar: ""
        title: ""
        subtitle: ""
        title-fade-in-ticks: 5
        title-stay-ticks: 30
        title-fade-out-ticks: 8
        # BossBar 短时提示。留空表示该事件不显示 BossBar；颜色/样式使用 Adventure BossBar 枚举名。
        bossbar: ""
        bossbar-color: GREEN
        bossbar-overlay: PROGRESS
        bossbar-progress: 1.0
        bossbar-duration-ticks: 20
      tool-confirmed:
        sound: ENTITY_PLAYER_LEVELUP
        particle: HAPPY_VILLAGER
        particle-count: 12
        actionbar: "圈地完成，新的国土已生效"
        title: "圈地完成"
        subtitle: "国家边界已更新"
        bossbar: "圈地完成"
        bossbar-color: GREEN
        bossbar-duration-ticks: 16
      tool-cancelled:
        sound: UI_BUTTON_CLICK
        sound-volume: 0.45
        actionbar: "已取消当前圈地选择"
      tool-failed:
        sound: BLOCK_NOTE_BLOCK_BASS
        sound-volume: 0.45
        sound-pitch: 0.75
