map:
  # 静态地图导出目录。默认 .. 表示导出到服务器目录的上一级 map 文件夹。
  export-directory: ..
  web:
    # 是否启动内置战略地图 Web 服务。
    enabled: true
    # 监听地址。公网部署建议仍监听 127.0.0.1，再由反向代理转发。
    host: 127.0.0.1
    port: 8716
    # 对外访问地址。玩家不在服务器本机访问时请填写，例如 https://map.example.com/。
    public-url: ""
    # 允许跨域访问的来源列表。空列表表示仅同源。
    cors-allowed-origins: []
    # 受信任反向代理 IP 列表，用于识别真实访客地址。
    trusted-proxies: []
    # 地图个人链接签名密钥。首次启动会自动替换 change-this-secret。
    access-secret: change-this-secret
    # 个人地图链接有效期，单位分钟。
    access-ttl-minutes: 120
    # IP 绑定访问有效期，单位分钟。
    ip-access-ttl-minutes: 120
    # 是否启用地图实时推送。
    sse-enabled: true
    # 实时推送间隔，单位 tick，20 tick = 1 秒。
    sse-interval-ticks: 40
    # 是否允许玩家在网页地图上拖框选择领地。
    claim-selection-enabled: true
    # 是否允许国家领导者在网页地图上发起资源区块迁移。
    # 开启后网页地图会复用游戏内信标菜单的迁移逻辑，并要求玩家在线领取迁移核心。
    resource-district-management-enabled: true
    # 财政流水 CSV 导出是否写入 UTF-8 BOM。
    # 开启后 Windows Excel 等表格软件更容易正确识别中文；若你的工具不需要 BOM，可关闭。
    finance-export:
      csv-bom-enabled: true
    # 单次网页拖框最多允许包含多少个区块。服务端会二次校验，建议不要超过国家领地上限。
    claim-max-chunks: 64
    # 网页提交后，玩家必须在多少分钟内回到游戏里确认。
    claim-pending-minutes: 5
    # 同一玩家两次网页圈地提交之间的冷却秒数，0 表示无冷却。
    claim-cooldown-seconds: 10
    # 是否启用地形瓦片渲染。
    terrain-enabled: true
    # 是否允许加载已生成但当前未加载的区块快照。
    terrain-load-generated-chunks: true
    # 内存地形瓦片缓存秒数。
    terrain-tile-cache-seconds: 300
    # 内存地形瓦片缓存最大条目数。
    terrain-tile-cache-max-entries: 512
    # 单张地形瓦片的像素尺寸。
    # 128 更省性能但细节较低，256 为推荐默认，512 更清晰但渲染和传输成本更高。
    terrain-tile-pixels: 256
    # 同时渲染地形瓦片的最大任务数。
    terrain-tile-max-concurrent-renders: 2
    # 是否启用磁盘瓦片缓存。
    terrain-tile-disk-cache-enabled: true
    # 磁盘瓦片缓存保留小时数。
    terrain-tile-disk-cache-hours: 24
    # 方块变化后，需要标记失效的地形瓦片尺寸，单位方块。
    # 大尺寸用于远景快速刷新，小尺寸用于近景精确刷新；移除小尺寸可降低更新压力但近景刷新会更粗。
    terrain-dirty-tile-sizes: [256, 128, 64, 32, 16, 8, 4, 2, 1]
    # 地形脏瓦片追踪最大条目数。
    # 大服频繁改方块时可适当调高；过低会更依赖磁盘缓存 TTL 重新渲染。
    terrain-dirty-max-entries: 8192
    # 是否在启动后预热出生点附近地形瓦片。
    terrain-prewarm-enabled: true
    # 预热半径，单位方块。
    terrain-prewarm-radius-blocks: 256
    # 单次最多预热多少瓦片。
    terrain-prewarm-max-tiles: 96
    # 预热任务间隔，单位 tick。
    terrain-prewarm-interval-ticks: 4
    # 预热瓦片尺寸，单位方块。
    terrain-prewarm-tile-sizes: [128, 64, 32, 16]
    # 是否缓存玩家头像。
    avatar-cache-enabled: true
    # 玩家头像缓存有效期，单位分钟。
    avatar-cache-ttl-minutes: 360
    # 玩家头像缓存清理间隔，单位 tick。
    avatar-cleanup-interval-ticks: 72000
    # 头像源会按顺序尝试，{uuid} 会替换为玩家 UUID。
    avatar-upstreams:
      - "https://crafatar.com/avatars/{uuid}?size=64&overlay"
      - "https://minotar.net/avatar/{uuid}/64.png"
      - "https://mc-heads.net/avatar/{uuid}/64"

ledger:
  # 财政/事件流水分类规则。命令 /sc ev audit/export 与网页地图财政流水共用这里。
  # event-types 是精确事件类型；prefixes 是前缀匹配。新增 RPG 任务、副本、资源税等自定义流水时，优先加 event-types。
  categories:
    # 财政总览分类：默认包含国库 treasury.* 与资源 resource.* 事件。
    finance:
      event-types: []
      prefixes: [treasury., resource.]
    # 资源区块自动产出进入国库的流水分类。
    resource-income:
      event-types: [treasury.resource-income]
      prefixes: []
    # 日常收入，例如周期性国库收入。
    income:
      event-types: [treasury.income]
      prefixes: []
    # RPG/任务/副本奖励进入国库的流水分类。
    reward:
      event-types: [treasury.reward]
      prefixes: []
    # 玩家税收进入国库的流水分类。
    tax:
      event-types: [treasury.tax]
      prefixes: []
    # 管理员或系统向国库存入。
    deposit:
      event-types: [treasury.deposit]
      prefixes: []
    # 国库支出、迁移资源区块等扣款。
    withdraw:
      event-types: [treasury.withdraw]
      prefixes: []
    # 下面这些分类用于 /sc ev audit 的非财政事件筛选。
    nation:
      event-types: []
      prefixes: [nation.]
    territory:
      event-types: []
      prefixes: [territory.]
    city-state:
      event-types: []
      prefixes: [city_state.]
    treasury:
      event-types: []
      prefixes: [treasury.]
    resource:
      event-types: []
      prefixes: [resource.]
    policy:
      event-types: []
      prefixes: [policy.]
    technology:
      event-types: []
      prefixes: [technology.]
    diplomacy:
      event-types: []
      prefixes: [diplomacy.]
    war:
      event-types: []
      prefixes: [war.]
    officer:
      event-types: []
      prefixes: [officer.]

modules:
  # ================================================================
  # 核心业务模块 - 国家系统的核心功能
  # ================================================================
  nation: true           # 国家系统：创建/解散国家、成员管理、领土圈地
  government: true       # 政体系统：君主制/共和制/独裁制
  resolution: true       # 决议系统：国家投票决策
  treasury: true         # 国库系统：资金管理、税收
  diplomacy: true        # 外交系统：联盟/停战/宣战
  policy: true           # 政策系统：国家政策效果
  map: true              # 地图系统：网页地图、标记
  war: true              # 战争系统：宣战、战斗、停战协议
  technology: true        # 科技系统：研发、升级
  resource: true         # 资源系统：资源区块、采集、加工
  officer: true          # 官职系统：任命官员、权限管理
  event: true            # 事件系统：事件记录、查询、统计

  # ================================================================
  # 功能子系统 - 扩展玩法
  # ================================================================
  essentials: true       # 基础功能：家、传送点
  pvp: true              # PvP 系统：决斗、伤害规则
  army: true             # 军事系统：军队编制
  commander: true         # 指挥官系统：军事指挥官任命
  doctrine: true         # 学说系统：军事学说
  storage: true          # 仓库系统：存储物品
  title: true            # 称号系统：称号、徽章
  city: true             # 城市子系统：城市管理
  satellite: true        # 卫星系统：附属国/宗主国关系
  faith: true            # 信仰系统：宗教玩法
  split: true            # 分裂系统：国家分裂
  territory_rent: true    # 领土租借：租借系统
  arbitration: true      # 仲裁系统：领土争议仲裁

  # ================================================================
  # 第三方集成与特殊功能
  # ================================================================
  # Interaction Visualizer - 交互可视化（方块/实体状态悬浮文字和物品预览）
  interaction_visualizer: true

  # ================================================================
  # ⚠️ 配置说明
  # - 修改模块开关后需要重启服务器生效
  # - 关闭依赖模块会导致依赖它的模块无法启用
  # - event-entity-spawn: 是否允许事件系统生成生物（暴乱生成僵尸等）
  # ================================================================
  event-entity-spawn: false

war:
  # 战争准备时间（小时）- 宣战后、战争开始前的准备期
  preparation_hours: 24
  # 最小动员率 - 宣战所需最低兵力占国家总兵力的比例
  min_mobilization_rate: 0.1
  # 最大战争持续时间（天）- 超时后自动判定为平局
  max_duration_days: 30
  # 宣战冷却时间（小时）- 两次宣战之间的最短间隔
  declaration_cooldown_hours: 12
  # 最大战争赔款比例 - 战败方最多需支付的比例
  max_reparations_ratio: 0.5
  # 最小宣战费用（金币）- 从国库扣除
  min_declaration_cost: 1000.0
  # 允许同时进行的战争数量上限
  max_simultaneous_wars: 3
  # 胜利条件: OCCUPATION(占领首都)/CONQUEST(征服)/ELIMINATION(歼灭)/NEGOTIATION(消耗)/TIMEOUT(超时)
  victory_condition: OCCUPATION
  # 占领胜利所需天数 - 占领对方首都持续N天
  occupation_victory_days: 7
  # 征服胜利所需首都占领天数
  conquest_victory_days: 3
  # 是否允许投降
  surrender_allowed: true
  # 投降所需赔款比例
  surrender_reparations_ratio: 0.2
  # 是否允许联盟参战
  alliance_war_enabled: true
  # 中立国宣战惩罚倍率
  neutral_declaration_penalty: 1.5
  # 战争期间税收加成倍率
  tax_bonus_multiplier: 1.0
  # 战争期间资源产出惩罚倍率
  resource_penalty: 0.5
  # 战争债券利率
  bond_interest_rate: 0.05
  # 战后和平期（天）
  post_war_peace_days: 7
  notifications:
    # 是否启用战争公告
    announcements: true
    # 是否启用战争标题通知
    title_notifications: true
  messages:
    # 宣战消息 - 占位符: %attacker%(攻击方), %defender%(防御方)
    declaration: "§c§l[战争] §6%attacker%§e 向 §6%defender%§e 宣战！"
    # 战争开始消息
    start: "§c§l[战争] §e战争正式开始！准备时间结束。"
    # 战争结束消息 - %winner%(胜利方)
    end: "§a§l[和平] §e战争已结束，%winner%§e 获胜！"
    # 投降消息 - %surrenderer%(投降方), %receiver%(受降方)
    surrender: "§e§l[投降] §6%surrenderer%§e 向 §6%receiver%§e 投降。"
    # 和平协议消息
    peace: "§a§l[和平] §e和平协议已签订。"

city:
  # 是否启用城市系统。
  enabled: true
  # 每个国家最多允许的城市数量。
  max-cities-per-nation: 5
  # 每个城市最大居民数量。
  max-residents-per-city: 100
  # 创建城市的基础费用（从创建者个人账户扣除）。
  create-cost: 100.00
  economy:
    # 城市国库初始金额。
    initial-treasury: 0.00
    # 存款是否需要市长/官员权限。
    deposit-requires-permission: false
    # 取款是否需要市长权限。
    withdraw-requires-mayor: true

army:
  # 每个国家最多允许创建的军队数量。
  max-armies-per-nation: 10
  # 每支军队最大士兵数量。
  max-soldiers-per-army: 1000
  # 是否在领土内自动补给军队。
  auto-supply-in-territory: true

# ===============================================
# 地道战系统配置 (Feature #23)
# ===============================================
tunnel:
  # 每个国家最多允许创建的地道数量。
  max-tunnels-per-nation: 5
  # 每条地道最多允许的入口数量。
  max-entrances-per-tunnel: 10
  # 地道默认深度（向下延伸的方块数）。
  tunnel-depth: 20.0
  # 最大伏击范围（方块）。
  max-ambush-range: 30.0
  # 地道崩塌半径（方块）。
  collapse-radius: 5.0
  # 地道建设成本（按类型）
  build-costs:
    supply: 1000.0
    escape: 1500.0
    military: 2000.0
    secret: 3000.0
  # 地道建设时间（秒，按类型）
  build-times:
    supply: 300
    escape: 450
    military: 600
    secret: 900

navy:
  # 每个国家最多允许创建的舰队数量。
  max-navies-per-nation: 5
  # 每支舰队最大舰船数量。
  max-ships-per-navy: 50
  # 是否在港口自动补给舰队。
  auto-supply-at-port: true
  # 海战范围加成（乘数）。
  battle-range-bonus: 1.0

# ===============================================
# 军事学说系统配置
# ===============================================
doctrine:
  # 学说切换冷却时间（毫秒），默认 24 小时 = 86400000
  switch-cooldown-ms: 86400000
  # 学说切换费用，0 表示免费
  switch-cost: 500.0

# ===============================================
# 领土仲裁系统配置
# ===============================================
arbitration:
  # 费用配置
  fees:
    # 仲裁申请费用
    filing-fee: 100.00
    # 最低申诉费用
    minimum-claim-fee: 500.00
    # 最高申诉费用
    maximum-claim-fee: 10000.00
    # 是否收取申请费用
    charge-filing-fee: true
    # 撤诉是否退还费用
    refund-on-withdrawal: true
  # 案件配置
  case:
    # 每方最大证据数量
    max-evidence-per-side: 10
    # 案件过期天数
    case-expiration-days: 30

split:
  # 是否启用国家分裂系统
  enabled: true
  # 分裂冷却设置
  cooldown:
    # 是否启用分裂冷却
    enabled: true
    # 冷却时间（小时）
    hours: 168
  # 分裂限制
  limits:
    # 发起分裂最少需要的区块数（会*2用于检查）
    min-chunks-to-split: 4
    # 分裂后原国家最少保留的区块数
    min-chunks-remaining: 4
  # 分裂费用
  cost:
    # 是否启用分裂费用
    enabled: true
    # 基础分裂费用
    base: 500.0
    # 每个分离区块的额外费用
    per-chunk: 100.0
  # 分裂请求设置
  request:
    # 请求过期时间（分钟）
    expiration-minutes: 1440
    # 每个国家最多待处理请求数
    max-per-nation: 1
  # 权限设置
  permission:
    # 是否只有领导人可以发起分裂
    leader-only: true

faith:
  # 信仰系统配置
  max-faith: 100
  # 信仰等级阈值
  level-thresholds: [20, 40, 60, 80]
  # 每次祈祷获得的信仰值
  prayer-faith-gain: 2
  # 每日登录获得的信仰值
  daily-faith-gain: 3
  # 每日最大祈祷次数
  max-daily-prayers: 10
  # 每日信仰衰减量
  faith-decay-per-day: 5
  # 信仰事件冷却时间（分钟）
  faith-event-cooldown-minutes: 60
  # 祈福消耗配置
  blessing-costs:
    prosperity: 20.0
    protection: 15.0
    harvest: 10.0
    blessing: 25.0
  # 信仰等级配置
  levels:
    1:
      name: "迷途者"
      description: "信仰迷茫，需要指引"
      resource-bonus: 0.0
      defense-bonus: 0.0
      tax-bonus: 0.0
      exp-bonus: 0.0
      icon: "BROWN_BANNER"
    2:
      name: "初信者"
      description: "开始信奉神祇"
      resource-bonus: 0.05
      defense-bonus: 0.0
      tax-bonus: 0.0
      exp-bonus: 0.0
      icon: "WHITE_BANNER"
    3:
      name: "虔诚信徒"
      description: "坚定信仰，神眷加护"
      resource-bonus: 0.10
      defense-bonus: 0.05
      tax-bonus: 0.0
      exp-bonus: 0.05
      icon: "YELLOW_BANNER"
    4:
      name: "圣殿守护者"
      description: "守护圣地，信仰坚定"
      resource-bonus: 0.15
      defense-bonus: 0.10
      tax-bonus: 0.05
      exp-bonus: 0.10
      icon: "ORANGE_BANNER"
    5:
      name: "神选之人"
      description: "受神明眷顾，国家昌盛"
      resource-bonus: 0.20
      defense-bonus: 0.15
      tax-bonus: 0.10
      exp-bonus: 0.15
      icon: "GOLD_BANNER"

# ===============================================
# 领土租借系统配置
# ===============================================
territory-rent:
  # 默认每区块每日租金
  default-rent-per-chunk: 10.0
  # 创建租借契约的手续费
  creation-fee: 50.0
  # 租借提议过期时间（分钟）
  proposal-expiry-minutes: 1440
  # 最大租借天数
  max-lease-days: 365
  # 每日自动扣款是否启用
  auto-daily-rent: true
  # 是否允许个人租借（不通过国家）
  allow-player-lease: false
  # 租借区块最小数量
  min-chunks: 1
  # 租借区块最大数量
  max-chunks: 100

integrations:
  protectorapi:
    # 是否启用 ProtectorAPI 兼容桥。开启后 STARCORE 会在运行时检测 ProtectorAPI，
    # 并把它当作”外部保护区查询总线”使用；未安装 ProtectorAPI 时不会报错。
    enabled: true
    # 是否禁止 STARCORE 圈地覆盖外部保护区。
    # 这会统一作用于命令圈地、圈地工具确认、网页地图拖框确认。
    block-claims-in-protected-areas: true
    # 是否额外采样区块地表高度，用于提高对多边形/立体保护插件的命中率。
    sample-surface-height: true
    # 额外采样的固定 Y 层。会和地表高度一起参与检测。
    # 默认兼顾主世界常见地表、山地和高空建筑。
    sample-y-levels: [64, 96, 160]
    # 采样点距离区块边缘的内缩方块数。0 表示贴边，7 表示接近区块中心。
    # 数值越大，越偏向检测区块内部；数值越小，越偏向检测边界重叠。
    edge-inset-blocks: 1

# ===============================================
# 间谍系统配置
# ===============================================
espionage:
  # 每个国家最多间谍数量
  max-spies-per-nation: 20
  # 每个国家最多同时进行的行动数
  max-active-operations-per-nation: 5
  # 基础被检测概率 (%)
  base-detection-chance: 30
  # 行动冷却时间 (分钟)
  operation-cooldown-minutes: 60
  # 破坏效率 (0.0-1.0)
  sabotage-efficiency: 0.5
  # 资源窃取比例 (0.0-1.0)
  resource-steal-rate: 0.1
  # 是否只在战争期间允许行动
  allow-war-only: false

redis:
  # 是否启用跨服通信。启用后通过 Redis pub/sub 实现多服之间的国家消息和战争状态同步。
  enabled: false
  # Redis 服务器地址。
  host: 127.0.0.1
  # Redis 服务器端口。
  port: 6379
  # Redis 密码，留空表示无密码。
  password: ""
  # Redis 数据库编号，0-15。
  database: 0

# REST API 服务配置
rest-api:
  # 是否启用 REST API 服务
  enabled: false
  # 监听地址。公网部署建议仍监听 127.0.0.1，再由反向代理转发。
  host: 127.0.0.1
  # 监听端口
  port: 8717
  # API 签名密钥。首次启动会自动替换 change-this-secret。
  signing-secret: change-this-secret
  # API Key 有效期，单位小时
  api-key-ttl-hours: 24
  cors:
    # 是否启用 CORS
    enabled: true
    # 允许的来源列表。* 表示允许所有来源。
    allowed-origins:
      - "*"
  rate-limit:
    # 是否启用速率限制
    enabled: true
    # 每分钟允许的最大请求数
    requests-per-minute: 60
    # 突发容量
    burst-size: 10
    # 封禁时长，单位秒
    block-duration-seconds: 60
  endpoints:
    # 国家端点配置
    nations:
      enabled: true
      requires-auth: false
    # 领土端点配置
    territories:
      enabled: true
      requires-auth: false
    # 统计端点配置
    stats:
      enabled: true
      requires-auth: false
    # 财务端点配置
    finance:
      enabled: true
      requires-auth: true
    # WebSocket 端点配置
    websocket:
      enabled: true
      requires-auth: false
      # 最大连接数
      max-connections: 1000
      # 心跳间隔，单位秒
      ping-interval-seconds: 30
      # 心跳超时，单位秒
      ping-timeout-seconds: 60

# 雇佣兵系统配置
mercenary:
  # 每个国家最多雇佣兵数量
  max-mercenaries-per-nation: 10
  # 最大合同天数
  max-contract-days: 30
  # 最小合同天数
  min-contract-days: 1
  # 每次击杀获得经验
  experience-per-kill: 15
  # 每次任务获得经验
  experience-per-mission: 50
  # 每次死亡扣除经验
  experience-per-death: 10
  # 最大死亡次数后终止合同
  max-death-before-termination: 5
  # 晋升奖励倍率
  rank-up-bonus: 1.5
  # 是否自动续约
  auto-renew-contract: false
  # 续约天数
  renew-days: 7
  # 是否启用晋升消息
  enable-promotion-messages: true
  # 是否启用合同到期消息
  enable-contract-expiry-messages: true

# ===============================================
# Interaction Visualizer - 交互可视化配置
# 原生实现，功能对标 LOOHP/InteractionVisualizer
# ===============================================
interaction-visualizer:
  # 全局开关
  enabled: true

  # 扫描设置
  scan:
    # 水平扫描半径（方块）
    radius: 8
    # 垂直扫描半径（方块）
    vertical-radius: 5
    # 扫描周期（tick，20 tick ≈ 1 秒）
    period-ticks: 20

  # 实体显示设置
  display:
    # 渲染距离
    render-distance: 48
    # 每玩家最大显示数量
    max-displays-per-player: 48
    # 全局最大显示数量
    max-displays-global: 512

  # 清理设置
  cleanup:
    # 清理周期（tick）
    period-ticks: 600

  # 通用设置
  settings:
    # 默认关闭所有显示（玩家需要手动开启）
    default-disable-all: false
    # 视线被遮挡时隐藏
    hide-if-view-obstructed: false
    # 禁用该功能的世界列表
    disabled-worlds: []

  # 模块开关（hologram=悬浮文字，itemstand=物品立牌，itemdrop=掉落物显示）
  modules:
    hologram:
      enabled: true
    itemstand:
      enabled: true
    itemdrop:
      enabled: true

  # 方块/实体条目开关（true=启用）
  entries:
    crafting_table:       { enabled: true,  display-name: "工作台" }
