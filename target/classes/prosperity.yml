    tax-bonus: 0.02
    resource-bonus: 0.05
  4:
    name: "平淡"
    color: "&e"
    tax-bonus: 0.04
    resource-bonus: 0.10
  5:
    name: "平稳"
    color: "&a"
    tax-bonus: 0.06
    resource-bonus: 0.15
  6:
    name: "发展"
    color: "&a"
    tax-bonus: 0.08
