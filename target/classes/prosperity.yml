# ========================================
# 事件配置
# ========================================

events:
  # 繁荣度危机阈值
  crisis-threshold: 20.0
  # 繁荣度峰值阈值
  peak-threshold: 95.0
  # 严重危机阈值
  severe-crisis-threshold: 10.0
  # 是否在达到峰值时全服广播
  broadcast-on-peak: true
  # 是否在进入危机时全服广播
  broadcast-on-crisis: true
  # 是否在等级变化时通知国家成员
  notify-on-level-change: true

# ========================================
# 历史记录配置
# ========================================

history:
  # 最大历史记录数
  max-records: 50
  # 是否持久化历史记录
  persist: true

# ========================================
# 冷却配置
# ========================================

cooldown:
  # 活动冷却时间（秒）
  activity: 30
  # 建筑冷却时间（秒）
  block-place: 5
  # 击杀冷却时间（秒）
  kill: 60

# ========================================
# 通知配置
# ========================================

notifications:
  # 启用通知
  enabled: true
  # 通知方式: ACTIONBAR, CHAT, TITLE
  type: "CHAT"
  # 通知持续时间（秒）
  duration: 5