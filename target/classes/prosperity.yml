# ========================================
# StarCore 繁荣度系统配置
# ========================================
# 繁荣度系统管理国家的经济发展水平
# 繁荣度越高，国家获得的税收和资源加成越多
# ========================================

prosperity:
  # 初始繁荣度 (0-100)
  initial-prosperity: 50.0

  # 最大繁荣度
  max-prosperity: 100.0

  # 最小繁荣度
  min-prosperity: 0.0

  # 每日衰减率 (百分比)
  # 每天自动降低的繁荣度百分比
  daily-decay-rate: 0.5

  # 衰减阈值
  # 繁荣度低于此值时不进行衰减（保护弱小国家）
  decay-threshold: 30.0

  # 达到10级所需的繁荣度值
  prosperity-to-level-10: 100.0

  # 活动提升量
  # 每次活跃操作增加的繁荣度
  activity-boost-amount: 2.0

  # 建筑提升量
  # 每次建筑增加的繁荣度贡献
  building-boost-amount: 3.0

  # 交易提升量
  # 每次交易增加的繁荣度
  trade-boost-amount: 1.5

  # 战争惩罚倍率
  # 处于战争状态时衰减加速的倍数
  war-penalty-multiplier: 5.0

  # 不活跃惩罚倍率
  # 超过24小时不活跃时衰减加速的倍数
  inactivity-penalty-multiplier: 2.0

  # 每级税收加成
  # 每级繁荣度增加的税收百分比 (0.02 = +2%)
  tax-bonus-per-level: 0.02

  # 每级资源加成
  # 每级繁荣度增加的资源产出百分比 (0.05 = +5%)
  resource-bonus-per-level: 0.05

  # 衰减检查间隔 (游戏刻)
  # 72000刻 = 1小时 (20 ticks/秒 * 60秒 * 60分钟)
  decay-check-interval-ticks: 72000

# ========================================
# 活动类型配置
# ========================================
# 定义不同活动的繁荣度贡献值
# ========================================

activities:
  build:
    # 建筑活动增加分数
    score-increment: 3
    # 繁荣度提升系数
    prosperity-boost: 0.3

  trade:
    # 交易活动增加分数
    score-increment: 2
    # 繁荣度提升系数
    prosperity-boost: 0.2

  combat:
    # 战斗活动增加分数
    score-increment: 2
    # 繁荣度提升系数
    prosperity-boost: 0.2

  interact:
    # 交互活动增加分数
    score-increment: 1
    # 繁荣度提升系数
    prosperity-boost: 0.1

  explore:
    # 探索活动增加分数
    score-increment: 1
    # 繁荣度提升系数
    prosperity-boost: 0.05

# ========================================
